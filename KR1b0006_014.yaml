body:
  text: 書傳卷十四宋蘇軾撰周書多士第十六成周既成遷殷頑民周公以王命誥作多士惟三月周公初于新邑洛用告商王士王若曰爾殷遺多士弗弔旻天大降喪于殷我有周佑命將天明威致王罰敕殷命終于帝肆爾多士非我小國敢弋殷命弋取也惟天不畀允罔固亂弼我我其敢求位固讀如推亡固存之固信哉天之固治而不固亂也不固亂所以輔我我豈敢求之哉惟帝不畀惟我下民秉為惟天明畏秉持也帝既不畀殷矣則民皆持為此說曰天將降威于殷也我聞曰上帝引逸引去也故逸者則天命去之也有夏不適逸則惟帝降格嚮于時夏夏之先王不往從放逸之樂故上帝格嚮之弗克庸帝大淫泆有辭此桀也淫泆且有辭飾非也惟時天罔念聞雖有飾非之辭帝不聽也厥惟廢元命降致罰乃命爾先祖成湯革夏俊民甸四方甸治也自成湯至于帝乙罔不明德恤祀亦惟天丕建保乂有殷殷王亦罔敢失帝罔不配天其澤在今後嗣王誕罔顯于天矧曰其有聽念于先王勤家誕淫厥泆罔顧于天顯民祗惟時上帝不保降若兹大喪惟天不畀不明厥德凡四方小大邦喪罔非有辭于罰言天不畀紂使不明于德凡小大邦為紂所刑喪者皆有辭于罰不暇也王若曰爾殷多士今惟我周王丕靈承帝事言我周文王武王皆繼行大事有命曰割殷告敕于帝將有割殷之事必先告正于天而後行曰將有大正于商是也惟我事不二適惟爾王家我適我有事于四方曷嘗有再舉而後定者乎故曰惟我事不二適二適再往也惟於伐殷則觀政而歸已而再往是我先王不忍滅商之意也故曰惟爾王家我適不申言二適者因前之辭也豫其曰惟爾洪無度我不爾動自乃邑豫亦念天即于殷大戾肆不正今三監叛豫惟曰此乃汝大無法非豫爾動變起于爾邑豫亦念天命不可不征即於其首亂罪大者而誅之謂殺武庚管叔也肆不正者言其餘不盡繩治也王曰猷告爾多士豫惟時其遷居西爾洛邑在故殷西南非我一人奉德不康寧時惟天命無違朕不敢有後無我怨既遷爾于洛乃安居無後命矣惟爾知惟殷先人有冊有典殷革夏命言湯之革夏其故事皆在典冊爾所知也今爾又曰夏迪簡在王庭有服在百僚夏臣之有道者湯皆選用為近臣在王庭其可以任事者則為百僚而今不然以為怨豫一人惟聽用德肆豫敢求爾于天邑商我知用德而已爾乃與三監叛我豈敢求爾於商邑而用之乎豫惟率肆矜爾循湯故事而矜赦汝則可非豫罪時惟天命王曰多士昔朕來自奄豫大降爾四國民命我乃明致天罰移爾遐逖比事臣我宗多遜東征誅三監及奄遷四國民于遠當此時爾協比以事我宗臣多遜不違也王曰告爾殷多士今豫惟不爾殺豫惟時命有申今朕作大邑于兹洛豫惟四方罔攸賔亦惟爾多士攸服奔走臣我多遜我惟不忍爾殺故申明此命爾我所以營洛者以四方諸侯至而無所容亦為爾等服事奔走臣我多遜而無所居故也爾乃尚有爾土爾乃尚寧幹止幹事也止居也爾克敬天惟畀矜爾爾不克敬爾不啻不有爾土豫亦致天之罰于爾躬今爾惟時宅爾邑繼爾居爾厥有幹有年于兹洛爾小子乃興從爾遷汝能敬天安居汝子其有興者非遷洛何從得之殷人之怨不在王庭百僚故成王以此答其意也王曰又曰時豫乃或言爾攸居王言爾子孫當有顯者殷人喜而記之異日王告之曰及爾子孫之顯是時我當復言之于爾所居信其言以大慰之也非一日之言故以又曰别之無逸第十七周公作無逸周公曰嗚呼君子所其無逸先知稼穡之艱難乃逸則知小人之依舊說先知農事之艱難乃謀逸豫非也周公方以逸為深戒何其謀逸之亟也蓋曰王當先知稼穡之道為艱難乃所以逸樂則知小人之所依怙以生者知此則不妨農時不奪民利不盡民力也相小人厥父母勤勞稼穡厥子乃不知稼穡之艱難雖農夫之子生而飽暖則不知艱難而況王乎以訓王無忘太王王季文武之勤勞王業也乃逸乃諺既誕否則侮厥父母曰昔之人無聞知戲侮曰諺大言曰誕信哉周公之言也曰昔之人無聞知至于今閭巷田里之民有不令子弟猶皆相師為此言也是蟣蝨螻蟻周公何誅焉而載於書曰以戒成王也人君欲自恣於逸樂者必先詆娸先王戲玩老成而小人譸張為幻者又勸成之韓非之言曰堯之有天下也堂髙三尺采椽不斫茅茨不剪雖逆旅之宿不勤於此矣冬日鹿裘夏日葛衣粢糲之食藜藿之羮飲土匭啜土鉶雖監門之養不觳於此矣禹鑿龍門通大夏疏九河曲九防決停水致之海股無胈脛無毛手足胼胝面目黧黑遂以死于外葬於會稽雖臣虜之勞不烈於此矣然則天子所以貴於有天下者豈欲苦形勞神自取逆旅之宿口食監門之養手持臣虜之作哉此不肖人之所勉非賢者之所務也此其論豈不出於昔之人無聞知也哉其言至淺陋而世主悅之故韓非一言覆秦殺二世如反掌自漢以來學者雖鄙申韓不取然世主心悅其言而隂用之小人之欲得君者必私習其說或誦言稱舉之故其學至于今猶行也豫是以具論之周公曰嗚呼我聞曰昔在殷王中宗嚴恭寅畏天命自度治民祗懼不敢荒寧肆中宗之享國七十有五年中宗太戊也此書方論享國之長短故先言享國之最長者非世次也其在高宗時舊勞于外爰暨小人作其即位乃或亮隂三年不言其惟不言言乃雍雍和也以其久不言之故言則天下信之不敢荒寧嘉靖殷邦至于小大無時或怨肆高宗之享國五十有九年高宗武丁也其在祖甲不義惟王舊為小人作其即位爰知小人之依能保惠于庶民不敢侮鰥寡肆祖甲之享國三十有三年祖甲太甲也自時厥後立王生則逸生則逸不知稼穡之艱難不聞小人之勞惟耽樂之從自時厥後亦罔或克夀或十年或七八年或五六年或四三年周公曰嗚呼厥亦惟我周太王王季克自抑畏文王卑服即康功舊功康功安人之功田功農功也徽柔懿恭懷保小民惠鮮鰥寡鮮貧乏者自朝至于日中昃不遑暇食用咸和萬民文王不敢盤于遊田以庶邦惟正之供言不以庶邦貢賦供私事也文王受命惟中身文王九十七而終即位之年四十七厥享國五十年令德之主欲其長有天下以庇民仁人之意莫急於此此周公所以身代武王也人莫不好逸欲而其所甚好者生也以其所甚好禁其所好庶幾必信此無逸之所為作也然猶不信者以逸欲為未必害生也漢武帝唐明皇豈無欲者哉而夀如此矣夫多欲而不享國者皆是也漢武明皇十一而已豈可望哉飲鴆食野葛必死而曹操獨不死亦可效乎使人主不夀者五一曰色二曰酒三曰便辟嬖佞四曰臺榭游觀五曰田獵此五者無逸之所諱也既困其身又困其民民怨咨籲天此最害夀之大者豫欲以惡衣食遠女色卑宮室罷遊田夙興勤勞以此五物者為人主永年之藥石也周公曰嗚呼繼自今嗣王則其無淫于觀于逸于遊于田以萬民惟正之供無皇曰今日耽樂乃非民攸訓非天攸若時人丕則有愆以百日之憂而聞一日之樂疑若可許也然周公不許防其漸也曰此非所以訓民順天也言此者必有大咎無若殷王受之迷亂酗于酒德哉酗者用酒而怒輕用兵刑也周公曰嗚呼我聞曰古之人猶胥訓告胥保惠胥教誨民無或胥譸張為幻此厥不聽人乃訓之乃變亂先王之正刑至于小大民否則厥心違怨否則厥口詛祝譸狂也張誕也變名易實以眩觀者曰幻古之人相與訓戒者其言皆切近明白世之所共知者也若曰不殺為仁殺為不仁薄斂為有德原賦為無道此古今不刋之語先王之正刑也及小人為幻或師申韓之學或誦六經以文姦言則曰多殺所以為仁也厚斂所以為德也高臺深池女色畋遊皆不害霸此理之必不然而其學之有師言之有章世主多喜之此之謂幻幻能害夀以其能怨詛也周公曰嗚呼自殷王中宗及高宗及祖甲及我周文王兹四人迪哲古之哲王莫不如此而專言四人此四人尤以此顯於世也厥或告之曰小人怨汝詈汝則皇自敬德厥愆曰朕之愆允若時不啻不敢含怒此厥不聽人乃或譸張為幻曰小人怨汝詈汝則信之則若時不永念厥辟不寬綽厥心亂罰無罪殺無辜怨有同是叢于厥身人不怨讒者而怨聽者周公曰嗚呼嗣王其監于兹書傳卷十四
