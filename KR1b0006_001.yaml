  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1b0006_WYG_001-1a, image: WYG0054/WYG0054-0486c.png}
body:
  text: 書傳卷一宋蘇軾撰虞書堯典第一昔在帝堯聰明文思聰者無所不聞明者無所不見文者其法度也思者其智慮也光宅天下聖人之德如日月之光貞一而無所不及也將遜于位遜遁也讓于虞舜作堯典言常道也曰若稽古帝堯曰放勳欽明文思安安若順也稽考也放法也有功而可法曰放勳猶孔子曰巍巍乎其有成功此論其德之辭也自孟子太史公咸以放勳重華文命為堯舜禹之名然有不可者以類求之則臯陶為名允迪乎欽敬也或言其聰或言其敬初無異義而學者因是以為説則不勝異説矣凡若此者皆不取欽明文思才之絶人者也以絶人之才而安於無事此德之盛也夫惟天下之至仁為能安其安允恭克讓光被四表格于上下允信也克能也表外也格至也上下天地也恭有偽讓有不克故以允克為賢克明俊德以親九族明揚也俊傑也堯之政以舉賢為首親親為次九族高祖玄孫之族也九族既睦平章百姓平和也章顯用其賢者也百姓凡國之大族民之望也大族豫之民莫不豫也方是時上世帝皇之子孫其得姓者蓋百餘族而已故曰百姓百姓昭明協和萬邦黎民於變時雍協合也黎衆也變化也雍和也乃命羲和欽若昊天厯象日月星辰敬授人時昊廣大也厯者其書也象者其器也璿璣玉衡之類是也星四方中星也辰日月所會也或曰星五星辰三辰心伐北辰也重黎之後羲氏和氏世掌天地四時之官故堯以是命之分命羲仲宅嵎夷曰暘谷禹貢嵎夷在青州又曰暘谷則其地近日而先明當在東方海上以此推之則昧谷當在西極朔方幽都當在幽州而南交為交趾明矣春曰宅嵎夷夏曰宅南交冬曰宅朔方而秋獨曰宅西徐廣曰西今天水之西縣也羲和之任亦重矣堯都於兾州而其所重任之臣乃在四極萬里之外理或不然當是致日景以定分至然後厯可起也故使往驗於四極非常宅也寅賔出日平秩東作寅敬也賔導也秩次序也東作春作也西成秋成也春夏欲民早起故先日出而作是謂寅賔出日秋冬寒不能早起故令民候日入而息是謂寅餞納日二叔不言餞者因仲之辭日中星鳥以殷仲春日中者晝夜平也二分皆晝夜平而春言日中秋言宵中者互相備也春分朱鳥七宿昏見於南方夏至則青龍秋分則玄武冬至則白虎而夏秋冬獨舉一宿者舉其中也殷當也書曰九江孔殷厥民析冬寒無事民入室處春事既起丁壯就田其民老壯分析見漢志鳥獸孳尾乳化曰孳交接曰尾申命羲叔申重也宅南交平秩南訛敬致訛化也敘南方化育之事以敬致其功日永星火以正仲夏永長也火心也厥民因老弱畢作因就在田之丁壯也鳥獸希革其羽毛希少而革易也分命和仲宅西曰昧谷寅餞納日餞送也平秩西成宵中星虛以殷仲秋厥民夷夷平也農事至秋稍緩可以漸休故曰夷鳥獸毛毨毨理也毛更生整理申命和叔宅朔方曰幽都平在朔易在察也朔易歲於此改易也禮十二月天子與公卿大夫共飭國典論時令以待來歲之宜日短星昴以正仲冬厥民隩隩室也民老幼皆入室鳥獸氄毛氄軟厚也帝曰咨汝羲暨和期三百有六旬有六日以閏月定四時成歲暨與也周四時曰期期當三百六十五日四分日之一而云六日舉其全也歲止得三百五十四日故以閏月定而正之有讀為又古有又通允釐百工庶績咸熙釐理工官也績功也熙光明也帝曰疇咨若時登庸疇誰也咨嗟也時是也猶曰時乎嗟哉能順是者我登進而用之放齊曰胤子朱啓明帝曰吁嚚訟可乎放齊臣名胤國子爵朱名書有胤侯吁疑怪之辭也口不道忠信之言為嚚或曰太史公曰嗣子丹朱開明帝曰疇咨若豫采采事也歡兜曰都共工方鳩僝功歡兜臣名都於嘆美之辭也共工其先為是官者因以氏也方類也鳩聚也僝布也言共工能類聚而布其功也帝曰吁靜言庸違象恭滔天靜則能言用則違之貌象恭敬而實滅其天理滔滅也帝曰咨四嶽孔安國以四嶽為羲和四子而太史公以羲和為司馬之先以四嶽為齊太公之祖則四嶽非羲和也當以史為正湯湯洪水方割蕩蕩懷山襄陵浩浩滔天湯湯蕩蕩浩浩皆水之狀也割害也懷包也襄上也水逆流曰襄下民其咨有能俾乂俾使也乂治也僉曰於鯀哉僉皆也鯀崇伯之名帝曰吁咈哉方命圯族咈戾也方命負命也族類也圯族敗類也嶽曰異哉試可乃已異舉也時未有賢於鯀者故嶽曰舉而試之可以治水則已無求其他帝曰往欽哉九載績用弗成載年也九年三考而功不成帝曰咨四嶽朕在位七十載堯年十六以唐侯為天子在位七十年時年八十六汝能庸命巽朕位嶽曰否德忝帝位巽受也否不也忝辱也曰明明揚側陋明其高明者揚其側陋者言不擇貴賤也師錫帝曰有鰥在下曰虞舜師衆也錫豫也無妻曰鰥舉舜而言其鰥者欲帝妻之也帝知嶽不足禪而禪之嶽知舜可禪而不舉何也以天下豫庶人古無是道也故必先自嶽始嶽必不敢當也嶽不敢當而後及其餘曰吾不擇貴賤也而衆乃敢舉舜理勢然也堯之知舜至矣而天下不足以盡知之故將授之天下使其事發於衆不發於堯故舜受之也安帝曰俞豫聞如何俞然也曰然豫亦聞之其德果何如哉嶽曰瞽子父頑母嚚象傲克諧以孝蒸蒸乂不格姦瞽舜父名也其字瞍心不則德義之經為頑象舜弟也諧和也蒸進也姦亂也舜能以孝和諧父母昆弟使進於德不及於亂而孟子太史公皆言象日以殺舜為事塗廩浚井僅脫於死至欲室其二嫂其為格姦也甚矣故凡言舜之事不告而娶避堯之子於南河之南舉皆齊束野人之語而二子不察也帝曰我其試哉女于時觀厥刑于二女釐降二女于媯汭嬪于虞帝曰欽哉刑法也釐理也媯水名也婦敬曰嬪虞其族也舜能以理下二女於媯水之陽耕稼陶漁之地使二女不獨敬其親而通敬其族舜之所謂諸難無難於此者也雖付之天下可也堯以是信之矣而人未足以信之故復試之以五典百揆四門大麓之事書傳卷一
