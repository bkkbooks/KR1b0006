body:
  text: 書傳卷十三宋蘇軾撰周書梓材第十三王曰封以厥庶民暨厥臣逹大家以厥臣逹王惟邦君大家者如晉六卿魯三桓齊諸田楚昭屈景之類此晉魯齊楚之所恃以為骨幹者無之則無以為國也故曰季氏亡則魯不昌然其擅威福竊國命則有之矣古者國君馭此為難孟子所謂不得罪於巨室者周公教康叔曰汝上不得罪於王下不得罪於巨室則國安矣人君多疾惡於巨室所惡於巨室者惡其危國也周公曰無庸疾也汝得民與臣而國自安巨室何為乎故曰以厥庶民暨厥臣逹大家以厥臣逹王上下情通謂之逹以爾臣民之心逹大家之心以爾賢臣聘于周以逹王心而國安矣汝若恆越曰我有師師司徒司馬司空尹旅曰豫罔厲殺人亦厥君先敬勞肆徂厥敬勞肆往姦宄殺人歷人宥肆亦見厥君事戕敗人宥王啓監厥亂為民曰無胥戕無胥虐至于敬寡至于屬婦合由以容王其效邦君越御事厥命曷以引養引恬自古王若兹監罔攸辟自此以下文多不類古今解者皆隨文附致不厭人情當以意求之乃得蓋當時衛有大家得罪於衛當誅而未決者周公之意以謂新殺武庚管叔刑不可遂故教康叔以和緩治之越及也汝當晏然如平常時及曰此我之官師相師不可去也以至於三卿之正長及其旅士亦皆曰我非危殺人者也君臣皆為寬辟以逸罪人使亡也此大家之長先為國君之所敬勞今雖有罪未可殺也當徂此敬勞者而已蓋使之去國也然後治其餘黨亦不可盡法也往者流也肆往姦宄殺人歷人宥者謂以流宥五刑也歷人者罪人之所過律所謂知情藏匿資給者此殺人與歷人皆以流宥之也肆亦見厥君事戕敗人宥者傷毁人四肢面目漢律所謂疻也是人因為君幹事而疻傷人者可以直宥也於是王乃啓監厥亂為民而寬慰之曰無相戕無相虐王又收恤此大家破亡之餘而鎮撫之禮敬其鰥寡比次其婦女使共由此道以相容也至矣王之仁也邦君御事所當則效其命令當何所用乎亦用此而已亂生於激事不小忍而求速決則釁故橫生靡所不至小引延之人靜而亂自衰使相容養以至恬安是謂引養引恬古我先王未有不順此者監無所用殺也惟曰若稽田既勤敷葘惟其陳修為厥疆畎稽考也敷治也菑去草棘也陳修修舊也疆畔也畎壟也若作室家既勤垣墉惟其塗塈茨塗塈墐飾之也茨苫蓋也若作梓材既勤朴斫惟其塗丹雘梓良材可為器者丹雘膠漆五采也田既敷菑室既垣墉器既朴斫則當因舊守成而潤色之不當復有所建立除治也以言康叔既已立國定位不當復有所斬艾斫削也今王惟曰先王既勤用明德懷為夾夾近也懷遠為近也庶邦享作兄弟方來亦既用明德享朝享也王謂諸侯為兄弟凡言用德者皆謂不用刑也后式典集庶邦丕享后今王也亦用此常道以集天下也皇天既付中國民越厥疆土于先王此書專言王惟不殺則子孫萬年享國故以天付為言肆王惟德用和懌先後迷民民迷失道故先後之用懌先王受命不惟以悅民心亦以悅天命也已若兹監惟曰欲至于萬年惟王子子孫孫永保民大誥康誥酒誥梓材其文皆奧雅非世俗所能通學者見其書紛然若有殺罰之言因為之說曰康誥所戒大抵先言殺罰蓋衛地服紂成俗小人衆多所以治之先後緩急當如此豫詳考四篇之文雖古語淵慤然皆粲有條理反覆丁寧以殺為戒以不殺為德此易所謂聰明睿智神武而不殺者故周有天下八百餘年後之王者以不殺享國以好殺殃其身及其子孫者多矣天人之際有不可盡知者至於殺不殺之報一一若符契可見也而世主不以為監小人又或附會六經醞釀鐫鑿以勸之殺悲夫殆哉唐末五代之亂殺人如飲食周太祖叛漢漢隱帝使開封尹劉銖屠其家百口太祖既克京師夜召其故人知星者趙延義問漢祚所以短促者延義答曰漢本未亡以刑殺冤濫故不及期而滅時太祖方以兵圍銖及蘇逢吉第旦且滅其族聞延義言矍然貸之誅止其身豫讀至此未嘗不流涕太息故表其事於書傳以救世云召誥第十四成王在豐文王都豐豐在京兆鄠縣東欲宅洛邑使召公先相宅作召誥武王克商遷九鼎于洛則已有都洛之意而周公成王成之且以殷餘頑民為憂故營洛而遷焉太史公曰洛邑武王營之成王使召公卜居居九鼎焉而周復都豐鎬至犬戎敗幽王周乃東遷洛邑所謂周葬于畢在郭東南社中明成王雖營洛而不遷都蓋嘗因巡狩而朝諸侯於洛邑云惟二月既望越六日乙未王朝步自周則至于豐王自鎬至豐以營洛之事告文王廟鄗在上林昆明北有鎬池去豐二十五里惟太保先周公相宅越若來三月惟丙午朏朏明也月三日明生之名越三日戊申太保朝至于洛卜宅厥既得卜則經營越三日庚戍太保乃以庶殷攻位于洛汭越五日甲寅位成庶殷凡殷民也位朝市宗廟郊社之位洛汭洛水北若翼日乙卯周公朝至于洛則逹觀于新邑營遍觀所營也越三日丁巳用牲于郊牛二帝及配者各一牛越翼日戊午乃社于新邑牛一羊一豕一用太牢也越七日甲子周公乃朝用書命庶殷侯甸男邦伯春秋傳曰士彌牟營成周計丈數揣高卑度厚薄仞溝洫物土方議遠邇量事期計徒庸慮財用書餱糧以令役於諸侯屬役賦丈書以授帥而效諸劉子此之謂書厥既命殷庶庶殷丕作言殷人悅而聽命也太保乃以庶邦冡君出取幣乃復入錫周公曰拜手稽首旅王若公旅讀如庭實旅百之旅諸侯之幣旅王而及公者尊周公也誥告庶殷越自乃御事嗚呼皇天上帝改厥元子兹大國殷之命惟王受命無疆惟休亦無疆惟恤嗚呼曷其奈何弗敬庶殷諸侯皆在故召公託為遜辭曰誥告汝御事以下也言殷嘗以元子嗣位而帝改其命以授周今王受命雖無疆之福亦無疆之憂其可不敬乎天既遐終大邦殷之命兹殷多先哲王在天越厥後王後民兹服厥命厥終智藏瘝在夫知保抱攜持厥婦子以哀籲天徂厥亡出執嗚呼天亦哀于四方民其眷命用懋王其疾敬德此所謂無疆之憂也殷雖滅其先哲王固在天也其後王後民至于今兹猶服用其福祿其心終不忘報怨以復國也如武庚蓄謀以伺隙者多矣其智藏于中其病則在也夫夫人也猶曰人人也各抱持其婦子以哀痛呼天徂往其逃亡解出其囚執以叛我者蓋有之矣王其可不大畏乎天其哀我民其亦眷命於勉德者王其速敬德定天命也召公之誥王也庶殷皆在而出此言亦如微子之命有上帝時歆萬邦作式之語古之人無所忌諱忠厚之至也相古先民有夏天迪從子保面稽天若今時既墜厥命今相有殷天迪格保面稽天若今時既墜厥命今沖子嗣則無遺壽耉曰其稽我古人之德矧曰其有能稽謀自天從子與子也堯舜與賢禹與子面嚮也言我觀夏殷之世天之迪夏也迪其與子而保安之其迪殷也迪其能用伊尹格天之臣而保安之夏殷之哲王皆能嚮天之所順以考其意而其後王皆以失道而墜厥命矣今王其無棄老成人以考古人之德況能博謀于衆以求天心乎嗚呼有王雖小元子哉其丕能諴于小民今休王雖幼周之元子也其大能以誠感民矣當及今休其德王不敢後王疾敬德不肯遲也用顧畏于民碞碞險也民猶水也水能載舟亦能覆舟物無險於民者矣王來紹上帝自服于土中服事也洛邑為天下中旦曰其作大邑其自時配皇天毖祀于上下其自時中又王厥有成命治民今休王先服殷御事比介于我有周御事節性惟日其邁王敬作所不可不敬德王能訓服殷之御事使比附介副于我周御事矣又當節文殷人之善性使日進于善作所者所作政事也既敬其事又敬其德則至矣我不可不監于有夏亦不可不監于有殷我不敢知曰有夏服天命惟有歷年我不敢知曰不其延惟不敬厥德乃早墜厥命我不敢知曰有殷受天命惟有歷年我不敢知曰不其延惟不敬厥德乃早墜厥命今王嗣受厥命我亦惟兹二國命嗣若功召公恐成王恃天命以自安故又戒之曰夏殷之所以多歷年與其所以不永延者其受天命皆非我所敢知也所知者惟不敬德以墜厥命也今王亦監此二國修人事而已功事也王乃初服嗚呼若生子罔不在厥初生自貽哲命習于上則智習于下則愚今天其命哲命吉凶命歷年知今我初服宅新邑肆惟王其疾敬德王其德之用祈天永命惟德是用不用刑也其惟王勿以小民淫用非彝亦敢殄戮用乂民若有功其惟王位在德元小民乃惟刑用于天下越王顯古今說者皆謂召公戒王過用非常之法又勸王亦須果敢殄滅殺戮以為治嗚呼殄滅殺戮桀紂之事桀紂猶有所不果而召公乃勸王使果於殄戮而無疑嗚呼儒者之叛道一至於此哉臯陶曰與其殺不辜寧失不經人主之用刑憂其不慎不憂其不果也憂其殺不辜不憂其失不經也今召公方戒王以慎罰言未終而又勸王以果於殄戮則臯陶不當戒舜以寧失不經乎季康子問孔子曰如殺無道就有道何如孔子曰子為政焉用殺子欲善而民善矣君子之德風小人之德草草上之風必偃夫殺無道以就有道為政者之所不免其言蓋未為過也而孔子惡之如此惡其恃殺以為政也今豫詳考召公之言本不如說者之意蓋曰王勿以小民過用非法之故亦敢於法外殄戮以治之民自用非法我自用法民自過我自不過稱罪作刑而已民之有過罪實在我及其有功則王亦有德何也王之位民德之先倡也如此則法用于天下王亦顯矣兵固不可弭也而佳兵者必亂刑固不可廢也而恃刑者必亡痛召公之意為俗儒所誣以啓後世之虐政故具論之上下勤恤其曰我受天命丕若有夏歷年式勿替有殷歷年欲王以小民受天永命君臣一心以勤恤民庶幾王受命歷年如夏殷且以民心為天命也拜手稽首曰豫小臣敢以王之讎民百君子越友民保受王威命明德王末有成命王亦顯我非敢勤惟恭奉幣用供王能祈天永命庶殷雖以丕作召公憂其間尚有反側自疑者故因其大和會而協同之讎民殷之頑民與三監叛者友民周民也百君子者殷周之賢士大夫也自今以往殷人周人與百君子皆保受王之威德王當終永天命以顯于後世我非敢以此為勤勞也奉幣贊王祈天永命而已洛誥第十五召公既相宅周公往營成周使來告卜作洛誥周人謂洛為成周謂鎬為宗周此下有脫簡在康誥自惟三月哉生魄至洪大誥治下屬周公拜手稽首之文周公拜手稽首曰朕復子明辟周公雖不居位稱王然實行王事至此歸政則成王之德始明於天下故曰復子明辟曰子者叔父家人之辭王如弗敢及天基命定命豫乃𦙍保大相東土其基作民明辟基始也周公以營洛為定天命何也易曰渙亨王假有廟言天下方渙散而王乃有宗廟則民心一方漢之初定蕭何築未央宫東闕北闕武庫宫室極壯麗亦所以示天下不渝而定民心也周公言我欲歸政久矣王之意若有所不敢及天命之始而定命者我所以少留嗣行保佑之事以率營洛之功為復辟之始也豫惟乙卯朝至于洛師我卜河朔黎水今河朔黎陽也周公營東都本以處殷餘民民懷土重遷故以都河朔為近便卜不吉然後卜洛也我乃卜澗水東瀍水西惟洛食我又卜瀍水東亦惟洛食卜必以墨墨食乃兆蓋有龜不兆者伻來以圖及獻卜伻使也王拜手稽首曰公不敢不敬天之休來相宅其作周匹休公既定宅伻來來視豫卜休恆吉我二人共貞公其以豫萬億年敬天之休拜手稽首誨言周公歸政王未敢當欲與周公共政若二君然故曰作周匹休再卜皆吉我二人當共正天下也周公曰王肇稱殷禮祀于新邑咸秩無文稱舉也殷禮盛禮也雖不在祀典者皆次秩而祭之豫齊百工伻從王于周豫惟曰庶有事今王即命曰記功宗以功作元祀惟命曰汝受命篤弼丕視功載乃汝其悉自教工孺子其朋孺子其朋其往無若火始焰焰厥攸灼敘弗其絶厥若彝及撫事如豫惟以在周工往新邑伻嚮即有僚明作有功惇大成裕汝永有辭成王欲與周公共政如二君周公不可曰汝用我言足矣我整齊百官使從汝于周者將使辦事也今王肇稱盛禮祀于新邑且命我曰記功臣之尊者使列于祭祀又命曰汝受命厚輔我其重且嚴如此今我大閲視爾功賞載籍而所用者乃汝自受教之官皆汝私人非我所齊百工也於是周公乃訓責成王曰孺子其有黨乎自今以往孺子其以黨為政乎此雖小過如火始作不即撲滅則其所灼爍者漸不可絶矣自今以往凡處彝常及有所鎮撫之事當如我為政時惟用周官勿參以私人今在新邑使人有所嚮往皆當即用舊僚而明作其有功者惇大汝心裕廣汝德勿牽於私昵則汝永有辭於天下矣公曰已汝惟沖子惟終汝其敬識百辟享亦識其有不享享多儀儀不及物惟曰不享惟不役志于享凡民惟曰不享惟事其爽侮享朝享也儀不及物與不朝同爽失也禮失而人慢也小人以賄說人必簡於禮故孔子曰獨飽於少施氏者遠小人也周公戒成王責諸侯以禮不以幣恐其役志于物而不役志于禮則諸侯慢而王室輕矣此治亂之本故周公特言之春秋傳曰晉趙文子為政薄諸侯之幣而重其禮謂魯穆叔曰自今以往兵其少弭矣夫以列國之卿輕幣重禮猶足以弭兵王而好賄則其致寇也必矣唐之衰君相皆可以賄取方鎮爭貢羡餘行苞苴而天子始失政以至於亡周公之戒至矣哉乃惟孺子頒朕徒以高爵厚祿賜我而已不暇聽朕教汝于棐民彝曾不暇聼我教汝輔民之常道也汝乃是不蘉乃時惟不永哉蘉勉也成王曰公其以豫億萬年公答以永年之道如此則不永也篤敘乃正父罔不若豫不敢廢乃命正父諸正國之老如圻父農父宏父之類汝往敬哉兹豫其明農哉彼裕我民無遠用戾勸王修農事者民有餘裕則不去也我不裕民而彼或裕之則無遠而逝矣王若曰公明保豫沖子公稱丕顯德以豫小子揚文武烈奉答天命和恆四方民和恆常和也居師定民居也惇宗將禮稱秩元祀咸秩無文惇宗厚宗族也將禮秉禮也稱秩元祀舉大祀也惟公德明光于上下勤施于四方旁作穆穆迓衡不迷文武勤教迓衡導我於治平豫沖子夙夜毖祀祭則我沖子政則周公王曰公功棐迪篤公之功輔我以道者厚矣罔不若時王曰公豫小子其退即辟于周命公後成王許周公復辟之事曰我其退歸宗周而即辟焉今當命伯禽為公後四方迪亂未定于宗禮亦未克敉公功方以道濟四方凡宗廟之禮所以鎮撫公之元勳者亦未定也成王蓋有賜周公以天子禮樂之意迪將其後監我士師工惟以伯禽為諸侯以監臨我士民及庶官也誕保文武受民亂為四輔保濟文武所受民為周四方之輔也王曰公定豫往已公留相我我歸宗周矣公功肅將祗歡祗大也公之功肅將民心大得其歡公無困哉去我則困我也我惟無斁其康事不厭康民之事公勿替刑四方其世享刑儀刑也周公拜手稽首曰王命豫來承保乃文祖受命民越乃光烈考武王𢎞朕恭𢎞大成王之恭德孺子來相宅其大惇典殷獻民厚施典法於賢人亂為四方新辟作周恭先後世言周之恭王者以成王為先古之言恭者甚盛德不敢居也詩曰自古在昔先民有作溫恭朝夕執事有恪曰其自時中乂萬邦咸休惟王有成績豫旦以多子越御事篤前人成烈答其師作周孚先多子衆賢也後世言周之信臣者以周公為先也考朕昭子刑乃單文祖德考我所以明子之法乃盡文王德也伻來毖殷乃命寧豫以秬鬯二卣曰明禋拜手稽首休享秬黑黍也鬯鬱金香草也卣中尊也以黑黍為酒合以鬱鬯所以祼也宗廟之禮莫盛於祼王使人來戒飭庶殷且以秬鬯二卣綏寧周公拜手稽首而致之公曰明禋曰休享者何也事周公如神明也古者有大賔客以享禮禮之酒清人渴而不飲肉乾人饑而不食也故享有體荐豈非敬之至者則其禮如祭也歟豫不敢宿周公不敢當此禮即日致之文武不敢以王命宿于家則禋于文王武王惠篤敘無有遘自疾萬年厭于乃德殷乃引考王伻殷乃承敘萬年其永觀朕子懷德周公以秬鬯二卣禋于文武且祝之曰使我國家順厚以敘身其康彊無有遇疾子孫萬年厭飽乃德殷人亦永夀考王使殷人承敘萬年其永觀法我孺子而懷其德戊辰王在新邑蒸祭歲是歲始冬蒸於洛文王騂牛一武王騂牛一宗廟用太牢此云牛一者告立周公後加之周尚赤故騂牛王命作冊逸祝冊惟告周公其後王賔殺禋咸格王賔諸侯殺騂以禋諸侯咸格王入太室祼太室清廟中央室也祼以圭瓉酌秬鬯以灌地求神也王命周公後作冊逸誥前告神後告伯禽也在十有二月惟周公誕保文武受命惟七年書傳卷十三
