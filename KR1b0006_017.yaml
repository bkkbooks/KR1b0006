body:
  text: 書傳卷十七宋蘇軾撰周書顧命第二十四成王將崩命召公畢公率諸侯相康王作顧命畢公高周之同姓惟四月哉生魄王不懌有疾不豫甲子王乃洮頮水發大命當齊戒沐浴今有疾不能洮頮水而已洮盥也頮頮面也相被冕服馮玉几相相禮者以衮冕服被王身也大朝覲設左右玉几乃同召太保奭召公爲保兼冢宰芮伯司徒彤伯宗伯畢公畢公三公亦兼司馬衞侯春秋傳康叔爲司寇毛公司空也史記有毛叔鄭五人皆姬姓惟彤伯姒姓師氏師氏中大夫居虎門之左虎臣虎賁氏百尹御事王曰嗚呼疾大漸惟幾漸進也幾危也病日臻既彌留臻至也彌甚也疾甚將去而少留也恐不獲誓言嗣兹予審訓命汝昔君文王武王宣重光奠麗陳教則肄肄不違用克達殷集大命麗土著也文武先定民居乃教之既教則集之民既集教用命乃能開達殷之喪否也在後之侗侗愚也揚雄曰倥侗顓蒙敬迓天威嗣守文武大訓無敢昬逾今天降疾殆弗興弗悟爾尚明時朕言用敬保元子釗康王也𢎞濟于艱難柔逺能邇安勸小大庶邦思夫人自亂于威儀爾無以釗冒貢于非幾恭敬可以濟大難但世以威儀爲文飾而已不知其爲濟難之具也故曰自亂于威儀幾危也非幾者安也惟安爲可畏不可以冒進也死生之際聖賢之所甚重也成王將崩之一日被冕服以見百官出經逺保世之言其不死於燕安婦人之手明矣其致刑措宜哉兹既受命還出綴衣于庭綴衣幄帳也羣臣既出設幄帳于中庭王反路寢之室也越翼日乙丑王崩太保命仲桓南宫毛俾爰齊侯吕伋伋太公望子爰及也詩曰爰及姜女以二干戈虎賁百人逆子釗于南門之外成王之崩子釗固在王所今乃出之于路寢門外而復逆之蓋所以表異之也延入翼室路寢旁左右翼室也成王喪在路寢故子釗廬於翼室恤宅宗爲憂居之主也丁夘命作冊度以法度作冊也越七日癸酉伯相命士須材自西伯入爲相召公也須材以供喪用狄設黼扆綴衣狄下士扆屏風爲斧文也牖間南嚮户牖間也敷重篾席桃竹枝席也黼純黼黑白也純縁也華玉仍几華玉色玉也仍因也周禮吉事變几凶事仍几因生時所設色玉左右几也此見羣臣覲諸侯之坐也西序東嚮東西廂謂之序敷重底席底蒻席也綴純綴雜采也文貝仍几以文貝飾几此旦夕聽事之坐也東序西嚮敷重豐席豐莞席也畫純繪縁也雕玉仍几以刻玉飾几此養國老享羣臣之坐也西夾南嚮西廂夾堂敷重筍席筍竹席也玄紛純紛紺也以𤣥紺爲緣漆仍几此親屬私燕之坐也故几席質儉無貝玉之飾將傳先王之顧命也不知神之所在於此乎於彼乎故兼設平生之坐也越玉五重及玉五重謂𢎞璧琬琰大玉夷玉天球也陳寳謂赤刀以下衆寳赤刀大訓虞夏商之書𢎞璧大璧也琬琰在西序大玉夷玉天球河圖八卦也在東序𦙍之舞衣𦙍國所爲舞者之衣大貝鼖鼓在西房兑之戈和之弓兑和古之巧人垂之竹矢垂舜共工在東房舞衣鼖鼓弓竹矢皆以古物寳之如後世寳孔子履也大輅在賔階面大輅玉輅綴輅在阼階面綴輅金輅先輅在左塾之前先輅象輅塾夾門堂也次輅在右塾之前次輅木輅也革輅不陳二人雀弁執惠立于畢門之内雀弁赤黒如雀頭色惠三隅矛畢門路寢門四人綦弁執戈上刃夾兩階戺綦弁青黒色堂廉曰戺一人冕執劉立于東堂劉鉞屬一人冕執鉞立于西堂一人冕執戣立于東垂一人冕執瞿立于西垂戣瞿皆㦸屬一人冕執鋭立于側階鋭當作鈗説文曰鈗侍臣所執兵從金允聲書曰一人冕執鈗讀若鋭冕大夫服弁士服王麻冕黼裳由賔階隮麻冕三十升麻爲冕蓋衮冕也衮冕之裳四章此獨用黼者以釋喪服吉示變也王方自外入受命傳命者自阼階升則王當從賔階也卿士邦君麻冕蟻裳入即位禮曰子張之喪公明儀爲志焉褚幕丹質蟻結于四隅殷士也鄭𤣥云畫者之四角其文如蟻行徃來相錯殷之蟻結似今蛇文畫豈蟻裳亦爲此文歟君臣皆吉服然皆有變太保太史太宗皆麻冕彤裳太宗上宗皆大宗伯也彤纁也纁裳亦變也太保承介圭上宗奉同瑁由阼階隮介圭大圭尺有二寸王所守也同爵名瑁四寸王所執以朝諸侯傳顧命授圭瑁當阼階升也太史秉書由賔階隮御王冊命書冊也王在西階上故太史由此以冊御王凡王所臨所服用皆曰御曰皇后馮玉几道揚末命命汝嗣訓臨君周邦率循大卞燮和天下用答揚文武之光訓成王顧命之言書之冊矣此太史口陳者卞法也王再拜興答曰𦕈𦕈予末小子其能而亂四方以敬忌天威乃受同瑁王三宿三祭三咤上宗曰饗太保實三爵於王王受而置之曰宿祭先曰祭至齒而不飲曰咤曰嚌示飲而實不忍也上宗曰饗以嘏王也太保受同降盥以異同易爵而洗也秉璋以酢半珪曰璋太保實此爵以爲王酢已也授宗人同拜宗人小宗伯王答拜太保受同祭嚌宅授宗人同拜宅居其所也王答拜太保降收收徹也諸侯出廟門俟此路寢門也而謂之廟以正殯在焉康王之誥第二十五康王既尸天子遂誥諸侯作康王之誥王出在應門之内出畢門立應門内之中庭南面太保率西方諸侯入應門左畢公率東方諸侯入應門右二公爲二伯各率其所領諸侯隨其方爲位皆北面成王之疾久矣豈西方東方諸侯來問王疾者歟皆布乘黄朱陳四黄馬朱鬛賔稱奉圭兼幣馬所以先圭幣曰一二臣衞敢執壤奠䞇土所出皆再拜稽首王義嗣德答拜王義諸侯不忘先王之德故答拜太保暨芮伯咸進相揖冢宰司徒與羣臣進戒皆再拜稽首曰敢敬告天子皇天改大邦殷之命惟周文武誕受羑若文王出羑里之囚天命自是始順周人記之謂之羑若猶管仲鮑叔願齊威公不忘在莒時也康王生而富貴故於其初即位告以文武造邦之艱難以憂患受命也克恤西土惟新陟王陟升遐也成王未有諡故稱新陟王畢協賞罰戡定厥功用敷遺後人休今王敬之哉張皇六師無壞我高祖寡命王若曰庶邦侯甸男衞惟予一人釗報誥昔君文武丕平富不務咎底至齊信用昭明于天下詩歌文王之德曰陳錫哉周言其布大利以賜天下則天下相率而戴周及其亡也以榮夷公專利今康王所謂丕平富者豈非陳錫布利也歟所謂不務咎者豈非不專利以消怨咎也歟即位而首言此其與成王皆致刑措宜也則亦有熊羆之士不二心之臣保人王家用端命于上帝皇天用訓厥道付畀四方乃命建侯樹屏在我後之人今予一二伯父尚胥暨顧綏爾先公之臣服于先王言諸臣忠於我所以安汝先人事先王者如盤庚告教之意也雖爾身在外乃心罔不在王室用奉恤厥若使我雖宅憂而人無不順者無遺鞠子羞鞠子稚子也羣公既皆聽命相揖趨出王釋冕反喪服成王崩未葬君臣皆冕服禮歟曰非禮也謂之變禮可乎曰不可禮變於不得已嫂非溺終不援也三年之喪既成服釋之而即吉無時而可者曰先王之命不可以不傳既傳不可以喪服受也曰何爲其不可也曰以喪冠者雖三年之喪可也既冠於次入哭踊者三乃出孔子曰將冠子未及期日而有大功齊衰之服則因喪服而冠冠吉一作嘉禮也猶可以喪服行之受顧命見諸侯獨不可以喪服乎太保使大史奉冊授王于次諸侯入哭於路寢而見王於次王喪服受教戒諌哭踊答拜聖人復起不易斯言也始死方殯孝子釋服離次出居路門之外受干戈虎賁之逆此何禮也漢宣帝以庶人入立故遣宗正太僕奉迎以顯異之康王元子也天下莫不知何用此紛紛也春秋傳曰鄭子皮如晉葬晉平公將以幣行子産曰喪安用幣子皮固請以行既葬諸侯之大夫欲因見新君叔向辭之曰大夫之事畢矣而又命孤孤斬焉在衰絰之中其以嘉服見則喪禮未畢其以喪服見是重受弔也大夫將若之何皆無辭以退今康王既以嘉服見諸侯又受乘黄玉帛之幣曽謂盛德之王不若衰世之侯召畢公不如子産叔向乎使周公在必不爲此然則孔子何取於此一書也曰至矣其父子君臣之間教戒深切著明者猶足以爲後世法孔子何爲不取哉然其失禮則不可以不論書傳卷十七
