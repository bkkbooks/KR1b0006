body:
  text: 書傳卷二宋蘇軾撰虞書舜典第二虞舜側微堯聞之聰明將使嗣位厯試諸難作舜典曰若稽古帝舜曰重華協于帝重襲也華文也襲堯之文也濬哲文明溫恭允塞濬深也哲智也塞實也書曰剛而塞詩曰秉心塞淵玄德升聞玄幽也乃命以位慎徽五典五典克從納于百揆百揆時敘賔于四門四門穆穆徽和也五典五教也司徒之事也揆度也書曰有能奮庸熙帝之載使宅百揆亮采惠疇僉曰伯禹作司空而左氏傳亦云使主后土以揆百事則百揆司空之事也四門四方之門也穆穆美也諸侯之來朝者舜賔迎之宗伯之事也納于大麓烈風雷雨弗迷舊説麓録也舜大録萬機之政隂陽和風雨時自漢以來有是説故章帝始置太傅録尚書事而晉以後強臣將篡者為之其源出於此考其所由蓋古文麓作麓故學者誤以為録耳或曰大麓太山麓也古者易姓告代必因泰山除地為墠以告天地故謂之禪其禮既不經見而考書之文則堯見舜為政三年而五典從百揆敘四門穆風雨不迷而後告舜以禪位而舜猶讓不敢當也而堯乃於未告舜禪之前先往太山以易姓告代豈事之實也哉書云烈風雷雨弗迷是天有烈風雷雨而舜弗迷也今乃以為隂陽和風雨時逆其文矣太史公曰堯使舜入山林川澤暴風雷雨舜行不迷此其實也堯之所以試舜者亦多方矣洪水為患使舜入山林相視原隰雷雨大至衆懼失常而舜不迷其度量有絶人者而天地鬼神亦或有以相之歟且帝王之興其受命之祥卓然見於書詩者多矣河圖洛書玄鳥生民之詩豈可謂誣也哉恨學者推之太詳讖緯而後之君子亦矯枉過正舉從而廢之以為王莽公孫述之流沿此作亂使漢不失德莽述何自而起而歸罪三代受命之符亦過矣故夫君子之論取其實而已矣帝曰格汝舜詢事考言乃言底可績三載汝陟帝位格來也詢謀也底致也猶受命而往返而致命也陟升也舜之始見堯也必有以論天下之事其措置當爾其成當如何考三年而其言驗乃致其功舜讓于德弗嗣以德不能繼為讓正月上日受終于文祖上日上旬日也太史公曰文祖堯之太祖也不於其所祖受堯之終必於堯之祖廟有事於祖廟則餘廟可知在璿璣玉衡以齊七政在察也璿美玉也璣衡王者正天文之器可運轉者七政日月五星也肆類于上帝肆遂也類事類也以事告非常祀也凡祀上帝必及地示何以知其然也以郊之有望知之春秋書不郊猶三望傳曰望郊之細也書曰庚戌柴望大告武成柴祀天也望祀山川也而禮成於一日祀山川而不及地此理之必不然者也是以知祀天必及地也詩曰昊天有成命郊祀天地也漢以來學者考之不詳而世主或出其私意五畤祭帝汾隂祀后土而王莽始合祭天地世祖以來或合或否而唐明皇始下詔合祀至于今者疑焉以為莽與明皇始變禮而不知祀天之必及地蓋自舜以來見于經矣禋于六宗望于山川遍于羣神精意以享曰禋宗尊也六宗尊神也所祭不經見諸儒各以意度之皆可疑惟晉張髦以為三昭三穆學者多從其説然以書考之受終之初既有事於文祖其勢必及餘廟豈有獨祭文祖於齊七政之前而别祭餘廟於類上帝之後者乎以此推之則齊七政之後所祭皆天神非人鬼矣孔安國六宗四時也寒暑也日也月也星也水旱也其説自西漢有之意其必有所傳受非臆度者其神名壇位皆不可以禮推猶秦八神漢太乙之類豈區區曲學所能以私意損益者哉春秋不郊猶三望三望分野之星與國中山川乃知古者郊祭天地必及於天地之間所謂尊神者魯諸侯也故三望而已則此禋于六宗望于山川遍于羣神蓋與類上帝為一禮耳又以祭法考之其曰燔柴於泰壇祭天也瘞埋於泰折祭地也則此所謂類于上帝者也埋少牢於泰昭祭時也相近於坎壇祭寒暑也王宮祭日也夜明祭月也幽宗祭星也雩宗祭水旱也則此所謂禋于六宗也四坎壇祭四方也山林川谷丘陵能出雲為風雨見怪物皆曰神有天下者祭百神則此所謂望于山川遍于羣神也祭法所敘蓋郊祀天地從祀諸神之壇位而舜典之章句義疏也故星為幽宗水旱為雩宗合於所謂六宗者但鄭玄曲為異説而改宗為禜不可信也輯五瑞既月乃日覲四嶽羣牧班瑞于羣后輯斂也班還也五瑞五玉也公執桓圭侯執信圭伯執躬圭子執穀璧男執蒲璧既盡也正月之末盡也蓋齊七政類上帝無暇日見諸侯既月無事則四嶽羣牧可以日覲矣古者朝覲贄玉已事則還之故始輯而終班歲二月東巡守至于岱宗柴巡守者巡行諸侯之所守也岱宗泰山也柴燔柴祭天告至也望秩于山川東嶽諸侯境內名山大川如其秩次望祭之五嶽牲祀視三公四瀆視諸侯其餘視伯子男肆覲東后東方諸侯也協時月正日同律度量衡合四時之氣節月之大小日之甲乙使齊一也律十二律也修五禮五玉三帛二生一死贄五禮吉凶軍賔嘉也五玉五瑞也三帛孔安國曰諸侯世子執纁公之孤執玄附庸之君執黃二生卿執羔大夫執堆一死士執雉執以見曰贄如五器卒乃復五器五玉也帛生死則否五月南巡守至于南嶽如岱禮八月西巡守至于西嶽如初十有一月朔巡守至于北嶽如西禮南嶽衡山西嶽華山北嶽恆山歸格于藝祖用特藝祖文祖也特一牛也五載一巡守羣后四朝敷奏以言明試以功車服以庸敷陳也奏進也庸用也諸侯四朝各使陳其言而試其功則賜以車服而用之肇十有二州肇始也禹治水之後舜分兾州為幽州并州分青州為營州封十有二山封封殖也十二州之名山皆禁採伐也濬川象以典刑典刑常刑也殺人者死傷人者刑象其所犯流宥五刑五刑墨劓剕宮辟也作五流之法以宥五刑之輕者墨薄刑也其宥乃至於流乎曰刑者終身不可復而流者有時而釋不賢於刑之乎鞭作官刑官刑以治庶人在官慢於事而未入於刑者朴作教刑朴檟楚也教學者所用也金作贖刑過誤而入於刑與罪疑者皆入金以贖眚災肆赦怙終賊刑易曰無妄行有眚眚亦災也眚災者猶曰不幸非其罪也肆縱也春秋肆大眚是也怙恃也終不改也賊害也不幸而有罪則縱捨之恃惡不悛以害人則刑之欽哉欽哉惟刑之恤哉恤憂也流共工于幽洲幽洲北裔洲水中可居者放歡兜于崇山崇山南裔竄三苗于三危三苗縉雲氏之後為諸侯三危西裔殛鯀于羽山羽山東裔在海中殛誅死也流放竄皆遷也四罪而天下咸服此四凶族也其罪則莫得詳矣至於流且死則非小罪矣然堯不誅而待舜古今以為疑此皆世家巨室其執政用事也久矣非堯始舉而用之苟無大故雖知其惡勢不可去至舜為政而四人者不利乃始為惡於舜之世如管蔡之於周公也歟二十有八載帝乃徂落百姓如喪考妣三載四海遏密八音徂落死也考妣父母也遏絶也密靜也堯年十六即位七十載求禪試三載自正月上日至崩二十八載凡壽一百一十七歲月正元日舜格于文祖月正正月也元日朔日也向告攝今告即位詢于四嶽闢四門明四目達四聰廣視聼於四方咨十有二牧曰食哉惟時十二州之牧所重民食惟是而已柔遠能邇惇德允元而難任人蠻夷率服能讀如不相能之能柔懷遠者使與近者相能惇厚也元善也難拒也任人佞人也惇厚其德信用善人而拒佞人則蠻夷服蓋佞人必好功名不務德而勤遠略也舜曰咨四嶽有能奮庸熙帝之載使宅百揆亮采惠疇奮立也庸功也熙光也載事也有能立功光堯之事者當使宅百揆其能信事而順者誰乎僉曰伯禹作司空帝曰俞咨禹汝平水土惟時懋哉懋勉也禹拜稽首讓于稷契暨臯陶居稷官者棄也契臯陶二臣名帝曰俞汝往哉然其所推之賢不許其讓也帝曰棄黎民阻飢阻險難也汝后稷播時百穀帝曰契百姓不親五品不遜汝作司徒敬敷五教在寬五教父義母慈兄友弟恭子孝以此教民必寬而後可亟則以德為怨否則相率為偽帝曰臯陶蠻夷猾夏寇賊姦宄猾亂也夏華夏也亂在外曰姦在內曰宄汝作士五刑有服五服三就士理官也服從也三就國語所謂三次也大者陳之原野小者致之市朝五流有宅五宅三居惟明克允三居如今律五流其詳不可知矣堯舜以德禮治天下雖有蠻夷寇賊時犯其法然未嘗命將出師時使臯陶作士以五刑三就五流三居之法治之足矣兵既不用度其軍政必宇於農民當時訓農治民之官如十二牧司徒司空之流當兼領其事是以不復立司馬也而或者因謂堯時上與司馬為一官誤矣夫以將帥之任而兼之於理官無時而可也堯獨安能行之帝曰疇若豫工僉曰垂哉帝曰俞咨垂汝共工垂臣名垂拜稽首讓于殳斨暨伯與二臣名帝曰俞往哉汝諧諧宜也帝曰疇若豫上下草木鳥獸上山也下澤也僉曰益哉伯益也帝曰俞咨益汝作朕虞虞掌山澤之官益拜稽首讓于朱虎熊羆二臣名帝曰俞往哉汝諧帝曰咨四嶽有能典朕三禮僉曰伯夷三禮天地人禮伯夷臣名薑姓帝曰俞咨伯汝作秩宗秩序宗廟之官夙夜惟寅直哉惟清書曰伯夷降典折民惟刑禮之所去刑之所取故古者禮官兼折刑夙夜惟寅者為禮也直哉惟清者為刑也惟直則刑清伯拜稽首讓于夔龍二臣名帝曰俞往欽哉帝曰夔命汝典樂教胄子直而溫寬而栗剛而無虐簡而無傲栗莊栗也教者必因其所長而輔其所不足直者患不溫寬者患不栗剛者患虐簡者患傲詩言志歌永言聲依永律和聲言之不足故長言之吟詠其言而樂生焉是謂歌永言聲者樂聲也永者人聲也樂聲升降之節視人聲之所能至則為中聲是謂聲依永永則無節無節則不中律故以律為之節是謂律和聲孔子論玉之德曰叩之有聲清越以長其終詘然樂也夫清越以長者永也其終詘然者律也夫樂固成於此二者歟八音克諧無相奪倫神人以和夔曰於豫擊石拊石百獸率舞此舜命九官之際也無緣夔於此獨稱其功此益稷之文也簡編脫誤復見於此帝曰龍朕堲讒説殄行震驚朕師命汝作納言夙夜出納朕命惟允聖疾也殄絶也絶行猶獨行行之不可繼者也惟讒説獨行為能動衆納言之官聼下言納於上受上言宣於下樞機之官故能為天下言行之帥舜有不問而命臣有不讓而受者皆隨其實也帝曰咨汝二十有二人書曰內有百揆四嶽堯欲使巽朕位則非四人明矣二十二人者蓋十二牧四嶽九官也而舊説以為四人蓋每訪四嶽必僉曰以答之訪者一而答者衆不害四嶽之為一人也欽哉惟時亮天功亮弼也三載考績三考黜陟幽明庶績咸熙分北三苖苖之國左洞庭右彭蠡南方之國也而竄之西裔必竄其君耳其民未也至此治功大成而苖民猶不服故分北之舜生三十為民者三十載徵庸三十歷試三載攝位二十八載通為三十在位五十載陟方乃死堯崩舜服喪三年然後即位蓋年六十二矣在位五十載而崩壽百有一十二説者以為舜巡守南方死於蒼梧之野韓愈以為非其説曰地傾東南巡非陟也陟方者猶曰升遐爾書曰惟新陟王是也傳書者以乃死為陟方之訓蓋其章句而後之學者誤以為經文此説為得之帝釐下土方説居方别生分類作汨作九共九篇稿飫凡逸書不可強通其訓或曰九共九丘也古文丘共相近也其曰述職方以除九丘非也九丘逸矣理或然歟書傳卷二
