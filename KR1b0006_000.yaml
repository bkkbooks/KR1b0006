body:
  text: 書傳書類提要臣等謹案書傳二十卷宋蘇軾撰尚書所載皆帝王大政軾究心經世之學明于事勢而又長于議論故其詮解經義於治亂興亡之故披抉明暢較他經獨為擅長其釋禹貢三江定為南江中江北江本諸鄭康成逺有端緒但未嘗詳審經文考核水道而附益以味别之說遂以啓後人之譏議至于以羲和曠職為二於羿而忠于夏則林之奇宗之以康王之誥服冕為非禮引左傳叔向之言為證則蔡沈取之朱子亦稱其解吕刑篇以荒度作刑為句甚合于理則皆卓然具有特見朱子雖有惜其太簡之說然漢代訓詁文多簡質自孔賈以後徴引始繁軾文如萬斛源泉隨地涌出非不能曼衍其詞當以解經之體詞貴典要故斂才就範但取詞逹而止未可以繁省為優劣也乾隆四十三年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:57c5a4debf3ffe5abf594872506eb62235ebc47e26f034f51d2174a25b53c60d
