body:
  text: 書傳卷十二宋蘇軾撰周書康誥第十一成王既伐管叔蔡叔以殷餘民封康叔作康誥酒誥梓材康叔封文王子封為衛侯惟三月哉生魄周公初基作新大邑于東國洛四方民大和會侯甸男邦采衛百工播民和見士于周百工百官也播民和布法也周禮正月之吉始和布治于邦國都鄙諸侯來朝公行師從故見士于周周公咸勤皆勞來之乃洪大誥治自惟三月哉生魄至此皆洛誥文當在洛誥周公拜手稽首之前何以知之周公東征二年乃克管蔡即以殷餘民封康叔七年而復辟營洛在復辟之歲皆經文明甚則封康叔之時決未營洛又此文終篇初不及營洛之事知簡編脫誤也王若曰孟侯朕其弟小子封孟長也康叔成王叔父而周公弟謂之孟侯則可謂之小子則不可且謂武王為寡兄此豈成王之言蓋周公雖以王命命康叔而其實訓誥皆周公之言也故曰朕其弟小子封惟乃丕顯考文王克明德慎罰不敢侮鰥寡庸庸祗祗威威顯民用可用敬可敬刑可刑以治顯人言敬鰥寡而治强禦也用肇造我區夏越我一二邦以修我西土惟時怙冒怙恃也冒被也聞于上帝帝休天乃大命文王殪戎殷殪殺也戎殷比之戎虜也誕受厥命越厥邦厥民惟時叙乃寡兄朂肆汝小子封在兹東土民與國皆敘乃汝寡有之兄武王朂勉之力言汝小子封承文武之澤乃得列為諸侯也王曰嗚呼封汝念哉今民將在祗遹乃文考紹聞衣德言遹循也紹繼也衣服也繼其所聞而服行其德言也往敷求于殷先哲王用保乂民汝丕遠惟商耉成人宅心知訓别求聞由古先哲王用康保民文王與殷先哲王及商耉成人之德皆遠而易法有以居已而知訓矣則更求殷以前古先哲王之道以安民也𢎞于天若德裕乃身不廢在王命既求古聖賢以𢎞大汝天性順成其德則汝身綽綽然有餘裕矣然終不廢用天子之法令此所謂雖有庇民之大德而有事君之小心也王曰嗚呼小子封恫瘝乃身敬哉恫痛也瘝疾也常若有疾痛在身不忘治也天畏棐忱民情大可見小人難保往盡乃心無康好逸豫乃其乂民天威可畏也然可恃以安者輔誠也誠則天與之者可必矣民歸有道懷有德其情大略可見也然不可恃以安者小人也故盡心於誠以求天輔不可好逸豫以遠小人也我聞曰怨不在大亦不在小惠不惠懋不懋怨無大小不順不勉皆足以致怨已汝惟小子乃服惟𢎞王應保殷民亦惟助王宅天命作新民服事也𢎞廣也應者觀民設教也作治也殷民衛之舊民也武庚之亂征伐之餘民流徙無常居故康叔之國有新民也新誅武庚故命康叔曰汝之事在廣天子之意觀民設教以保安殷民又當助王宅天命治新民也方三監叛周之初天命蓋岌岌矣黜殷而封康叔天命乃定王曰嗚呼封敬明乃罰人有小罪非眚乃惟終自作不典式爾有厥罪小乃不可不殺乃有大罪非終乃惟眚災適爾既道極厥辜時乃不可殺近時學者解此書其意以謂人有小罪非過眚也惟終成其惡非詿誤也乃惟自作不善原其情乃惟不以爾為典式是人當殺之無赦乃有大罪非能終成其惡也乃惟過眚原其情乃惟適爾非敢不以爾為典式也是人當赦之不可殺信如此言周公虐刑殺非死罪且教康叔以人之向背以為喜怒而出入其生死也法當死原情以生之可也法不當死而原情以殺之可乎情之輕重寄於有司之手則人人可殺矣雖大無道嗜殺人之君不立此法而謂周公為之歟吾嘗問之知法者曰此假設法也周公設為甲乙二人皆犯死罪而議其輕重也甲之罪小於乙之謂也非謂其罪不至死也然其罪乃非眚災而惟終之乃惟自作不法而曰法固當爾如是者當據法殺之不可讞也乙之罪雖大然非終之者乃惟眚災適爾適爾者適會其如此也是則真可讞也末世法壞違經背禮然終無許有司論殺小罪之法況使諸侯自以向背為喜怒而專殺非死罪者歟以今世之法考之謀殺已傷雖未殺皆死雖未傷而置人於必死之地亦死鬬殺故殺雖已殺而情可愍者讞過失殺雖已殺皆贖夫以未傷未殺而皆云既殺豈非小罪殺而大罪赦乎豈可以非死罪為小罪也所謂既道極辜者是人之罪重情輕盡道以責備則信有大罪矣而以常情恕之則不可殺孟子曰夫謂非其有而取之為盜者是充類至義之盡也夫充類至義則書之所謂盡道也豫恐後世好殺者以周公為口實故具論之王曰嗚呼封有敘如此則刑有敘也時乃大明服春秋傳曰乃大明服已則不明而殺人以逞不亦難乎惟民其敕懋和敕正也若有疾惟民其畢棄咎若保赤子惟民其康乂非汝封刑人殺人刑人殺人者法也非汝意也無或刑人殺人非汝封雖非汝意然生殺必聽汝不可使在人也又曰劓刵人無或劓刵人劓割鼻刵割耳也言非獨生殺也劓刵亦如此其文略蓋因前之辭也王曰外事汝陳時臬德為內政為外臬闑也凡政事汝當陳此法以為限節也司師兹殷罰有倫司專也專師此則殷罰有倫矣又曰要囚服念五六日至于旬時丕蔽要囚要獄辭也服念至句日為囚求生道也求之旬日而終無生道乃可殺王曰汝陳時臬事罰蔽殷彝汝陳此以限節事罰以蔽殷之常法也用其義刑義殺勿庸以次汝封次就也乃汝盡遜曰時叙惟曰未有遜事常自以為不足也已汝惟小子未其有若汝封之心朕心朕德惟乃知將有以深告之故言我與汝相知如此凡民自得罪冦攘姦宄殺越人于貨暋不畏死越顛越也暋强也罔弗憝憝惡也人無不惡之者王曰封元惡大憝矧惟不孝不友子弗祗服厥父事大傷厥考心于父不能字厥子乃疾厥子于弟弗念天顯乃弗克恭厥兄兄亦不念鞠子哀大不友于弟惟弔兹不于我政人得罪天惟與我民彝大泯亂曰乃其速由文王作罰刑兹無赦不率大戛商紂之後三監之世殷人之父子兄弟以相賊虐為俗周公之意蓋曰孝友民之天性也不孝不友必有以使之子弟固有罪矣而父兄獨無過乎故曰凡民有自棄於姦宄者此固為元惡大憝矣政刑之所治也至于父子兄弟相與為逆亂則治之當有道不可與寇攘同法我將誨其子曰汝不服父事豈不大傷父心又誨其父曰此非汝子乎何疾之深也又誨其弟曰長幼天命也其可不順又誨其兄曰此汝弟也獨不念先父母鞠養劬勞之哀乎人非木石禽犢稍假以日月須其善心油然而生未有不為君子也我獨弔閔此人不幸而得罪於三監之世不得罪於我政人之手天與我民五常之性而吏不知訓以大泯亂乃迫而蹙之曰乃其速由文王作罰刑兹無赦則民將辟罪不暇而父子兄弟益相忿疾至於賊殺而已後雖大戞擊痛傷之民不率也舜命契為司徒曰敬敷五教在寬寬之言緩也五教所以復其天性當緩而不當速也矧惟外庶子訓人禮曰庶子之正於公族者教之以孝弟睦友子愛明父子之義長幼之序言治之以峻急雖國君不能況庶子乎惟厥正人越小臣諸節正人官長也諸節諸符節之吏也乃别播敷造民大譽弗念弗庸瘝厥君時乃引惡惟朕憝汝既不由此道諸臣等又各出私意以布教令要一切之譽不念人之不庸以病厥君如是長惡我亦惡之矣已汝乃其速由兹義率殺亦惟君惟長不能厥家人汝若速用此道以率民民不率則殺之乃是汝為人君長而不能治其家人也越厥小臣外正惟威惟虐大放王命乃非德用乂至於小臣皆為威虐放棄王命此速由兹義率殺之致也汝亦罔不克敬典乃由裕民惟文王之敬忌乃裕民曰我惟有及則豫一人以懌居敬而行寬裕先法文王之所敬畏乃裕民曰我惟有及緩之至也欲速者惟恐不及王曰封爽惟民迪吉康明哉民之迪於吉且安也我時其惟殷先哲王德用康乂民作求作求者為民所求也王弼曰無者求有有者不求所與危者求安安者不求所保火有其炎寒者附之已苟安焉則不寧方來矣是之謂作求矧今民罔迪不適不迪則罔政在厥邦適從也矧今民無有道之而不從者若聽其所為而莫之道則是民為政也王曰封豫惟不可不監告汝德之說于罰之行德有說說者其理之謂也易曰和順于道德而理於義作德而不知其所以然之理則其德若假貸然非已有也已且不能有安能移諸人此罰所以不行也今惟民不靜未戾厥心迪屢未同爽惟天其罰殛我我其不怨惟厥罪無在大亦無在多矧曰其尚顯聞于天同從也戾止也今殷民不靜其心無所止戾道之而屢不從者罪在我也天其罰殛我明矣我其敢怨無曰我無罪罪豈在大與多乎言行之失毫釐為千里況其顯聞於天者乎王曰嗚呼封敬哉無作怨勿用非謀非彝蔽時忱丕則敏德非謀不與衆謀者也非彝非故常者也非謀非彝事之危疑者也忱言所信者也汝當以所信者決危疑不當以危疑決所信也用康乃心顧乃德遠乃猷裕乃以民寧不汝瑕殄汝惟寬裕則民安不汝瑕疵亦不汝遠絶也王曰嗚呼肆汝小子封惟命不于常汝念哉無我殄享無自絶天享也明乃服命明汝車服教令高乃聽聽於先王為高用康乂民王若曰往哉封勿替敬典聽朕告汝乃以殷民世享酒誥第十二王若曰明大命于妹邦妹沫也詩所謂沫之鄉矣在朝歌以北俗化紂德沈湎於酒故以酒戒乃穆考文王文王於世次為穆肇國在西土厥誥毖庶邦庶士越少正御事少正官之副二也朝夕曰祀兹酒朝夕敕之惟祭祀則用酒惟天降命肇我民惟元祀酒行於天下非小物細故也故本之天天始令民知作酒者本為祭祀而已天降威我民用大亂喪德亦罔非酒惟行越小大邦用喪亦罔非酒惟辜文王誥教小子有正有事無彝酒彝常也有正有所繩治也有事有所興作也有正有事無常酒容其飲於燕閒也越庶國飲惟祀德將無醉因祭賜胙乃飲猶曰以德自將無醉也惟曰我民迪小子惟土物愛厥心臧聰聽祖考之彝訓越小大德小子惟一妹土嗣爾股肱純其藝黍稷奔走事厥考厥長肇牽車牛遠服賈用孝養厥父母厥父母慶自洗腆致用酒庶士有正越庶伯君子其爾典聽朕教爾大克羞耉惟君爾乃飲食醉飽丕惟曰爾克永觀省作稽中德爾尚克羞饋祀爾乃自介用逸兹乃允惟王正事之臣兹亦惟天若元德永不忘在王家純大也純其藝黍稷者大修農事也洗腆逸樂之狀也修進也羞耉惟君者猶曰寡君之老也介副也惟曰我民迪於小子之教懷土安居嗇於用物其心無惡以聽祖考之訓小大上下德我小子如一如妹土之民皆竭其股肱之力以繼其上之事或大修農事或遠服商賈以養父母父母洗腆自慶則汝民可以飲食醉飽也汝小子封能自觀省作稽中德常有則於內以察物至又有耆老賢臣可以代汝進饋于廟者則汝亦可以此人自副而休逸飲食醉飽如此則汝小子乃為王正事之臣亦為天所順豫元德之君永世不忘矣飲酒人情之所不免禁而絶之雖聖人有所不能故獨戒其沈湎之禍而開其德飲之樂則其法不廢聖人之禁人也蓋如此王曰封我西土棐徂邦君御事小子尚克用文王教不腆于酒徂往也我西土邦君輔武王同往伐紂者下至於其御事小子皆用文王教不腆于酒故我至于今克受殷之命王曰封我聞惟曰在昔殷先哲王迪畏天顯小民經德秉哲自成湯咸至于帝乙成王畏相惟御事厥棐有恭不敢自暇自逸矧曰其敢崇飲越在外服侯甸男衛邦伯越在內服百僚庶尹惟亞惟服宗工越百姓里居罔敢湎于酒不惟不敢亦不暇惟助成王德顯越尹人祗辟崇聚也宗工大臣也我聞惟曰殷之先王畏天道顯民德常德秉哲自成湯太甲太戊祖乙盤庚武丁帝乙七王皆成德之王皆畏敬其輔相至於御事之臣所以輔王者皆恭敬不敢暇逸况敢聚飲至於外服諸侯內服百僚皆服事其大臣至于百姓大族居于閭里者皆不湎于酒不惟不敢亦不暇惟以助王之顯民德及以助庶尹之祗厥辟也我聞亦惟曰在今後嗣王酣身厥命罔顯于民祗保越怨不易誕惟厥縱淫泆于非彝用燕喪威儀民罔不䀌傷心惟荒腆于酒不惟自息乃逸厥心疾狠不克畏死辜在商邑越殷國滅無罹弗惟德馨香祀登聞于天誕惟民怨庶羣自酒腥聞在上故天降喪于殷罔愛于殷惟逸天非虐惟民自速辜今後嗣王紂也祗適也䀌痛也紂酣樂其身命令不下行于民本以求慢易之樂也然其德適足以為怨仇之保未嘗樂易也紂燕喪其威儀望之不似人君民莫不痛其將亡也而猶荒湎不少休息其心為酒所使忿疾彊狠不復畏死不醉而怒曰奰明醉者常怒也國君醉則殺人士庶人則相殺明酒之能使人怒也紂之怒至於殺其身而不畏惟多罪逋逃萃于商邑上下沈湎及殷之滅此等能無罹乎言與紂俱死也天不聞明德之馨但聞刑戮之腥故天之降喪於殷無所愛愍者皆以其逸耳非天之虐殷人自速其辜也王曰封豫不惟若兹多誥古人有言曰人無於水監當於民監今惟殷墜厥命我其可不大監撫于時撫安也豫惟曰汝劼毖殷獻臣侯甸男衛劼固也堅固汝心敬畏殷賢臣之在侯甸男衛者矧大史友內史友當時二賢臣封所友者越獻臣百宗工及汝之賢臣與凡大臣百執也矧惟爾事服休服采休德也采事也服休以德為事者也服采以事為事者也矧惟若疇圻父疇誰也司馬主封圻曰圻父所以訶問寇敵者賈誼曰陳利兵而誰何薄違農父薄近也違去也司徒訓農敷五教曰農父去民最近也若保宏父保安也宏大也司空斥大都邑曰宏父以保安民居者定辟諸侯以定位為難故春秋傳曰厚問定君於石子又秦伯謂晉惠公入而未定列故周公戒康叔敬畏衆賢士以定位也矧汝剛制于酒酒非剛者不能制厥或誥曰羣飲汝勿佚盡執拘以歸于周豫其殺豫其殺者未必殺也猶今法曰當斬者皆具獄以待命不必死也然必立死法者欲人畏而不敢犯也羣飲蓋亦當時之法有羣聚飲酒謀為大姦者其詳不可得而聞矣如今之法有曰夜聚曉散者皆死罪蓋聚而為妖逆者也使後世不知其詳而徒聞其名凡民夜相過者輒殺之可乎舊說以為羣飲者周人則殺之殷人則勿殺也民同犯一罪而殺其一不殺其一周人其肯服乎民羣飲則死公卿大夫羣飲可不誅乎不誅吏則無以禁民吏民皆誅則桀紂之虐不至於此矣皆事之必不然者豫不可以不論又惟殷之迪諸臣惟工乃湎于酒勿庸殺之姑惟教之有斯明享乃不用我教辭惟我一人弗恤弗蠲乃事時同于殺此謂凡湎于酒而不為他大姦者也不擇殷周而周公特言殷者蓋為妹邦化紂之德諸臣百工皆沉湎而況民乎故凡湎于酒者皆可教不可殺不分殷周也有斯明享者哀敬之意達于民如達于神也如此豈復有不用命者乎若我初不知恤此不潔治其事則是陷民於死同於我殺之也王曰封汝典聽朕毖勿辨乃司民湎于酒禁之難行者莫若酒周公憂之深矣故卒告之曰汝既常聽用我所畏慎者又當專建一司以察沉湎若以泛責羣吏而不辨其司禁必不行矣或曰自漢武帝以來至于今皆有酒禁刑者有至流賞或不資未嘗以少縱而私釀終不能絶也周公獨何以禁之曰周公無所利於酒也以正民德而已甲乙皆笞其子甲之子服乙之子不服何也甲笞其子而責之學乙笞其子而奪之食此周公所以能禁酒也書傳卷十二
