body:
  text: 書傳卷八宋蘇軾撰商書盤庚上第九盤庚五遷將治亳殷民咨胥怨作盤庚三篇咨嗟也盤庚陽甲弟湯遷于亳仲丁遷于囂河亶甲居相祖乙圯于耿而盤庚遷于殷盤庚遷于殷民不適有居祖乙圯于耿盤庚不得不遷而小人懷上故不肯適新居率籲衆戚出矢言籲呼也矢誓也盤庚知民怨故呼衆憂之人而告誓之曰我王來既爰宅于兹重我民無盡劉不能胥匡以生卜稽曰其如台先王有服恪謹天命兹猶不常寧不常厥邑于今五邦今不承于古罔知天之斷命矧曰其克從先王之烈爰於也劉殺也匡救也我先王祖乙既宅於耿耿圯欲遷而不忍曰民勞矣無盡致之死然民終不能相救以生乃稽之卜曰是圯者無若我何我先王自湯以來奄有五服以謹天命之故猶不敢寧居遷者五邦矣今若不承古而遷則天其斷棄我命况能從先王之烈乎若顛木之有由蘖天其永我命于兹新邑紹復先王之大業底綏四方木之蠧病者雖勤於封殖不能使復遂茂顛仆也既仆而蘖生之然後有復盛之道不顛則無所從蘖也言天之欲復興殷必在新邑矣盤庚斆于民由乃在位以常舊服正法度曰無或敢伏小人之攸針斆教也由乃在位者教自有位而下也針規也服事也矇誦工諫士傳言庶人謗于市此先王之舊服正法也今民敢相聚怨誹疑當立新法行權政以一切之威治之盤庚仁人也其下教于民者乃以常舊事而已言不造新令也以正法度而已言不立權政也曰無或敢伏小人之攸針者憂百官有司逆探其意而禁民言也盤庚遷而殷復興用此道歟王命衆悉至于庭王若曰書凡言若曰者非盡當時之言大意若此而已格汝衆豫告汝訓汝猷黜乃心無傲從康謀自抑黜其心無傲無懷安也古我先王亦惟圖任舊人共政此篇數言用耆舊又戒其侮老成以此推之凡不欲遷者皆衆稚且狂也盤庚言非獨我用舊先王亦用舊耳豈可違哉王播告之修不匿厥指王用丕欽罔有逸言民用丕變不仁者鄙慢其民曰民可與樂成難與慮始故為一切之政若雷霆鬼神然使民不知其所從出其肯敷心腹腎腸以與民謀哉今吾布告民以所修之政無所隱匿是大敬民也言之必可行無過也是以信而變從我也逸過也今汝聒聒起信險膚豫弗知乃所訟險者利口相傾覆也孔子曰浸潤之譖膚受之訴不行焉可謂明也已矣巧言之入人如水之漸漬如病之自肌理入也是之謂膚今汝聒聒以險膚之言起信于人將誰訟乎非豫自荒兹德惟汝含德不惕豫一人豫若觀火豫亦拙謀作乃逸荒廣也猶詩曰遂荒大東書曰豫荒度土功也含容也逸過也言汝妄造怨誹若非我自廣此德以遂其事但汝容使汝不惕畏我則我亦不仁矣如觀火作而不救能終不救乎終必撲滅之容爾而不問能終不問乎終必誅絶之不忍于小而忍于大則是我拙謀成汝過也作成也若網在綱有條而不紊若農服田力穡乃亦有秋網無綱縱之亂也農不力穡安於逸也汝克黜乃心施實德于民至于婚友丕乃敢大言汝有積德乃不畏戎毒于逺邇戎大也毒害也商之世家大族造言以害遷者欲以苟悅小民為德也故告之曰是何德之有汝曷不施實德于汝民與汝婚友乎勞而有功此實德也汝能勞而有功則汝乃敢大言曰我有積德如此則汝自得衆而多助豈復畏從我逺遷之大害乎惰農自安不昏作勞不服田畝越其罔有黍稷昏強也汝不和吉言于百姓惟汝自生毒乃敗禍姦宄以自災于厥身乃既先惡于民乃奉其恫汝悔身何及吉善也奉承也恫痛也汝今所施乃惡也非德也當自承其疾痛相時憸民猶胥顧于針言其發有逸口矧豫制乃短長之命憸民小人也小人尚顧針規之言小人違針言其禍敗之發有過於口舌之相傾覆矧豫制汝死生之命而敢違之乎汝曷弗告朕而胥動以浮言恐沈于衆恐動沈溺于衆人若火之燎于原不可嚮邇其猶可撲滅則惟爾衆自作弗靖非豫有咎遲任有言曰人惟求舊器非求舊惟新遲任古賢人言人舊則習器舊則敝當常使舊人用新器我今所以從老成之言而遷新邑也古我先王暨乃祖乃父胥及逸勤豫敢動用非罰我先王與汝祖父同其勞逸我其敢動用非法之罰於其子孫乎世選爾勞豫不掩爾善兹豫大享于先王爾祖其從與享之作福作災豫亦不敢動用非德古者功臣配食於大蒸王言吾固欲選用功臣之子孫也然爾祖與先王同享於廟能作福作災者吾亦不敢動用非德之賞於其子孫也豫告汝于難若射之有志志所射表的也射而無志則孰為中孰為否王事艱難當各分守無為浮言當若射之有志後有以考其功罪也汝無侮老成人無弱孤有幼有又通猶言孤與幼也各長于厥居勉出乃力聽豫一人之作猷無有逺邇汝無侮老弱幼各為久居之計無有逺邇惟豫所謀是從用罪伐厥死用德彰厥善有罪不伐則人將長惡不悛必死而後己故我薄刑小罪者以伐其當死者也邦之臧惟汝衆邦之不臧惟豫一人有佚罰凡爾衆其惟致告國有不善則我有餘罪矣爾衆當盡以告我佚餘也致盡也自今至于後日各恭爾事齊乃位度乃口度法也罰及爾身弗可悔盤庚中第十盤庚作惟涉河作起也以民遷乃話民之弗率民之弗率不以政令齊之而以話言曉之此盤庚之仁也誕告用亶其有衆咸造勿褻在王庭褻慢也盤庚乃登進厥民曰明聽朕言無荒失朕命嗚呼古我前后罔不惟民之承保后胥戚鮮以不浮于天時承敬也古者謂過曰浮浮之言勝也以敬民故民保衛其后相與憂其憂雖有天時之災鮮不以人力勝之也殷降大虐先王不懷厥攸作視民利用遷先王以天降災虐不敢懷安其所作而遷者視民利而已汝曷弗念我古后之聞承汝俾汝惟喜康共非汝有咎比于罰我古后所以敬汝使汝者喜與汝同安耳非為有咎之日使汝同受其罰也豫若籲懷兹新邑亦惟汝故以丕從厥志豫所以召呼懷來新邑之人者亦惟以汝故也將使汝久居而安以大從我志今豫將試以汝遷安定厥邦汝不憂朕心之攸困乃咸大不宣乃心欽念以忱動豫一人爾惟自鞠自苦若乘舟汝弗濟臭厥載困病也鞠窮也汝不憂我心之所病者乃不布心腹敬念以誠動我但作怨誹以自窮苦譬如臨一作流水具一作乘舟能終不濟乎無遲留以臭敗其所載也爾忱不屬惟胥以沈不其或稽自怒曷瘳爾誠不能上達也但相與沈溺莫或考其利害者自怨自怒何損於病乎汝不謀長以思乃災汝誕勸憂汝不謀長策以慮患則是勸憂矣勸憂猶言樂禍也今其有今罔後汝何生在上不謀其長有今而無後汝何以生於民上乎今豫命汝一命汝一德一心也無起穢以自臭起穢者未能臭人先自臭也恐人倚乃身迂乃心豫迓續乃命于天豫豈汝威用奉畜汝衆出怨言者或愚人為人所使故告之曰恐人倚託乃身以為姦迂僻乃心俾迷惑失道豫故導迎汝以續汝命于天豫豈汝威哉以奉養汝衆而已豫念我先神后之勞爾先豫丕克羞爾用懷爾然爾之先祖有勳勞于湯故我大進用爾以懷爾也失于政陳于兹髙后丕乃崇降罪疾曰曷虐朕民陳久也崇大也耿圯而不遷以病我民是失政而久于此也湯必大降罪疾于我以我為虐民也汝萬民乃不生生暨豫一人猷同心先后丕降與汝罪疾曰曷不暨朕幼孫有比樂生興事則其生也厚是謂生生比同德也故有爽德自上其罰汝汝罔能迪非獨先后罰汝也汝有失德天其罰汝汝何道自免乎古我先后既勞乃祖乃父汝共作我畜民汝有戕則在乃心我先后綏乃祖乃父乃祖乃父乃斷棄汝不救乃死則象也汝同我養民而有戕民之象見于心故為鬼神之所斷棄也兹豫有亂政同位具乃貝玉乃祖乃父丕乃告我髙后曰作丕刑于朕孫迪髙后丕乃崇降弗祥亂政猶言亂臣也其者多取而兼有之之謂也春秋傳曰昔平王東遷七姓從王牲用備具王賴之而賜之騂旄之盟鄭子産曰我先君威公與商人皆出自周庸次比耦以艾殺此地斬之蓬蒿藜藿而共處之世有盟誓以相信也曰爾無我叛我無強賈母或丐奪爾有利市寶賄我勿與知蓋遷國危事也方道路之勤營築之勞寶賄暴露而貪吏擾之易以生變故於其將行先盟之鬼神曰凡我亂政同位之臣敢利汝貝玉則其父祖當告我髙后而誅之不獨如此而已王亦自誓于衆曰朕不肩好貨又曰無總于貨寶丁寧如此所以警百官而安民心此古者遷國之法也嗚呼今豫告汝不易永敬大恤無胥絶逺遷國大憂也君臣與民一德一心而後可相絶逺則殆矣汝分猷念以相從各分其事以謀之各設中于乃心中公平也乃有不吉不迪不吉凶人也不迪不道者也顛越不恭行險以犯上者暫遇姦宄劫掠行道為姦者也我乃劓殄滅之輕者劓之重者殄滅之無遺育無俾遺種于兹新邑往哉生生今豫將試以汝遷永建乃家盤庚下第十一盤庚既遷奠厥攸居乃正厥位郊廟朝社之位綏爰有衆曰無戲怠懋建大命生者有以養死者有以葬祭勉立此大命也今豫其敷心腹腎腸歷告爾百姓于朕志罔罪爾衆爾無共怒協比讒言豫一人古我先王將多于前功適于山用降我凶德嘉績于朕邦今我民用蕩析離居罔有定極爾謂朕曷震動萬民以遷古我先王將求多於前人之功故即於髙原近山而居而天降此凶災之德我先王不即遷者嘉與汝民共施功於我舊邦而民終不免流離無所定止我豈無故震動萬民以遷哉肆上帝將復我髙祖之德亂越我家濟及我家也朕及篤敬恭承民命用永地于新邑我當及此時敬承上帝恤民之命以永居於新邑肆豫沖人非廢厥謀弔由靈各非敢違卜用宏兹賁沖童也弔至也靈善也宏大也賁飾也我非敢不與衆謀但至用其善者自遷至於奠居無所不用卜以大此郊廟朝市之飾嗚呼邦伯師長百執事之人尚皆隱哉邦伯諸侯也師長公卿也隱閔也豫其懋簡相爾擇賢以助爾念敬我衆朕不肩好貨敢恭生生鞠人謀人之保居敘欽肩任也不任好貨之人也敢果也恭者必慎果於利慎於厚生之道也鞠人窮人也謀人富人也富則能謀貧富相保而居各以其敘相敬也此教民厚生之道也今我既羞告爾于朕志若否罔有弗欽若順我而遷者也否不順者也無總于貨寶總聚也生生自庸各自用其厚生之道式敷民德永肩一心民不悅而猶為之先王未之有也祖乙圯于耿盤庚不得不遷然使先王處之則動民而民不懼勞民而民不怨盤庚德之衰也其所以信於民者未至故紛紛如此然民怨誹逆命而盤庚終不怒引咎自責益開衆言反覆告諭以口舌代斧鉞忠厚之至此殷所以不亡而復興也後之君子厲民以自用者皆以盤庚藉口豫不可以不論説命上第十二髙宗夢得説使百工營求諸野得諸傅巖作説命三篇髙宗武丁也帝小乙之子傅巖之野在虞虢之間王宅憂諒隂三祀諒信也隂默也居憂信任冢宰而不言既免喪其惟弗言羣臣咸諌于王曰嗚呼知之曰明哲明哲實作則自知曰明知人曰哲天子惟君萬邦百官承式式法也王言惟作命不言臣下罔攸稟令王庸作書以誥曰以台正于四方台恐德弗類兹故弗言恭默思道夢帝賚豫良弼其代豫言信一夢而以天下之政授匹夫此事之至難者也武丁恭默思道神交於上帝得良弼於夢中武丁自信可也天下其孰信之故三年不言既免喪而猶默也夫天子三年不言百官萬民莫不憂懼以待命若大旱之望時雨也故一言而天下信之若神明然昔楚莊王齊威王皆三年不出令而以一言致強霸亦此道也恨其所得非傅説之流是以不王然亦可謂神而明之者矣乃審厥象俾以形旁求于天下説築傅巖之野惟肖爰立作相肖似也史記髙宗得説與之語果聖人乃舉以為相蓋非直以夢而已王置諸其左右命之曰朝夕納誨以輔台德若金用汝作礪若濟巨川用汝作舟楫若嵗大旱用汝作霖雨啓乃心沃朕心渴其言也若藥弗瞑眩厥疾弗瘳若跣弗視地厥足用傷瞑眩憒眊也藥有毒者必瞑眩人所畏也跣不視地為棘茨瓦礫所傷人所不畏也君子為國有革弊去惡之政如用毒藥瞑眩非所畏也謀之不審慮之不周以敗國事如跣不視地以傷足乃所當畏也惟暨乃僚罔不同心以匡乃辟俾率先王迪我髙后以康兆民嗚呼欽豫時命其惟有終説復于王曰惟木從繩則正后從諫則聖后克聖臣不命其承疇敢不祗若王之休命説以匹夫得政而王虛心以待之者如此意其必有髙世絶人之謀今其所以復於王者曰從諫而已大哉仁人之言約而至也唐太宗中主也其事父兄畜妻子正身治家有不正者多矣然所以致刑措其成功去聖人無幾者特以從諫而已説以為此一言可以聖也故首進之以太宗觀之知從諫之可使狂作聖也説命中第十三惟説命總百官乃進于王曰嗚呼明王奉若天道建邦設都樹后王君公承以大夫師長不惟逸豫惟以亂民古之天者皆言民也民不難出其力以食諸侯卿士以養天子者豈獨以逸樂之哉將使濟已也此所以為天道也惟天聰明惟聖時憲惟臣欽若惟民從乂未嘗視也而無不見未嘗聽也而無不聞此天聰明也而聖人法之惟口起羞多言數窮故吉人之辭寡惟甲胄起戎春秋傳曰無戎而城讎必保焉無故而好甲兵民疑且畏致冦之道也惟衣裳在笥笥也篚也皆所以盛衣裳幣帛者也以貢曰篚以賜下曰笥趙簡子曰帝賜我二笥衣裳不藏之府庫而常在笥以待命而賜有功勸其不忘於進善也惟干戈省厥躬苗頑弗即工帝其念哉是也王惟戒兹允兹克明乃罔不休惟治亂在庶官官不及私昵惟其能爵罔及惡德惟其賢慮善以動動惟厥時有其善喪厥善矜其能喪厥功惟事事乃其有備有備無患無啓寵納侮小人有寵則慢其君故啓寵則納侮之道也無恥過作非惟厥攸居政事惟醇居不醇則駁雜之政也史佚曰無始禍無怙亂孔子曰無欲速無見小利顔淵曰無伐善無施勞其語不同此所謂立言者也譬之藥石米粟天下後世其皆以藉口今傅説之言皆散而不一一言一藥皆足以治天下之公患豈獨以訓武丁哉人至于今誦之也黷于祭祀時謂弗欽禮煩則亂事神則難髙宗之祀豐數于近廟故説因以戒之也王曰旨哉説乃言惟服可服行也乃不良于言豫罔聞于行説拜稽首曰非知之艱行之惟艱王忱不艱允協于先王成德惟説不言有厥咎説命下第十四王曰來汝説台小子舊學于甘盤既乃遁于荒野入宅于河自河徂亳暨厥終罔顯古之君子明玉之世而不肯仕蓋有之矣許由不仕堯舜夷齊不仕周商山之老不仕漢懷寶迷邦以終其身是或一道也武丁為太子則學于甘盤武丁即位而甘盤遁去隱于荒野武丁使人求之迹其所往則居河濱自河徂亳不知其所終武丁無與共政者故相説也舊説乃謂武丁遁于荒野武丁為太子而遁決無此理遁則如吳太伯豈復立也哉學者徒見書云其在髙宗時舊勞于外故以武丁為遁小乙使武丁劬勞于外以知艱難決非荒野之遁又以書曰在武丁時則有若甘盤故謂武丁即位而甘盤在也甘盤武丁師也蓋配食其廟其曰在武丁時固宜豈必即位而後師之哉若武丁遁而復立不當云暨厥終罔顯也爾惟訓于朕志若作酒醴爾惟麴蘖若作和羮爾惟鹽梅礪切磨己者也舟楫濟己者也霖雨澤民者也麴蘖鹽梅和而不同者也爾交修豫罔豫棄豫惟克邁乃訓説曰王人求多聞時惟建事學道將以見之行事也非獨知之而已學于古訓乃有獲事不師古以克永世匪説攸聞惟學遜志務時敏厥修乃來允懷于兹道積于厥躬説既勉王以學又憂其所學者非道也故曰惟學遜志遜之言隨也隨其所志而得之志於仁則所得於學者皆仁也志於義則所得於學者皆義也若志於功利則所得於學者皆功利而已智足以飾非辨足以拒諫皆學之力也敏於是則隨其所修而至矣故必先懷仁義之道然後積學以成之惟斆學半王者之學且學且教既以教人因以修其身其功半於學念終始典于學厥德修罔覺積善如長不自覺也監于先王成憲其永無愆惟説式克欽承旁招俊乂列于庶位王曰嗚呼説四海之內咸仰朕德時乃風股肱惟人良臣惟聖以良臣惟聖猶以股肱惟人也昔先正保衡伊尹亦號保衡作我先王乃曰豫弗克俾厥后惟堯舜其心愧恥若撻于市一夫不獲則曰時豫之辜佑我列祖格于皇天爾尚明保豫罔俾阿衡專美有商惟后非賢不乂惟賢非后不食其爾克紹乃辟于先王永綏民説拜稽首曰敢對揚天子之休命髙宗彤日第十五髙宗祭成湯有飛雉升鼎耳而雊祖已訓諸王作髙宗肜日髙宗之訓此一篇亡髙宗肜日越有雊雉祖已曰惟先格王正厥事乃訓于王曰惟天監下民典厥義降年有永有不永非天夭民民中絶命民有不若德不聽罪天既孚命正厥德乃曰其如台嗚呼王司敬民罔非天胤典祀無豐于昵祭之明日又祭殷曰肜周曰繹雊號也格正也典常也孚信也司主也胤嗣也昵親也繹祭之日野雉雊于鼎耳此為神告王以宗廟祭祀之失審矣故祖己以謂當先格王心之非蓋武丁不專修人事數祭以媚神而祭又豐於親廟儉於逺者敬其父薄其祖此失德之大者故傅説祖己皆先格而正之祖己之言曰天之監人有常義無所厚薄而降年有永有不永者非天夭人人或以中道自絶于天也人有不順之德不聽之罪天未即誅絶而以孽祥為符信以正其德人乃不悔禍曰是孽祥其如我何則天必誅絶之矣今王專主於敬民而已數祭無益也夫先王孰非天嗣者常祀而豐于昵其可乎此理明甚而或者乃謂先王遇災異非可以象類求天意獨正其事而已髙宗無所失德惟以豐昵無過此乃諂事世主者言天人本不相與欲以廢洪範五行之説豫以為五行傳未易盡廢也書曰越有雊雉足矣而孔子又記其雊於耳非以耳為祥乎而曰不可以象類求過矣人君於天下無所畏惟天可以警之今乃曰天災不可以象類求我自視無過則已矣為國之害莫大於此豫不可以不論西伯戡黎第十六殷始咎周咎惡也周人乘黎乘勝也黎在上黨壺關祖伊恐奔告于受作西伯戡黎祖已後也受紂也帝乙子西伯文王也戡亦勝也西伯既戡黎祖伊恐奔告于王曰天子天既訖我殷命格人元龜罔敢知吉人至於道為佫人其言與蓍龜同也非先王不相我後人惟王淫戲用自絶故天棄我不有康食不虞天性不迪率典天棄我故天地鬼神無有安食於我者不虞天性者父子之親不相虞度也不迪率典者五典之親不相道率也今我民罔弗欲喪曰天曷不降威大命不摰今王其如台摰鷙也言天何不摰取王乎今王無若我何民不忌王如此王曰嗚呼我生不有命在天祖伊反曰嗚呼乃罪多參在上乃能責命于天天子固有天命以保已今汝罪之聞於天者衆矣天將去汝豈可復責天以保己之命耶殷之即喪指乃功不無戮于爾邦功事也視汝所行之事雖邦人猶當戮汝而况於天乎孔子曰紂之不善不如是之甚也豫乃今知之祖伊之諫盡言不諱漢唐中主所不能容者紂雖不改而終不怒祖伊得全則後世人主有不如紂者多矣微子第十七殷既錯天命錯亂也微子作誥父師少師微子紂兄也父師箕子紂之諸父少師比干也微子若曰父師少師殷其弗或亂正四方我祖底遂陳于上致成其法度以陳示後我用沈酗于酒用亂敗厥德于下殷罔不小大好草竊姦宄卿士師師非度相師於非法凡有辜罪乃罔恆獲小民方興相為敵讎今殷其淪喪若涉大水其無津涯殷遂喪越至于今曰父師少師我其發出狂吾家耄遜于荒今爾無指告豫顛隮若之何其我其奔走去國若狂人然吾家之耆老知紂之必亡而遁于荒野者多矣今爾無意告教我其若顛隮何父師若曰王子天毒降災荒殷邦方興沈酗于酒乃罔畏畏不畏其可畏乎咈其耉長舊有位人今殷民乃攘竊神祗之犧牷牲用以容將食無災色純曰犧體完曰牷牛羊豕曰牲用器也盜天地宗廟之牲器以相容匿且以祭器食而曰無災降監殷民用乂讎斂召敵讎不怠言殷之君臣下視其民若仇讎而聚斂之以此為治力行不怠皆召敵讎之道也罪合于一多瘠罔詔瘠病也君臣為一皆病矣無從告之者商今其有災我興受其敗商其淪喪我罔為臣僕商之有災而未亡也我起而正之則受其禍若其既已也我又無與為臣僕者此所以佯狂而為奴也詔王子出迪我舊云刻子王子弗出我乃顛隮刻害也箕子在帝乙時以微子長且賢欲立之而帝乙不可卒立紂紂忌此兩人故箕子曰子之出固其道也我舊所云者害子子若不出則我與子皆危矣自靖靖安也微子之告箕子若欲與之皆去然箕子曰吾三人者各行其志自用其心之所安者而已人自獻于先王人各自以其意貢于先王微子以去之為續先王之國箕子以為之奴為全先王之嗣比干以諫而死為不負先王也我不顧行遁不念與汝皆行也書傳卷八
