body:
  text: 書傳卷十一宋蘇軾撰周書旅獒第七西旅獻獒太保作旅獒召公也惟克商遂通道于九夷八蠻西旅底貢厥獒西方之國有以獒為貢者旅陳也春秋傳曰庭實旅百犬四尺曰獒太保乃作旅獒用訓于王曰嗚呼明王慎徳四夷咸賓無有逺邇畢獻方物惟服食器用王乃昭徳之致于異姓之邦無替厥服如以肅慎楉矢分陳之類使知王能以徳致四夷之物況諸夏乎分寳玉于伯叔之國時庸展親如以夏后氏之璜分魯之類以布親親之意人不易物惟徳其物同是物也有德則貴無德則賤德盛不狎侮狎侮君子罔以盡人心君使臣以禮狎侮小人罔以盡其力小人學道則易使不役耳目百度惟貞不以聲色為役玩人喪德玩物喪志志以道寧言以道接玩人則人不我敬故喪德玩物則志以物移故喪志志喪則中亂故志以道寧德喪則人離故言以道接不作無益害有益功乃成不貴異物賤用物民乃足民爭為異物以中上好則農工病矣犬馬非其土性不畜珍禽竒獸不育于國不寳遠物則遠人格夷狄性貪故喜亷而畏貪古之循吏能以亷服夷狄者多矣而貪吏亦足以致寇況於王乎周穆王得狼鹿爾而荒服因以不至所寳惟賢則邇人安嗚呼夙夜罔或不勤不矜細行終累大德為山九仞功虧一簣大德細行之積也九仞一簣之積也允迪兹生民保厥居惟乃世王巢伯來朝芮伯作旅巢命芮在馮翊臨晉縣一篇亡金縢第八武王有疾周公作金縢金縢之書緣周公而作非周公作也周公作金縢策書爾既克商二年王有疾弗豫猶言不懌也二公曰我其為王穆卜太公召公也穆敬也周公曰未可以戚我先王二公欲卜於廟周公曰王疾無害未可以憂我先王周公欲自以身禱故以此言拒二公公乃自以為功功事也為三壇同墠築土曰壇除地曰墠為壇於南方北面周公立焉植璧秉圭乃告太王王季文王植置也秉執圭史乃冊祝史太史也冊祝册也告神祝辭書之冊以告曰惟爾元孫某遘厲虐疾若爾三王是有丕予之責于天以旦代某之身某發也丕壯大也言爾三王天必欲取其一壯大子孫者則旦亦丕子也可以代之予仁若考能多材多藝能事鬼神乃元孫不若旦多材多藝不能事鬼神乃命于帝庭敷佑四方用能定爾子孫于下地四方之民罔不祗畏嗚呼無墜天之降寳命我先王亦永有依歸我仁孝能順父祖且多材多藝於事鬼神為宜乃元孫材藝不若旦而有人君德度留以王天下為宜死生有可相代之理世多疑之予觀近世匹夫匹婦為其父母發一至誠之心以動天地鬼神者多矣況周公乎且周公之禱非獨弟為兄臣為君也乃為天下為先王禱也上帝聽而從之無足疑者世之所以疑者以己之多偽而疑聖人之不情也今我即命于元龜爾之許我我其以璧與珪歸俟爾命爾不許我我乃屏璧與珪乃卜三龜一習吉啓籥見書乃并是吉公曰體王其罔害予小子新命于三王惟永終是圖龜之兆吉凶也詳矣故許不許皆聽命于龜已而視龜之體知王之罔害己亦莫之代也故曰予受命于三王王之壽考長終可圖也兹攸俟能念予一人一人者指武王也武王臨天下未久人之念其德者尚淺周公憂其崩而或叛之故欲以身代既見三龜之吉知王之未崩天假之年以紹其德故曰此可以待天下之能念王也公歸乃納冊于金縢之匱中縢緘也以金緘之欲人之不發也王翼日乃瘳武王既喪管叔及其羣弟乃流言於國管叔鮮武王弟也羣弟蔡叔度霍叔處之流也武王崩成王幼周公專國政故羣叔疑而流言也曰公將不利於孺子成王也周公乃告二公曰我之弗辟我無以告我先王辟誅也管叔之當誅者挾殷以叛也周公居東二年則罪人斯得二年而後克明管蔡亦得衆也于後公乃為詩以貽王名之曰鴟鴞豳詩鴟鴞惡鳥也破巢取卵以比管蔡之害王室及成王也王亦未敢誚公未敢誚明其心之疑也秋大熟未穫天大雷電以風禾盡偃大木斯拔邦人大恐王與大夫盡弁以啓金縢之書皮弁也意當時占國休咎之書皆藏金縢故周公納冊于此而成王遇災而懼亦啓此書也乃得周公所自以為功代武王之說二公及王乃問諸史與百執事對曰信噫公命我勿敢言王執書以泣曰其勿穆卜昔公勤勞王家惟予沖人弗及知今天動威以彰周公之德惟朕小子其新逆自新且使人逆公公時尚在東也我國家禮亦宜之王出郊郊告謝罪也天乃雨反風雨降風回天意得而災乃解禾則盡起二公命邦人凡大木所偃盡起而築之歲則大熟大木既拔築之而復生此豈人力之所及哉予以是知天人之不相遠凡災異可以推知其所自五行傳未易盡廢也大誥第九武王崩三監及淮夷叛周公相成王將黜殷作大誥三監管蔡武庚淮夷徐奄之屬也王若曰猷大誥爾多邦越爾御事猷謀也越及也弗弔天降割于我家不少延天弗弔恤我降喪于我邦家不少延武王之命洪惟我幼冲人嗣無疆大歴服弗造哲迪民康矧曰其有能格知天命服事也造至也大哉我幼冲人繼此大歴事也我尚不能至於知人迪哲以安民者况能至於知天命乎已予惟小子若渉淵水予惟往求朕攸濟已矣今予但求所濟而已敷賁敷前人受命兹不忘大功賁飾也我之所敷者以飾敷前人受命而不忘其功也予不敢閉于天降威用天降威三監叛也天欲絶殷故使之叛也寧王遺我大寳龜紹天明即命當時謂武王為寧王以見其克殷寧天下也下文曰乃寧考知其為武王舊說以為文王非也曰前寧人者亦謂武王之舊臣也天降威于殷予不敢隱閉用武王所遺寳龜卜之所以繼天明而待命也曰有大艱于西土西土人亦不靜此龜所以告者也越兹蠢蠢動也及此三監果動殷小腆誕敢紀其叙天降威知我國有疵民不康曰予復反鄙我周邦腆厚也殷少富厚乃敢紀其既亡之叙蓋天降威亦其心知我國有三叔之疵而民不安故欲作難以鄙我周邦也今蠢今翼日民獻有十夫予翼以于敉寧武圖功獻賢也敉撫也四國蠢動之明日民之賢者有十夫來助我求往征四國撫循寧王之武事以圖功也周公之東征邦君卿士皆疑天下騷動而此十夫者至故周公喜之表其人以令天下漢高祖討陳豨至趙得四人皆封之千户曰吾以羽檄徵天下兵未有一人至者吾何愛四千户不以慰趙子弟乎此亦周公之意也我有大事休朕卜并吉肆予告我友邦君越尹氏庶士御事曰予得吉卜予惟以爾庶邦于伐殷逋播臣爾庶邦君越庶士御事罔不反曰艱大民不靜亦惟在王宮邦君室越予小子考翼不可征王害不違卜休羙也尹正也官之表正也翼敬也害曷也詩曰害澣害否我事既羙矣而我卜又吉故告爾以東征殷之叛臣今汝反曰難哉此大事也民之不靜亦惟在王與邦君之家及王之身考德敬事脩已以正之不可征也王曷不違卜而用人言乎肆予沖人永思艱曰嗚呼允蠢鰥寡哀哉予造天役遺大投艱于朕身越予沖人不卬自恤義爾邦君越爾多士尹氏御事綏予曰無毖于恤不可不成乃寧考圖功卬我也毖畏也我聞汝衆言亦永思其難曰是行也信動鰥寡哀哉然予為天子作天之役天實以大艱遺我故勉而從天非我自憂也爾衆人義當以言安我曰無畏此所憂之事惟當一心以成汝寧考所圖之功今乃不然故深責之也已予惟小子不敢替上帝命天休于寧王興我小邦周寧王惟卜用克綏受兹命今天其相民矧亦惟卜用嗚呼天明畏弼我丕丕基已矣予惟不敢替上帝命帝羙寧王之德而興周王惟用卜以安受帝命至于今天其猶助我民況我亦用卜哉天所以動四國明威命者非以困我欲輔成我大業也王曰爾惟舊人爾丕克遠省爾知寧王若勤哉王又特命久老之人逮事武王者曰爾當犬省久遠爾知武王之勤勞若此也哉天閟毖我成功所予不敢不極卒寧王圖事閟閉也天所以閉塞艱礙我國者使我知畏而成功於此我其敢不盡力以終寧王所圖之事哉肆予大化誘我友邦君王告此舊人我已大化誘我友邦君無不從我矣天棐忱辭其考我民予曷其不于前寧人圖功攸終天既助我至誠之辭其必考之於民以驗其實我其可不與寧王之舊臣圖功之所終乎天亦惟用勤毖我民若有疾予曷敢不于前寧人攸受休畢天所以勤勞憂畏我民者使我日夜思念如人有疾之不忘醫也予其可不與前寧人同受休終哉王曰若昔朕其逝朕言艱日思如我本意則昔者已往矣所以至今者以言艱而日思之也若考作室既底法厥子乃弗肯堂矧肯構王以築室喻也父已準望高下程度廣狹以致法矣子乃不肯為基矧肯構屋乎厥父菑厥子乃弗肯播矧肯穫王又以農喻也菑耕也播種也穫斂也厥考翼其肯曰予有後弗棄基父雖敬其事而子不繼其父其肯曰我有後不棄我基乎肆予曷敢不越卬敉寧王大命我其敢不及我身之存以撫循寧王之大命乎若兄考乃有友伐厥子民養其勸弗救養厮養也父兄而與朋友伐其子其家之民養當助父兄歟抑助其子歟其將相勸助其父兄弗救其子也今王與諸侯征伐四國如父兄與朋友伐其子爾衆人孰當助乎王曰嗚呼肆哉爾庶邦君越爾御事肆過也過矣哉爾衆人也不助父而助子爽邦由哲亦惟十人迪知上帝命邦之明乃能用哲今十人歸我而不助彼則帝命可知矣越天棐忱爾時罔敢易法矧今天降戾于周邦惟大艱人誕鄰胥伐于厥室爾亦不知天命不易及天之方輔誠以助我爾時我猶不敢不畏法度矧今天降戾使我大艱難之民與强大之鄰相伐于厥室鄰室相攻可謂急矣汝猶不知天命不易欲安而不問也予永念曰天惟喪殷若檣夫予曷敢不終朕畝天使我喪殷若農夫之去草其敢不盡力乎天亦惟休于前寧人予曷其極卜敢弗于從率寧人有指疆土矧今卜并吉肆朕誕以爾東征天命不僭卜陳惟若兹方是時武王之舊臣皆欲從王征伐故王曰天若欲休息此前寧人者予何敢盡用卜敢不從衆而止乎今寧人指我以疆域所至不可坐受侵略況今卜并吉是天欲征而不欲休也我其必往蓋卜之久矣陳久也盤庚大誥皆違衆自用者所以藉口也使盤庚不遷都周公不攝政天下豈有異議乎平居無事變亂先王之政而民不悅則以盤庚周公自比此王莾所以作大誥也微子之命第十成王既黜殷命殺武庚命微子啓代殷後作微子之命王若曰猷殷王元子惟稽古崇德象賢禮曰繼世以立諸侯象賢也用庶人之賢者不如用世家之賢者民服也統承先王脩其禮物用其正朔禮樂使不失舊物也作賔于王家二王後客禮與國咸休永世無窮嗚呼乃祖成湯克齊聖廣淵齊肅也史記幼而徇齊皇天眷佑誕受厥命撫民以寛除其邪虐功加子時德垂後裔爾惟踐脩厥猷舊有令聞恪慎克孝肅恭神人予嘉乃德曰篤不忘上帝時歆下民祗協予嘉乃德曰若厚而已帝且歆之民且歸之庸建爾于上公尹兹東夏欽哉往敷乃訓慎乃服命服章命令也率由典常以蕃王室𢎞乃烈祖成湯也律乃有民律法也永綏厥位毗于一人世世享德萬邦作式俾我有周無斁嗚呼往哉惟休無替朕命方武庚叛後而封微子微子蓋處可疑之地而命之曰上帝時歆又曰𢎞乃烈祖又曰萬邦作式此三代之事後世所不能及也唐叔得禾異畝同穎獻諸天子王命唐叔歸周公于東作歸禾成王弟唐叔虞也禾各生一壟而合為一穟周公既得命禾旅天子之命作嘉禾二篇亡書傳卷十一
