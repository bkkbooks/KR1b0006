body:
  text: 書傳卷九宋蘇軾撰周書泰誓上第一惟十有一年武王伐殷一月戊午師渡孟津作泰誓三篇文王受命九年而崩武王以大統未集故即位而不改元十一年喪畢觀兵於商而歸至十三年乃復伐商敘所謂十一年武王伐殷者觀兵之事也所謂一月戊午師渡孟津作泰誓者十三年之事也而并為一年言之疑敘文有闕誤惟十有三年春大㑹于孟津王曰嗟我友邦冢君越我御事庶士明聽誓天子有友諸侯之義冢大也御治也惟天地萬物父母惟人萬物之靈亶聰明作元后元后作民父母今商王受弗敬上天降災下民沈湎冒色敢行暴虐罪人以族官人以世孥戮湯事也而罪人以族則為紂罪賞延于世舜德也而官人以世則為紂惡者湯之孥戮徒言之而不用舜之賞延非官人也惟宫室臺榭陂池侈服以殘害于爾萬姓焚炙忠良刳剔孕婦皇天震怒命我文考肅將天威大勳未集肆豫小子發以爾友邦冢君觀政于商或曰武王觀政于商欲紂改過不幸而不悛若其悛也則武王當復北面事之歟曰否文王武王之王也久矣紂若改過不過存其社稷宗廟而封諸商使為二王後也以為武王退而示弱固陋矣而曰復北面事之者亦過也惟受罔有悛心乃夷居安居自若也弗事上帝神祇遺厥先宗廟弗祀犧牲粢盛既于凶盜乃曰吾有民有命罔懲其侮天佑下民作之君作之師惟其克相上帝寵綏四方有罪無罪豫曷敢有越厥志同力度德同德度義力均以德德均以義則知勝負矣受有臣億萬惟億萬心豫有臣三千惟一心商罪貫盈天命誅之豫弗順天厥罪惟鈞豫小子夙夜祗懼受命文考類于上帝宜于冢土冢土社也祭社曰宜以爾有衆底天之罰天矜于民民之所欲天必從之爾尚弼豫一人永清四海時哉弗可失泰誓中第二惟戊午王次于河朔羣后以師畢㑹王乃徇師而誓曰嗚呼西土有衆咸聽朕言我聞吉人為善惟日不足凶人為不善亦惟日不足今商王受力行無度播棄黎老昵比罪人淫酗肆虐臣下化之朋家作仇脅權相滅無辜籲天穢德彰聞惟天惠民惟辟奉天有夏桀弗克若天流毒下國天乃佑命成湯降黜夏命惟受罪浮于桀剝喪元良剝落也喪去也古者謂去國為喪元良微子也微子紂之同母兄而謂之庶子不得立者生於帝乙未即位之前也以禮言之當與紂均為嫡子而微子長故成王命之曰殷王元子賊虐諫輔比干也謂已有天命謂敬不足行謂祭無益謂暴無傷厥監惟不逺在彼夏王天其以豫乂民朕夢協朕卜髙宗言夢文王武王言夢孔子亦言夢者其性情治其夢不亂襲于休祥戎商必克受有億兆夷人離心離德豫有亂臣十人同心同德夷人平民也古今傳十人為文母周公太公召公畢公榮公太顛閎夭散宜生南宫括孔子曰有婦人焉九人而已雖有周親不如仁人十人之中雖有周召之親然皆仁人非以親用也天視自我民視天聽自我民聽百姓有過在豫一人今朕必往我武惟揚侵于之疆取彼凶殘我伐用張于湯有光湯放桀而有慙德今我亦為之湯不愧矣勗哉夫子罔或無畏寧執非敵百姓懍懍若崩厥角勗勉也戒民無輕敵寧執是心曰我不足以敵紂民畏紂之虐若崩厥角也嗚呼乃一德一心立定厥功惟克永世泰誓下第三時厥明戊午之明日也王乃大巡六師明誓衆士王曰嗚呼我西土君子天有顯道厥類惟彰天有明人之道明其類德者今商王受狎侮五常五常五典也狎侮五典以人倫為戲也荒怠弗敬自絶于天結怨于民斫朝涉之脛剖賢人之心作威殺戮毒痡四海痡病也崇信姦回放黜師保屏棄典刑囚奴正士郊社不修宗廟不享作奇技淫巧以悅婦人上帝弗順祝降時喪祝斷也爾其孜孜奉豫一人恭行天罰古人有言曰撫我則后虐我則讎獨夫受洪惟作威乃汝世讎樹德務滋除惡務本滋廣也言止取紂也肆豫小子誕以爾衆士殄殲乃讎爾衆士其尚迪果毅以登乃辟功多有厚賞不迪有顯戮嗚呼惟我文考若日月之照臨光于四方顯于西土惟我有周誕受多方豫克受非豫武惟朕文考無罪受克豫非朕文考有罪惟豫小子無良兵凶事也以武王與紂猶有勝負之憂為文王羞是以先王重用兵也牧誓第四武王戎車三百兩虎賁三百人虎賁猛士也若虎之奔獸與受戰于牧野作牧誓春秋晉與楚戰皆七八百乘武王能以三百乘三百人克紂者其德與政皆勝且諸侯之兵助之者衆也時甲子昧爽王朝至于商郊牧野在朝歌南乃誓王左杖黃鉞右秉白旄以麾黃鉞以金飾也軍中指麾白則見逺王無自用鉞之理以為儀耳故左杖黃鉞麾非右手不能故右秉白旄此事理之常本無異說而學者妄相附致張為議論皆非其實凡若此者不取曰逖矣西土之人逖逺也王曰嗟我友邦冢君御事司徒司馬司空御事治事也指此三卿也六卿止言三古者官不必備或三公兼之亞旅師氏亞旅衆大夫其位次卿師氏亦大夫主以兵守門千夫長百夫長及庸蜀羌髳微盧彭濮人春秋傳楚饑庸與百濮伐之庸上庸縣濮即百濮也又楚伐羅羅與盧戎兩軍之蓋南蠻之屬楚者羌先零罕开之屬彭今屬武陽有彭亡髳微闕則知此數國皆西南之夷稱爾戈比爾干立爾矛豫其誓王曰古人有言曰牝雞無晨牝雞之晨惟家之索今商王受惟婦言是用昏棄厥肆祀弗答肆祀所陳祭祀也祀所以報也故謂之答昏棄厥遺王父母弟不迪王父母及母弟皆先王之遺𦙍不以道遇之也乃惟四方之多罪逋逃是崇是長是信是使是以為大夫卿士俾暴虐于百姓以姦宄于商邑今豫發惟恭行天之罰今日之事不愆于六步七步乃止齊焉夫子勗哉不愆于四伐五伐六伐七伐乃止齊焉孫武言用兵其勢險其節短故不過六步七步四伐五伐六伐七伐必少休而整齊之伐擊刺也勗哉夫子尚桓桓如虎如貔如熊如羆于商郊弗迓克奔以役西土紂師能來奔者勿復迎擊以勞役我西土之人勗哉夫子爾所弗勗其于爾躬有戮武成第五武王伐殷往伐歸獸識其政事作武成自往伐至歸牛馬皆記之惟一月壬辰旁死魄越翼日癸巳王朝步自周于征伐商厥四月哉生明王來自商至于豐壬辰未有事先書旁死魄者記月之生死使千載之日後世可考也厯法以月起故書多記生死朏望皆先事而書所以正厯也乃偃武修文歸馬于華山之陽放牛于桃林之野示天下弗服華山之陽有山川焉然地至險絶可入而不可出桃林之野在華山東亦險阻歸馬牛於此示天下弗服也春秋傳曰天生五材民並用之闕一不可誰能去兵兵不可去則牛馬不可無雖堯舜之世牛馬之政不可不修而武王歸馬休牛倒載干戈包之虎皮示不復用者蓋勢有不得不然者也夫以兵雄天下殺世主而代之雖盛德所在懼者衆矣武庚紂子也殺其父用其子付之以殷民武王知其必叛矣然必用之紂子且用况其餘乎所以安諸侯之懼也楚靈王既縣陳蔡朝諸侯卜曰當得天下民患王之無厭也故從亂如歸知伯夫差皆以此亡戰勝而不己非獨諸侯懼也吾民先叛矣湯武皆畏之故湯以慙德令諸侯曰栗栗危懼若將隕于深淵其敢復言兵乎武王之偃武則湯之慙德也秦漢惟不知此故始皇不及一世而天下亂漢雖不亡然諸侯功臣皆叛髙祖以流矢崩不偃武之過也丁未祀于周廟邦甸侯衛駿奔走執豆籩越三日庚戌柴望大告武成既生魄庶邦冢君暨百工受命于周王若曰嗚呼羣后惟先王建邦啓土公劉克篤前烈至于大王肇基王迹王季其勤王家先王當作先公后稷也或曰先王謂舜也舜始封后稷於邰公劉后稷曾孫鞠之子太王后稷十二世孫公叔祖類之子謂古公亶父也其子王季謂季歷也我文考文王克成厥勳誕膺天命以撫方夏大邦畏其力小邦懷其德惟九年大統未集文王以虞芮質厥成之嵗改元九年而崩豫小子其承厥志底商之罪告于皇天后土所過名山大川曰惟有道曾孫周王發有道指其父祖也將有大正于商今商王受無道暴殄天物害虐蒸民為天下逋逃主萃淵藪天下有罪而逃歸紂者紂皆主之藏如淵藪之聚鳥獸也豫小子既獲仁人謂亂臣十人敢祗承上帝以遏亂略華夏蠻貊罔不率俾恭天成命肆豫東征綏厥士女惟其士女篚厥𤣥黃昭我周王天休震動用附我大邑周惟爾有神尚克相豫以濟兆民無作神羞既戊午師渡孟津癸亥陳于商郊俟天休命甲子昧爽受率其旅若林㑹于牧野罔有敵于我師前徒倒戈攻于後以北血流漂杵紂師自相攻至血流漂杵非武王之罪然孟子不取者謂其應兵也惡其以此自多而言之也一戎衣天下大定乃反商政政由舊釋箕子囚封比干墓式商容閭商容賢者而紂不用車過其閭式以禮之散鹿臺之財發巨橋之粟大賚于四海而萬姓悅服非獨以惠民亦以示不復用兵也列爵惟五公侯伯子男分土惟三公侯百里伯七十里子男五十里自孟子王制皆云爾此周制也鄭子産言列國一同今大國數圻若無侵小何以至焉而周禮乃曰公之地五百里侯四百里伯三百里子二百里男百里凡五等禮曰封周公於曲阜地方七百里皆妄也先儒以謂周衰諸侯相并自以國過大違禮乃除滅舊文而為此說獨鄭𤣥之徒以謂周初因商三等其後周公攘戎狄斥廣中國大封諸侯夫攘戎斥地能拓邊耳自荒服以內諸侯固自如也周公得地于邊而增封于內非動移諸侯遷其城郭廟社安能增封乎知𤣥之妄也而近嵗學者必欲實周禮之言則為之說曰公之地百里而已五百里者并附庸言之夫以五百里之地公居其一而附庸居其四豈有此理哉豫專以書孟子王制及鄭子産之言考之知周禮非聖人之全書明矣建官惟賢位事惟能重民五教惟食喪祭惇信明義崇德報功垂拱而天下治書傳卷九
