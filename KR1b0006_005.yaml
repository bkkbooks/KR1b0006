body:
  text: 書傳卷五宋蘇軾撰夏書禹貢第一禹别九州隨山濬川任土作貢不貢所無及所難得禹敷土敷道修載叙乂皆治也隨山刋木山行多迷刋木以表之且以通道史記云山行表木奠髙山大川奠定也髙山五嶽大川四瀆定其名秩祀禮所視冀州堯河水為患最甚江次之淮次之河行冀兗為多而青徐其下流被害亦甚堯都於冀故禹行自冀始次于兖次于青次于徐四州治而河患衰矣雍豫雖近河以下流既治可以少緩也故次乎揚次乎荆以治江淮江淮治而水患平次于豫次于梁次于雍以治江河上流之餘患而雍最髙故終焉八州皆言自某及某為某州而冀獨否蓋以餘州所至而知之先賦後田不言貢篚皆與餘州異既載壺口治梁及岐壺口在河東屈縣東南梁山在左馮翊夏陽縣西北岐山在扶風美陽縣西北梁岐二山在雍州今於冀州言之者豈當時河患上及梁岐乎禹通砥柱則壺口平而梁岐自治因河而言非以二山為冀州之地也既修太原至于嶽陽太原晉陽也嶽太嶽也亦號霍太山在彘縣東覃懷底績至于衡漳覃懷河內懷縣漳水橫流入河衡橫也濁漳水出長子縣東至鄴入清漳清漳水出上黨沾縣大黽谷東北至渤海阜城縣入河厥土惟白壤無塊曰壤厥賦惟上上錯厥田惟中中賦田所出榖米兵車之類禹貢田賦皆九等此為第一雜出第二之賦冀州畿內也田中中而賦上上理不應爾必當時事有相補除者豈以不貢而多賦耶然不可以臆說也恆衛既從大陸既作恆水出常山上曲陽縣東入滱水衛水出常山靈壽縣東北入滹沱大陸在巨鹿縣北水已復故道則大陸之地可耕作島夷皮服東北海夷也水患除故服皮服夾右碣石入于河碣石海畔山在北平驪城縣西南河自碣石山南渤海之北入海夾挾也自海入河逆流而西右顧碣石如在挾掖也濟河為兗州河濟之間相去不逺兗州之境北距河東南跨濟非止於濟也九河既道河水自平原以北分為九道其名據爾雅則徒駭也太史也馬頰也覆釡也胡蘇也簡也潔也鈎槃也鬲津也漢成帝時河隄都尉許商上書曰古記九河之名有徒駭胡蘇鬲津今見在成平東光鬲縣自鬲津以北至徒駭其間相去二百餘里以許商之言考之徒駭最北鬲津最南蓋徒駭是河之本道東出分為八枝徒駭在成平胡蘇在東光鬲津在鬲縣其餘不可復知也然爾雅九河之次自北而南既知三河之處則其餘六者太史馬頰覆釡當在東光之北成平之南簡潔鈎槃當在東光之南鬲縣之北也其河堙塞時有故道春秋緯寶乾圖云移河為界在齊呂填閼八荒以自廣故鄭𤣥云齊威公塞之同為一河今河間弓髙以東至平原髙津往往有其遺處蓋塞其八枝并使歸於徒駭也雷夏既澤灉沮㑹同灉沮二水雷澤在濟隂城陽縣西北桑土既蠶是降丘宅土厥土黑墳黑而墳起厥草惟繇厥木惟條繇茂也條長也厥田惟中下厥賦貞貞正也賦當隨田髙下此其正也其不相當者蓋必有故如向所云相補除者非其正也此州田中下賦亦中下皆第六作十有三載乃同兗州河患最甚故功後成至于作十有三載厥貢漆絲厥篚織文幣帛盛於篚書曰篚厥𤣥黃浮于濟漯逹于河順流曰浮因水入水曰逹漯水出東郡東武陽縣至樂安千乘縣入海濟水具下文自漯入濟自濟入河海岱惟青州西南至岱宗東北跨海至遼東舜十二州分青為營營州即遼東也漢末公孫度據遼東自號青州刺史嵎夷既略濰淄其道嵎夷即堯典嵎夷也略用功少也濰水出琅邪箕屋山北至都昌縣入海湽水出泰山萊蕪縣原山東北至千乘博昌縣入海厥土白墳海濵廣斥說文云東方謂之斥西方謂之鹵鹵鹹地也厥田惟上下厥賦中上田第三賦第四厥貢鹽絺絺細葛也海物惟錯錯雜也魚蝦之類岱畎絲枲鉛松怪石畎谷也枲麻也鉛錫也怪石石似玉者貢此八物萊夷作牧春秋夾谷之會萊人以兵劫魯侯孔子曰兩君合好而裔夷之俘以兵亂之以是知古者東萊之有夷也牧芻牧也傳曰牧隰臯井衍沃蓋海水患除始芻牧也厥篚檿絲爾雅檿桑山桑惟東萊出此絲以織繒堅韌異常萊人謂之山繭萊夷作牧而後有此故書篚在作牧之後浮于汶逹于濟汶水出太山萊蕪縣西南入濟諸州之末皆記入河水道以堯都在冀而河行於冀也雖不言河濟固逹河也海岱及淮惟徐州東至海北至岱南及淮淮沂其乂蒙羽其藝淮水出桐柏山其原逺矣於此言之者淮水至此而大為害尤甚喜其治故於此記之沂水出泰山蓋縣臨樂子山南至下邳入泗䝉山在泰山蒙隂縣西南羽山在東海祝其縣南二水既治則二山可種大野既豬東原底平大野澤在山陽巨野縣北東原今東平郡也水之停曰豬厥土赤埴墳土黏曰埴草木漸包進長曰漸藂生曰包厥田惟上中厥賦中中田第二賦第五厥貢惟土五色王者封五色土為社建諸侯則以其方色土賜之燾以黃土苴以白茅使歸其國立社羽畎夏翟夏翟雉也羽中旌旄羽山之谷有之嶧陽孤桐東海下邳縣西有葛嶧山即此山也其特生之桐中琴瑟泗濵浮磬泗水依山水中見石若浮於水上此石可為磬淮夷蠙珠暨魚詩有淮夷知古者淮有夷也蠙蚌屬出珠惟淮夷有珠暨魚如萊夷之有檿絲也貢此六物厥篚𤣥纖縞𤣥黑繒縞白繒纖細也浮于淮泗逹于河自淮泗入河必道于汴世謂隋煬帝始通汴入泗禹時無此水道以疑禹貢之言此特學者考之不詳而已謹按前漢書項羽與漢約中分天下割鴻溝以西為漢以東為楚文穎注云於滎陽下引河東南為鴻溝以通宋鄭陳蔡曹衛與濟汝淮泗會於楚即今官渡是也魏武與袁紹相持於官渡乃楚漢分裂之處蓋自秦漢以來有之安知非禹迹耶禹貢九州之末皆記入河水道而淮泗獨不能入河帝都所在理不應爾意其必開此道以通之其後或為鴻溝或為官渡或為汴上下百餘里間不可必然皆引河水而注之淮泗也故王濬伐吳杜預與之書曰足下既摧其西藩當徑取秣陵討纍世之逋寇釋吳人於塗炭自江入淮逾于泗汴泝河而上振旅還都亦曠世一事也王濬舟師之盛古今絶倫而自泗汴泝河可以班師則汴水之大小當不減於今又足以見秦漢魏晉皆有此水道非煬帝創開也自唐以前汴泗會于彭城之東北然後東南入淮近歲汴水直逹于淮不復入泗矣吳王夫差闢溝通水與晉會于黃池而江始有入淮之道禹時則無之故禹貢曰沿于江海逹于淮泗明非自海入淮則江無通淮之道個之末直云浮于淮泗逹于河不言自海則鴻溝官渡汴水之類自禹以來有之明矣淮海惟揚州北跨淮南跨海彭蠡既豬陽鳥攸居陽鳥鴻鴈之屬也避寒就暖九月而南正月而北彭蠡在彭澤西北北方之南南方之北也故陽鳥多留於此三江既入震澤底定三江之入古今皆不明豫以所見考之自豫章而下入于彭蠡而東至海為南江自蜀岷山至于九江彭蠡以入于海為中江自嶓冡導漾東流為漢過三澨大别以入于江東匯澤為彭蠡以入于海為北江此三江自彭蠡以上為二自夏口以上為三江漢合于夏口而與豫章之江皆匯于彭蠡則三江為一過秣陵京口以入于海不復三矣然禹貢猶有三江之名曰北曰中者以味别也蓋此三水性不相入江雖合而水則異故至于今而有三泠之說古今稱唐陸羽知水味三泠相雜而不能欺不可誣也豫又以禹貢之言考之若合符節禹之叙漢水也曰嶓冡導漾東流為漢又東為滄浪之水過三澨至于大别南入于江至于東匯澤為彭蠡東為北江入于海夫漢既已入江且匯為彭蠡矣安能復出為北江以入于海乎知其以味别也禹之敘江水也曰岷山導江東别為沱又東至于澧過九江至于東陵東迤北會于匯東為中江入于海夫江既已與漢合且匯為彭蠡矣安能自别為中江以入于海乎知其以味别也漢為北江岷山之江為中江則豫章之江為南江不言而可知矣禹以味别信乎曰濟水既入于河而溢為滎禹不以味别則安知滎之為濟也堯水之未治也東南皆海豈復有吳越哉及彭蠡既豬三江入海則吳越始有可宅之土水之所鍾獨震澤而已故曰三江既入震澤底定孔安國以為自彭蠡江分為三入震澤為北入于海踈矣蓋安國未嘗南游按經文以意度之不知三江距震澤逺甚決無入理而震澤之大小決不足以受三江也班固曰南江從會稽陽羡東入海北江從會稽毗陵縣北東入海會稽并陽羡有此三江然皆是東南枝流小水自相派别而入海者非禹貢所謂中江北江自彭蠡出者也徒見禹貢有南北中三江之名而不悟一江三泠合流而異味也故雜取枝流小水以應三江之數如使此三者為三江則是與今京口入海之江為四矣京口之江視此三者猶畎澮禹獨遺大而數小何耶篠簜既敷篠竹箭也簜大竹闊節曰簜厥草惟夭厥木惟喬少長曰夭喬髙也厥土惟塗泥厥田惟下下厥賦下上上錯田第九賦第七雜出第六厥貢惟金三品金銀銅瑶琨篠簜瑶琨石似玊者齒革羽毛惟木齒象齒革犀革之類毛旄牛尾之類木楩楠豫章之類貢此數物島夷卉服厥篚織貝南海島夷績草木為服如今吉貝木綿之類其紋斕斑如貝故曰織貝詩曰萋兮斐兮成是貝錦厥包橘柚錫貢小曰橘大曰柚包裹而致也禹貢言錫者三大龜不可常得磬錯不常用而橘柚常貢則勞民害物如漢永平唐天寶荔枝之害矣故皆錫命乃貢沿于江海逹于淮泗逹泗則逹河矣荆及衡陽惟荆州舊有三條之說北條荆山在馮翊懷德縣南南條荆山在南郡臨沮縣東北自南條荆山至衡山之陽為荆州自北條荆山至于河為豫州江漢朝宗于海二水經此州入海百川以海為宗宗尊也九江孔殷九江在今廬江潯陽縣南潯陽記有九江名一曰烏白江二曰蚌江三曰烏江四曰嘉靡江五曰畎江六曰源江七曰廩江八曰提江九曰箘江殷當也得水所當行也沱濳既道爾雅水自江出為沱自漢出為濳南郡枝江縣有沱水尾入江華容縣有夏水首出江尾入沔此荆州之沱濳也蜀郡郫縣有沱江及漢中安陽皆有沱水濳水尾入江漢此梁州之沱濳也孔安國云沱濳發源梁州入荆州孔穎逹云雖於梁州合流還於荆州分出猶如濟水入河還從河出也以安國穎逹之言考之則味别之說古人蓋知之久矣梁州荆州相去數千里非以味則安知其合而復出耶雲土夢作乂春秋傳曰楚子與鄭伯田于江南之夢又曰王寢于雲中則雲與夢二土名也而云雲土夢者古語如此猶曰𤣥纖縞云爾厥土惟塗泥厥田惟下中厥賦上下田第八賦第三厥貢羽毛齒革惟金三品杶幹栝柏杶柘也以為弓幹柏葉松身曰栝礪砥砮丹惟箘簵楛箘簵美竹楛中矢幹貢此十物三邦底貢厥名三邦大國次國小國也杶幹栝柏礪砥砮丹與箘簵楛皆物之重者荆州去冀最逺而江無逹河之道難以必致重物故使此州之國不以大小但致貢其名數而準其物易以輕資致之京師重勞人也包匭菁茅匭匣菁茅以供祭縮酒者厥篚𤣥纁璣組纁絳也三入為纁璣珠類組綬類九江納錫大龜尺二寸曰大龜寶龜也不可常得故錫命乃納之浮于江沱濳漢逾于洛至于南河江無逹河之道捨舟陸行以逹于河故逾于洛自洛則逹河矣河行冀州之南故曰南河荆河惟豫州自北條荆山至河甚近當是跨荆而南猶濟河惟兗州也伊洛瀍澗既入于河伊水出𢎞農盧氏縣東熊耳山東北入洛洛水出𢎞農上洛縣冡領山東北至鞏縣入河瀍水出河南穀城縣濳亭北東南入洛澗水入𢎞農新安縣東南入洛三水入洛洛入河滎波既豬沇水入河溢為滎澤堯時滎澤常波而今始豬也今滎陽在河南春秋衛狄戰于滎澤當在河北孔穎逹謂此澤跨河而南北也導菏澤被孟豬沇水東出于陶丘北又東為菏澤在濟隂定陶縣東孟豬在梁國雎陽縣東北水流溢覆被之厥土惟壤下土墳壚壚疏也或曰黑也厥田惟中上厥賦錯上中田第四賦第二雜出第一厥貢漆枲絺紵貢此四物厥篚纖纊細綿也錫貢磬錯治磬錯也以玉為磬故以此石治之浮于洛逹于河華陽黑水惟梁州自華山之南至黑水皆梁州岷嶓既藝沱濳既道岷山嶓冡皆山名也沱水出于江濳水出于漢二水發源此州而復出於荆州故於荆州亦云蔡蒙旅平蔡蒙二山蒙山在蜀郡青衣縣今曰蒙頂祭山曰旅水患平始祭也和夷底績和夷西南夷名厥土青黎黎黑也厥田惟下上厥賦下中三錯田第七賦第八雜出第七第九厥貢璆鐵銀鏤砮磬璆美玉也鏤剛鐵也可以鏤者熊羆狐貍織皮以罽者曰織以裘者曰皮西傾因桓是來浮于濳逾于沔西傾山名在隴西臨洮縣西南桓水出焉桓入濳濳入河漢始出為漾東南流為沔至漢中東行為漢入于渭亂于河沔在梁州山南而渭在雍州山北沔無入渭之道然按前漢書武帝時人有上書欲通褒斜道及漕事下張湯問之云褒水通沔斜水通渭皆可以漕從南陽下沔入褒褒絶水至斜間百餘里以車轉從斜下渭如此漢中穀可致此則自沔入渭之道也然褒斜之間絶水百餘里故曰逾于沔蓋禹時通謂褒為沔也黑水西河惟雍州西跨黑水東至河河在冀州西弱水既西衆水皆東此水獨西涇屬渭汭涇水入渭屬連也汭水涯也漆沮既從從如少之從長渭大而漆沮小故言從灃水攸同灃渭相若故言同荆岐既旅荆北條荆山也終南惇物至于鳥鼠三山名武功縣東有太一山即終南山有垂山即惇物原隰底績至于豬野詩云度其隰原即此原隰也豳地武威縣東有休屠澤即豬野三危既宅三苗丕敘春秋傳曰先王居檮杌于四裔允姓之姦居于瓜州杜預云允姓之祖與三苗俱放于三危瓜州今敦煌也厥土惟黃壤厥田惟上上厥賦中下田第一賦第六厥貢惟球琳琅玕球琳玉琅玕石而似珠貢此二物浮于積石至于龍門西河會于渭汭積石山在金城河關縣西南河所經也龍門山在馮翊夏陽縣北禹鑿以通河也渭水至長安東北入河河始大自渭汭而下巨舟重載皆可以逹冀州矣織皮崑崙析枝渠搜西戎即叙禹貢之所篚皆在貢後立文而青徐揚三州皆萊夷淮夷島夷所篚此云織皮崑崙析枝渠搜西戎即叙大意與上三州無異蓋言因西戎即叙而後崑崙析枝渠搜三國皆篚織皮但古語有顛倒詳略爾其文當在厥貢惟球琳琅玕之下其浮于績石至于龍門西河會于渭汭三句當在西戎即叙之下以記入河水道結雍州之末簡編脫誤不可不正也導岍及岐至于荆山岍山在扶風即吳嶽也荆山北條荆山也孔子敘禹貢曰禹别九州隨山濬川蓋言此書一篇而三致意也既畢九州之事矣則所謂隨山與濬川者復中言之隨山者隨其地脉而究其終始也何謂地脉曰地之有山猶人之有脉也有近而不相連者有逺而相屬者雖江河不能絶也自秦蒙恬始言地脉而班固馬融王肅治尚書皆有三條之說鄭𤣥則以為四列古之逹者已知此矣北條山道起岍岐而逾于河以至太嶽東盡碣石以入于海是河不能絶也南條之山自嶓冡岷山至于衡山過九江至于敷淺原是江不能絶也皆禹之言卓然見於經者非地脉而何自此以下至敷淺原皆隨山之事也逾于河壺口雷首至于太嶽三山之名也雷首在河東蒲坂南太嶽者霍太山也底柱析城至于王屋底柱在陜東北析城在河東濩澤西南王屋在河東垣縣東北太行恆山至于碣石入于海大行山在河內山陽縣西北恆山在上曲陽縣西北西傾朱圉鳥鼠西傾山在隴西臨洮縣西南朱圉山在天水冀縣南鳥鼠同穴山在隴西首陽縣西南至于太華太華在京兆華隂南熊耳外方桐柏至于陪尾熊耳山在𢎞農盧氏縣東外方嵩髙山也在潁川桐柏在南陽平氏縣東南陪尾山在江夏安陸縣東北導嶓冡至于荆山南條荆山內方至于大别內方山在江夏竟陵縣東北春秋傳曰吳楚夾漢而陳自小别至于大别二别山皆在漢上岷山之陽至于衡山岷山在蜀郡湔氏西衡山在長沙湘南縣東南過九江至于敷淺原豫章歷陵縣南有博陽山即敷淺原導弱水至于合黎餘波入于流沙合黎山在張掖郡刪丹縣弱水自此西至酒泉合黎張掖郡有居延澤在縣東即流沙也自此以下皆濬川之事也所導者九弱水不能載物入居延澤中不復見此水之絶異者也黑水漢水與四瀆皆特入海渭洛皆入河逹冀之道故特記此九者餘不録也導黑水至于三危入于南海黑水得越河入南海者河自積石以西皆多伏流故黑水得越而南也導河積石至于龍門施功發于積石南至于華隂東至于底柱又東至于孟津孟津在河內河陽縣南都道所湊古今以為津東過洛汭至于大伾洛汭洛入河處在河南鞏縣東大伾山在黎陽或曰成臯北過降水至于大陸河至大伾而北降水在信都又北播為九河同為逆河入于海播分也逆迎也既分為九又合為一以一迎八而入于海即渤海也嶓冡導漾東流為漢嶓冡山在梁州南又東為滄浪之水出荆州東南流為滄浪之水即漁父所歌者也過三澨至于大别三澨水在江夏竟陵南入于江觸大别山而南東匯澤為彭蠡匯回也東為北江入于海岷山導江東别為沱江東南流沱東行又東至于澧澧水在荆州楚詞云遺豫佩兮澧浦過九江至于東陵東迤北會于匯迤迤邐也匯彭蠡也東為中江入于海今金山以北取中泠水味既殊絶稱之輕重亦異蓋蜀江所為也導沇水東流為濟入于河溢為滎濟水出河東垣縣王屋山東南至河內武德縣入河竝流而南截河又竝流溢出乃為滎澤也東出于陶丘北陶丘在濟隂定陶西南又東至于菏又東北會于汶汶入濟也又北東入于海導淮自桐柏淮水出胎簪山東北過桐柏胎簪蓋桐柏之傍小山也東會于泗沂東入于海泗水出濟隂乘氏縣至臨淮雎陵縣入淮沂水先入泗泗入淮也導渭自鳥鼠同穴東會于灃灃入渭也灃水出扶風鄠縣東南北過上林苑入渭又東會于涇涇入渭也涇水出安定涇陽縣西東南至馮翊陽陵縣入渭又東過漆沮入于河沮水出北地直路縣東入洛鄭渠在太上皇陵東南濯水入焉俗謂之漆水又謂之漆沮其水東入洛此言東會于灃又東會于涇又東過漆沮者渭水自西而東之次也雍州所云涇屬渭汭漆沮既從灃水攸同者散言境內諸水非西東之次也詩云自土沮漆乃豳地非此漆沮導洛自熊耳東北會于澗瀍又東會于伊又東北入于河九州攸同書同文車同軌四隩既宅隩深也四方深逺者皆可居九山刋旅九川滌源九澤既陂四海會同六府孔修水火金木土榖庶土交正底慎財賦咸則三壤成賦中邦交通也正平準也庶土不通有無則輕重偏矣故交通而平準之九州各則壤之髙下以制國用為賦入之多少中邦諸夏也貢篚有及於四夷者而賦止於諸夏也錫土姓春秋傳曰天子建國因生以賜姓胙之土而命之氏祗台德先不距朕行台我也我以德先之則民敬而不違矣五百里甸服王畿千里面五百里也甸田也為天子治田百里賦納總總藁穟并也最近故納總二百里納銍銍刈也刈其穟不納藁三百里納秸服秸藁也以藁為藉薦之類可服用者四百里粟五百里米稍逺故所納者愈輕五百里侯服此五百里始有諸侯故曰侯服百里采卿大夫之采也二百里男邦與百里采通為二百里也男邦小國也三百里諸侯自三百里以往皆諸侯也諸侯大國次國也小國在內依天子而國大國在外以禦侮也五百里綏服綏安也三百里揆文教二百里奮武衛五百里要服總其大要法不詳也三百里夷雜夷俗也二百里蔡放有罪曰蔡春秋傳曰殺管叔而蔡蔡叔五百里荒服其法荒略三百里蠻二百里流罪大者流于此東漸于海西被于流沙朔南暨聲教訖于四海禹錫𤣥圭告厥成功以五德王天下所從來尚矣黃帝以土故曰黃炎帝以火故曰炎禹以治水得天下故從水而尚黑殷人始以兵王故從金而尚白周人冇流火之祥故從火而尚赤湯用𤣥牡蓋初克夏因其舊也詩云冇客有客亦白其馬是殷尚白也帝錫禹以𤣥圭為水德之瑞是夏尚黑也此五德所尚之色見于經者也書傳卷五
