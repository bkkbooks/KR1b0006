body:
  text: 書傳卷二十宋蘇軾撰周書文侯之命第三十平王錫晉文侯秬鬯圭瓚作文侯之命平王幽王之子宜臼也文侯仇義和其字也以圭為杓柄曰圭瓚王若曰父義和丕顯文武克愼明德昭升于上敷聞在下惟時上帝集厥命于文王亦惟先正克左右昭事厥辟越小大謀猷罔不率從肆先祖懷在位懷安也嗚呼閔豫小子嗣造天丕愆痛幽王犬戎之禍也殄資澤于下民侵戎我國家純殄絶也純大也言無以資給惠利下民民莫為用者故為犬戎所侵害我國家者亦大矣即我御事罔或耆壽俊在厥服西周之所以亡者無人也耆而俊者皆不在位春秋傳曰惡角犀豐滿而近頑童焉豫則罔克曰惟祖惟父其伊恤朕躬諸侯在我祖父行者其誰恤我哉嗚呼有績豫一人有能致功豫一人者乎永綏在位父義和汝克昭乃顯祖謂唐叔也汝肇刑文武用㑹紹乃辟追孝于前文人汝始法文武之道以和㑹紹接我使得追孝于前文人奉祭祀也汝多修扞我于艱多所修完扞衛我于艱難也若汝豫嘉王曰父義和其歸視爾師寧爾邦用賚爾秬鬯一卣彤弓一彤矢百盧弓一盧矢百賜弓矢使得征伐馬四匹父往哉柔逺能邇惠康小民無荒寧簡恤爾都簡閲其士惠恤其民用成爾顯德豫讀文侯篇知東周之不復興也宗周傾覆禍敗極矣平王宜若衛文公越句踐然今其書乃施施焉與平康之世無異春秋傳曰厲王之禍諸侯釋位以問王政宣王有志而後效官讀文侯之篇知平王之無志也唐德宗奉天之難陸贄為作制書武夫悍卒皆為出涕唐是以復興嗚呼平王獨無此臣哉費誓第三十一魯侯伯禽宅曲阜徐夷並興東郊不開作費誓伯禽周公子費在東海郡後為季氏邑非魯近郊蓋當時治兵於費公曰嗟人無譁聽命譁歡也徂兹淮夷徐戎並興成王征淮夷滅奄蓋此徐州之戎及淮浦之夷叛已久矣及伯禽就國則並起攻魯故曰徂兹淮夷徐戎並興徂兹者猶云往者云爾善穀乃甲胄敿乃干無敢不弔備乃弓矢鍛乃戈矛礪乃鋒刃無敢不善􅙀敿鍛礪皆修治也弔精至也今惟淫舍牿牛馬牿所以械牛馬者今當用之於戰故大釋其牿淫大也杜乃擭敜乃穽無敢傷牿牿之傷汝則有常刑擭機檻也敜塞也恐傷此釋牿之牛馬此令軍所在居民也馬牛其風臣妾逋逃勿敢越逐祗復之我商賚汝乃越逐不復汝則有常刑軍亂生於動故軍以各居其所不動為法若牛馬風逸臣妾逋逃而聽其越逐則軍或以亂亦恐姦人規亂我軍故竊牛馬誘臣妾以發之禁其主使不得捕逐則軍自定得此風逃者當敬復其主我當商度有以賜汝若其越逐與其得而不復者皆有常刑無敢寇攘踰垣牆竊馬牛誘臣妾汝則冇常刑甲戌我惟征徐戎峙乃糗糧無敢不逮汝則有大刑魯人三郊三遂峙乃楨幹甲戌我惟築糗糒也師逺行則用之楨幹皆木也所以築者徐戎淮夷近在魯東郊不伐之於郊而載糗糧逺征其國既以甲戌築又以甲戌行何也古來未有知其說者以豫考之伯禽初至魯魯人未附韓信所謂非素拊循士大夫驅市人而戰者若伐之於東郊魯人自戰其地易以敗散築城而守之徐夷必爭使土功不得成故以是日築亦以是日行徐夷方空國寇魯魯侯乃以大兵往攻其巢穴師興之日東郊之圍自解所謂攻其必救築者亦得成功也費誓言征言築而終不言戰蓋妙於用兵周公之子蓋亦多材藝耳無敢不供汝則有無餘刑非殺汝敢不供楨幹則吾之刑汝不遺餘力矣特不殺而已糗糧芻茭不供則軍飢故皆用大刑大刑死刑也楨幹不供比芻糧差緩故用無餘刑而非殺近時學者乃謂無餘刑孥戮其妻子非止殺其身而已夫至於殺而猶不止誰忍言之伯禽周公子也而至於是哉魯人三郊三遂峙乃芻茭無敢不多汝則有大刑言魯人以别之知當時有諸侯之師也楨幹芻茭皆重物故獨使魯人供之三郊三遂南西北方郊遂之人東郊以備寇不供也徐夷作難久矣魯國受其害而以宅伯禽知周公不私其子伯禽生而富貴安佚始侯於魯遇難而能濟達於政練於兵皆見於費誓見周公教子之有方也孔子敘書蓋取此也秦誓第三十二秦穆公伐鄭秦穆公任好晉襄公帥師襄公歡文公子敗諸崤還歸作泰誓秦穆公違蹇叔以貪勤民為晉所敗不殺孟明而復用之悔過自誓孔子蓋有取焉崤在𢎞農澠池縣西公曰嗟我士聽無譁豫誓告汝羣言之首此篇首要言也古人有言曰民訖自若是多盤孔子曰人之言曰豫無樂乎為君惟其言而莫豫違也孔子蓋以為一言而喪邦者此言也民訖自若是民盡順我而不我違樂則樂矣不幾於游盤無度以亡其國如夏太康乎責人斯無難惟受責俾如流是惟艱哉人知聲色之害己也然終好之知藥石之壽已也然終惡之豈好死而惡生哉私欲勝也夫惟少私寡欲者為能受責而不責人是以難也我心之憂日月逾邁若弗云來已犯之惡既成而不可追未遷之善未成而不可補日月逝而不復反我心皇皇若無明日悔之至也惟古之謀人則曰未就豫忌惟今之謀人姑將以為親我視在朝之謀人未見可以就問使我敬畏如古人者故且用今之流親己者而已雖則云然尚猷詢兹黃髮則罔所愆雖不免且用孟明然必訪諸黃髮如蹇叔之流也番番良士旅力既愆我尚有之番番老者雖旅力既愆我猶庶幾得而用之仡仡勇夫射御不違我尚不欲仡仡勇者雖射御不違我猶庶幾疏而逺之惟截截善諞言俾君子易辭我皇多有之諞巧也皇暇也仡仡勇夫且不欲而巧言令色使君子變志易辭者我何暇復多有之哉昧昧我思之如有一介臣斷斷猗無他技其心休休焉其如有容人之有技若已有之人之彥聖其心好之不啻如自其口出是能容之以保我子孫黎民亦職有利哉我昧旦而起則思之矣曰安得是人哉得是人而付之子孫黎民我無恨矣人之有技冒疾以惡之人之彥聖而違之俾不達是不能容以不能保我子孫黎民亦曰殆哉至哉穆公之論此二人也前一人似房𤣥齡後一人似李林甫後之人主鑒此足矣邦之杌隉不安也曰由一人邦之榮懷亦尚一人之慶懷安也書傳卷二十
