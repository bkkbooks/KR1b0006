body:
  text: 書傳卷十八宋蘇軾撰周書畢命第二十六康王命作冊畢分居里成周郊作畢命畢公弼亮四世蓋嘗相文王也至是耄矣而猶勤小物亦可謂盛德也哉惟十有二年六月庚午朏越三日壬申王朝步自宗周至于豐以成周之衆命畢公保釐東郊畢公蓋嘗相文王故康王就豐文王廟命之王若曰嗚呼父師惟文王武王敷大德于天下用克受殷命惟周公左右先王綏定厥家毖殷頑民遷于洛邑密邇王室式化厥訓既歷三紀十二年為一紀世變風移四方無虞豫一人以寧方三監叛天下騷動天子亦不安道有升降政由俗革子思子曰昔吾先君子道隆則從而隆道汚則從而汚伋則安能惟聖人為能與道升降因俗立政也不臧厥臧民罔攸勸惟公懋德克勤小物有道者不以小大變易不忽小物斯不難大事矣弼亮四世正色率下罔不祗師言雖正色不言而自服然常敬衆言也嘉績多于先王自文武時已立功矣豫小子垂拱仰成王曰嗚呼父師今豫祗命公以周公之事往哉旌别淑慝表厥宅里彰善疸惡疸病也樹之風聲弗率訓典殊厥井疆俾克畏慕申畫郊圻愼固封守以康四海政貴有恆辭尚體要不惟好異商俗靡靡利口惟賢餘風未殄公其念哉豫以書考之知商俗似秦俗蓋二世似紂也張釋之諫文帝秦以任刀筆之吏爭以亟疾苛察相高其弊徒文具無惻隱之實以故不聞其過陵夷至於二世天下土崩今以嗇夫口辨而超遷之臣恐天下隨風而靡爭為口辨而無其實凡釋之所論則康王以告畢公者也我聞曰世祿之家鮮克由禮以蕩陵德實悖天道敝化奢麗萬世同流惟惡能及逺故秦之俗至今猶在也秦疑當作殷兹殷庶士席寵惟舊乘勢勝物曰席怙侈滅義服美于人用美物多則為人所畏服鄭子産言伯有用物𢎞而取精多則生為人豪死為厲鬼驕淫矜誇將由惡終雖收放心間之惟艱資富能訓惟以永年富而能訓則可以久安其富惟德惟義時乃大訓不由古訓于何其訓王曰嗚呼父師邦之安危惟兹殷士不剛不柔厥德允修惟周公克愼厥始惟君陳克和厥中惟公克成厥終三后協心同底于道道洽政治澤潤生民四夷左衽罔不咸賴豫小子永膺多福康王以為邦之安危在殷士又以保釐之任為足以澤生民而服四夷其言若過然殷民至此亦不能睥睨周室如三監時矣然猶重其事如此賈誼言秦俗婦乳其兒與翁併踞母取箕帚立而誶語以此痛哭流涕太息以為漢之所憂無大於此者正此意也古之知治體者其論安危蓋如此公其惟時成周建無窮之基亦有無窮之聞子孫訓其成式惟乂嗚呼罔曰弗克惟既厥心罔曰民寡惟愼厥事曰弗克者畏其難而不敢為者也曰民寡者易其事以為不足為者也欽若先王成烈以休于前政前政謂周公君陳也君牙第二十七穆王命君牙為周大司徒作君牙穆王滿康王孫昭王子王若曰嗚呼君牙惟乃祖乃父世篤忠貞服勞王家厥有成績紀于太常周禮司勳凡有功者銘書于王之太常祭于太蒸日月為常惟豫小子嗣守文武成康遺緒亦惟先王之臣克左右亂四方心之憂危若蹈虎尾涉于春冰今命爾豫翼作股肱心膂纘乃舊服無忝祖考𢎞敷五典式和民則爾身克正罔敢弗正民心罔中惟爾之中夏暑雨小民惟曰怨咨冬祁寒小民亦惟曰怨咨厥惟艱哉思其艱以圖其易民乃寧方周之盛越裳氏來朝曰久矣天之無疾風暴雨也中國其有聖人乎方是時四夷之民莫不戴王雖風雨天事非人力者亦歸德於王及其衰也一寒一暑亦惟王之怨是故聖人以民心為存亡一失其心無動而非怨者賞則謂之私罰則謂之虐作德則謂之僞不作則謂之漫出令而不信無事而致謗皆王之咎也夏諺曰吾王不游吾何以休吾王不豫吾何以助游豫且以為德豈復有風雨寒暑之怨乎嗚呼丕顯哉文王謨丕承哉武王烈啓佑我後人咸以正罔缺爾惟敬明乃訓用奉若于先王對揚文武之光命追配于前人王若曰君牙乃惟由先正舊典時式先正周召畢公之流民之治亂在兹率乃祖考之攸行昭乃辟之有乂嗚呼豫讀穆王之書一篇然後知周德之衰有以也夫昭王南征而不復至齊桓公乃以問楚是終穆王之世君弒而賊不討也而王初無憤恥之意乃欲以車轍馬跡周於天下今觀君牙伯冏二書皆無哀痛惻怛之語但曰嗣先人宅丕后而已足以見無道之情非祭公謀父以祈招之詩收王之放心則王不復矣吕刑有哀敬之情蓋在感悔之後時已耄矣冏命第二十八穆王命伯冏為周太僕正作冏命太僕正太御中大夫王若曰伯冏惟豫弗克于德嗣先人宅丕后怵惕惟厲中夜以興思免厥愆昔在文武聰明齊聖小大之臣咸懷忠良其侍御僕從罔匪正人以旦夕承弼厥辟出入起居罔有不欽發號施令罔有不臧下民祗若萬邦咸休惟豫一人無良實賴左右前後有位之士匡其不及繩愆糾謬格其非心俾克紹先烈今豫命汝作大正正于羣僕侍御之臣懋乃后德交修不逮愼簡乃僚無以巧言令色便辟側媚其惟吉士僕臣正厥后克正僕臣諛厥后自聖至哉此言可以補說命之缺也孔子取於君牙伯冏二書者獨斯言歟后德惟臣不德惟臣爾無昵于憸人充耳目之官迪上以非先王之典非人其吉惟貨其吉若時瘝厥官惟爾大弗克祗厥辟惟豫汝辜引小人以昵王人臣不敬莫大於此王曰嗚呼欽哉永弼乃后于彛憲書傳卷十八
