body:
  text: 書傳卷三宋蘇軾撰虞書大禹謨第三臯陶矢厥謨禹成厥功帝舜申之作大禹謨臯陶謨益稷矢陳也申推明之也曰若稽古大禹曰文命敷于四海祗承于帝命敎也以文敎布于四海而繼堯舜以文命為禹名則布于四海者為何事耶曰后克艱厥后臣克艱厥臣政乃乂黎民敏德此禹之言也君臣各艱畏則非辟無自入民利在為善而已故敏於德帝曰俞允若玆嘉言罔攸伏野無遺賢萬邦咸寧君臣無所艱畏則易事而簡賢賢者遁去而善言不敢出矣稽于衆舍己從人不虐無告不廢困窮惟帝時克無告天民之窮者也困窮士之不遇者也帝堯也益曰都帝德廣運乃聖乃神乃武乃文皇天眷命奄有四海為天下君都美也至道必簡至言必近君臣相與艱畏舍己而用衆禮鰥寡達窮士其為德若卑約然此夸者之所小而世俗之所謂無所至也故舜特申之曰是德也惟堯能之他人不能也益又從而賛之曰是德也推而廣之則乃所以為聖神文武而天之所以命堯為天子者特以是耳禹曰惠迪吉從逆凶惟影響惠順也迪道也言吉凶之出於善惡猶影響之生於形聲益曰吁戒哉儆戒無虞虞憂也自其未有憂而戒之矣罔失法度罔游于逸罔淫于樂任賢勿貳去邪勿疑貳不專任也疑謀勿成百志惟熙人之為不善雖小人不能無疑凡疑則己則天下無小人矣人之所以不能大相過者皆好行其所疑也疑謀勿成則凡所志皆卓然光明無可媿者罔違道以千百姓之譽罔咈百姓以從己之欲民至愚而不可欺凡其所毁譽天且以是為聰明而況人君乎違道足以致民毁而已安能求譽哉以是知堯舜之間所謂百姓者皆謂世家大族也好行小慧以求譽於此固不足恤以為不足恤而縱欲以戾之亦殆矣咈戾也無怠無荒四夷來王九州之外世一見曰王國語日祭月祀時享歲貢終王禹曰於帝念哉德惟善政政在養民水火金木土穀惟脩所謂六府正德利用厚生惟和所謂三事也春秋傳曰民生厚而德正用利而事節正德者管子所謂倉廩實而知禮節衣食足而知榮辱也利用利器用也厚生時使薄斂也使民之賴其生也者厚也民薄其生則不難犯上矣利用厚生而後民德正先言正德者德不正雖有粟吾得而食諸九功惟敘九敘惟歌戒之用休董之用威勸之以九歌俾勿壞先事而語曰戒休恩也董督也太史公曰沐浴膏澤而歌詠勤苦古之治民者於其勤苦之事則歌之使忘其勞九功之歌意其若豳詩也歟帝曰俞地平天成六府三事允治萬世永賴時乃功水土治曰平五行敘曰成賴利也乃汝也帝曰格汝禹朕宅帝位三十有三載耄期倦于勤八十九十曰耄百年曰期頤汝惟不怠總朕師禹曰朕德罔克民不依臯陶邁種德德乃降黎民懷之帝念哉念兹在兹釋兹在兹名言兹在兹允出兹在玆惟帝念功邁遠也降下也種德者如農夫之種殖也衆人之種其德也近朝種而莫穫則其報亦狹矣臯陶之種其德也遠造次顛沛未嘗不在於德而不求其報也及其充溢而不已則沛然下及於民而民懷之聖人之德必始於念故曰帝念哉念兹者固在兹矣及其念之至也則雖釋而不念亦未嘗不在兹也其始也念仁而仁念義而義及其至也不念而自仁義也是謂念兹在兹釋兹在兹名言者其辭命也允出者其情實也孔子曰名之必可言言之必可行是之謂名言名之以仁固仁矣名之以義固義矣是謂名言兹在兹及其念之至也不待名言而情實皆仁義也是謂允出兹在兹此帝念念不忘之功也故曰惟帝念功禹既以是推臯陶之德因以是敎帝也曰邁種德者其德不可以一二數也念之而已念之至者念與不念未嘗不在德也其外之辭命其中之情實皆德也而德不可勝用矣孔子曰非禮勿視非禮勿聽非禮勿言非禮勿動一出於禮而仁不可勝用矣舜禹臯陶之微言其傳於孔子者蓋如此帝曰臯陶惟兹臣庶罔或干予正干犯也汝作士明于五刑以弼五敎期于予治刑期于無刑民協于中時乃功懋哉期至也臯陶曰帝德罔愆臨下以簡御衆以寛罰弗及嗣賞延于世宥過無大刑故無小罪疑惟輕功疑惟重與其殺不辜寧失不經好生之德洽于民心兹用不犯于有司帝因禹之讓臯陶故推其功而勉之臯陶憂天下後世以刑為足以治也故推明其所自以為非帝之至德不能至也帝曰俾予從欲以治四方風動惟乃之休帝之所欲欲民仁而壽且富也風動者如風動物而物不病也帝曰來禹降水儆予成允成功惟汝賢降當作洚孟子曰洚水者洪水也天以洪水儆予而禹平之使聲敎信于四海克勤于邦克儉于家不自滿假惟汝賢假大也汝惟不矜天下莫與汝爭能汝惟不伐天下莫與汝爭功予懋乃德嘉乃丕績天之厯數在爾躬汝終陟元后人心惟危道心惟微惟精惟一允執厥中人心衆人之心也喜怒哀樂之類是也道心本心也能生喜怒哀樂者也安危生於喜怒治亂寄於哀樂是心之發有動天地傷隂陽之和者亦可謂危矣至於本心果安在哉為有耶為無耶有則生喜怒哀樂者非本心矣無則孰生喜怒哀樂者故夫本心學者不可以力求而達者可以自得也可不謂微乎舜戒禹曰吾將使汝從人心乎則人心危而不可據使汝從道心乎則道心微而不可見夫心豈有二哉不精故也精則一矣子思子曰喜怒哀樂之未發謂之中發而皆中節謂之和中也者天下之大本也和也者天下之達道也致中和天地位焉萬物育焉夫喜怒哀樂之未發是莫可名言者子思名之曰中以為本心之表著古之為道者必識此心養之有道則卓然可見於至微之中矣夫苟見此心則喜怒哀樂無非道者是之謂和喜則為仁怒則為義哀則為禮樂則為樂無所往而不為盛德之事其位天地育萬物豈足恠哉若夫道心隱微而人心為主喜怒哀樂各隨其欲其禍可勝言哉道心即人心也人心即道心也放之則二精之則一桀紂非無道心也放之而已堯舜非無人心也精之而已舜之所謂道心者子思之所謂中也舜之所謂人心者子思之所謂和也無稽之言勿聽弗詢之謀勿庸可愛非君可畏非民衆非元后何戴后非衆罔與守邦欽哉慎乃有位敬脩其可願人之所願與聖人同而不脩其可以得所願者孟子所謂惡濕而居下惡醉而强酒也四海困窮天祿永終舜之授禹也天下可謂治矣而曰四海困窮者託於不能以讓禹也惟口出好興戎朕言不再好爵禄也戎兵刑也吾言非苟而已喜則為爵禄怒則為兵刑其為授禹也決矣禹曰枚卜功臣枚厯也惟吉之從帝曰禹官占惟先蔽志昆命于元龜蔽斷也昆後也使卜筮之官占是事必先斷志而後令龜朕志先定詢謀僉同鬼神其依龜筮協從其者意之之詞也以龜協從知之卜不習吉習因也卜已吉而更卜為習吉禹拜稽首固辭帝曰毋惟汝諧正月朔旦受命于神宗堯之所從受天下者曰文祖舜之所從受天下者曰神宗受天下於人必告於其人之所從受者禮曰有虞氏禘黄帝而郊嚳祖顓頊而宗堯則神宗為堯明矣舜禹之受天下於堯舜也及堯舜之存而受命於其祖宗矣舜受命二十八年而堯崩禹受命十七年而舜崩既崩三年然後退而避其子是猶足信乎率百官若帝之初帝曰咨禹惟時有苗弗率汝徂征率循也徂往也禹乃會羣后誓于師曰濟濟有衆咸聽朕命蠢兹有苗蠢動也昏迷不恭侮慢自賢反道敗德君子在野小人在位民棄不保天降之咎肆予以爾衆士奉辭伐罪爾尚一乃心力尚庶幾也其克有勲三旬苗民逆命益賛于禹曰惟德動天無遠弗届屇至也滿招損謙受益時乃天道帝初于歴山往于田日號泣于旻天于父母負罪引慝祗載見瞽瞍夔夔齊慄瞽亦允若夔夔敬懼貌也至諴感神以誠感物曰諴矧兹有苗禹拜昌言曰俞昌言盛德之言也班師振旅班還也入曰振旅帝乃誕敷文德誕大也舞干羽于兩階干楯也羽翳也兩階賔主之階也七旬有苗格世傳汲冡書以堯舜為幽囚野死而伊尹為太甲所殺或以為信然學者雖非之而心疑其說考之於書禹既受命于神宗出征三苖而反帝猶在位脩文德舞干羽以來有苖此豈逼禪也哉臯陶謨第四曰若稽古臯陶曰允迪厥德謨明弼諧迪蹈也謨謀也弼正也諧和也言世所稱臯陶之德臯陶信蹈而行之非虚名也其為人謀也明其正人之失也和皆臯陶之德也書言若稽古者四蓋史之為此書也曰吾順孝古昔而得其為人之大凡如此在堯曰放勲欽明文思安安允恭克讓光被四表格于上下在舜曰重華協于帝濬哲文明溫恭允塞在禹曰文命敷于四海祗承于帝在臯陶曰允迪厥德謨明弼諧皆有虞氏之世史官記其所聞之辭也有虞氏之世而謂舜臯陶為古可乎曰自今已上皆古也何必異代春秋傳凡虞書皆曰夏書則此書作於夏氏之世亦不可知也禹曰俞如何允迪厥德謨明弼諧者史之所述非臯陶之言也而禹曰俞所然者誰乎此其間必有闕文者矣臯陶有言而禹然之且問之簡編脫壞而失之耳臯陶曰都慎厥身脩思永慎其身之所脩者思其久遠之至者禮曰君子過言則民作辭過動則民作則故言必慮其所終行必稽其所敝惇敘九族庶明勵翼邇可遠在兹惇厚也敘次也庶明衆顯者謂近臣也勵勉也翼輔也自脩身以及九族近臣此邇可遠之道也禹拜昌言曰俞盛德之言故拜臯陶曰都在知人在安民禹曰吁咸若時惟帝其難之知人則哲能官人安民則惠􅀺民懷之能哲而惠何憂乎驩兜何遷乎有苖何畏乎巧言令色孔壬孔甚也壬佞也臯陶曰都亦行有九德亦言其人有德乃言曰載采采人有可知之道而無可知之法如蕭何之識韓信此豈有法可學哉故聖人不敢言知人輕用人而不疑與疑人而不用皆足以敗國而亡家然卒無知人之法以諸葛亮之賢而短於知人況其下者乎人主欲常有為則事繁而民亂欲常無為則政荒而國削自古及今兵强國治而民安者無有也人之難安如此此禹之所畏堯舜之所病也臯陶曰然豈可以畏其難而不求其術乎蓋亦嘗試以九德求之亦行有九德者以此自脩也亦言其人有德者以此求人也論其人則曰斯人也有某德言其德則曰是德也有某事某事采者事也載采采者歴言之也禹曰何臯陶曰寛而栗栗懼也寛者患不戒懼柔而立愿而恭愿慤也慤者或不恭亂而敬横流而濟曰亂故才過人可以濟大難者曰亂亂臣十人是也才過人者患在於夸傲擾而毅擾馴也直而温簡而亷簡易者或無亷隅剛而塞塞實也剛者或色厲而内荏故以實為貴易曰剛徤篤實輝光日新其德彊而義彰厥有常吉哉德惟一動罔不吉故常於是德然後為吉也日宣三德夙夜浚明有家宣達也浚盡其才也明察其心也言九德之中得三人而宣逹之盡其才而察其心則卿大夫之家可得而治也日嚴祗敬六德亮采有邦得六人而嚴憚敬用之信任以事則諸侯之國可得而治也翕受敷施九德咸事俊乂在官百僚師師百工惟時撫于五辰庶績其凝翕合也有治才曰乂撫循也五辰四時也凝成也九德竝至文武更進剛柔雜用則以能合而受之為難能合而受之矣則以能行其言為難故曰翕受敷施九德咸事此天子之事也古之知言者忘言而取意故言無不通後之學士膠於言而責其必然故多礙多礙故多説天子用九德諸侯用六大夫用三言不得不爾而其實未必然也孔子曰天子有爭臣七人諸侯五人大夫三人使諸侯而有爭臣七人可得謂之􅆫天子乎故觀書者取其意而已或曰臯陶之九德區區剛柔之迹耳何足以與知人之哲乎然則臯陶何為立此言也曰何獨臯陶舜命夔曰直而溫寛而栗剛而無虐簡而無傲箕子敎武王正直剛克柔克沉濳剛克高明柔克雖三聖之所陳詳略不同然皆以長短相輔剛柔相濟為不知人者立寡過之法也其意曰不知人者以此觀人恭其短長剛柔而用之可以無大失矣譬如藥之有方聚衆毒而治一病君臣相使畏惡相制幸則愈疾不幸亦不至殺人者此豈為秦越人華陀設乎無敎逸欲有邦兢兢業業一日二日萬幾事無不待敎而成惟國君之逸欲莫有以敎之者而自能也位不期驕祿不期侈故一日二日之間而可致危亡者至於無數幾危也無曠庶官天工人其代之天有是事則人有此官官非其人與無官同是廢天事也而可乎天敘有典勑我五典五惇哉勑正也天秩有禮自我五禮五庸哉秩亦敘也庸常也同寅協恭和衷哉寅敬也衷誠也天命有德五服五章哉天討有罪五刑五用哉政事懋哉懋哉懋勉也父義母慈兄友弟恭子孝皆出於民性之自然孰為此敘者非天乎我特從而正之使益厚耳豺獺之敬啁啾之悲交際之歡攘奪之怒牝牡之好此五禮之所從出也孰為此秩者非天乎我特從而脩之使有常耳此二者道德之事非君臣同其誠敬莫能致也五等車服天所以命有德而我章之刑罰天所以討有罪而我用之此二者政事也勉之而已天聰明自我民聰明天明畏自我民明威達于上下敬哉有土上帝付耳目於民者以其衆而無私也民所喜怒威福行焉自天子達不避貴賤有土者可不敬哉臯陶曰朕言惠惠順也可底行禹曰俞乃言底可績臯陶曰予未有知思曰賛賛襄哉曰當作日書傳卷三
