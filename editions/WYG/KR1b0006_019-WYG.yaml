front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1b0006_WYG_019-1a, image: WYG0054/WYG0054-0653c.png}
body:
  text: 書傳卷十九宋蘇軾撰周書吕刑第二十九吕命穆王訓夏贖刑作吕刑穆王命吕侯作此書史記作甫侯堯舜之刑至禹明備後王德衰而政煩故稍増重積累世之漸非一人之意也至周公時五刑之屬各五百周公非不能改以從夏蓋世習重法而驟輕之則姦民肆而良民病矣及成康刑措穆王之末姦益衰少而後乃敢改也周禮之刑二千五百穆王之三千雖増其科條而入墨劓者多入宫辟者少也贖者疑赦之罰耳然訓刑必以贖者非贖之鍰數無以爲五刑輕重之率也如今世徒流皆折杖非以杖數折不知徒流増減之率也吕刑孝經禮記皆作甫刑説者謂吕侯後封甫詩之申甫是也惟吕命王享國百年耄荒度作刑以詰四方刑必老者制之以其更事而仁也耄荒度作刑者以耄年而大度作刑猶禹曰予荒度土功度約也猶漢高祖約法三章也王曰若古有訓蚩尤惟始作亂延及于平民罔不寇賊鴟義姦宄奪攘矯䖍炎帝世衰蚩尤作亂黄帝誅之自蚩尤以前未有以兵强天下者鴟義以鷙殺爲義如後世所謂俠也矯詐䖍劉也凡民爲姦者皆祖蚩尤苗民弗用靈制以刑惟作五虐之刑曰法殺戮無辜爰始淫爲劓刵㭬黥越兹麗刑并制罔差有辭蚩尤既倡民爲姦苗民又不用善但過作劓鼻刵耳㭬竅黥面殺戮五虐之刑而謂之法苟麗於法者必刑之并制無罪不復以寃訴爲差别有辭無辭皆刑之也自苗民以前亦未有作五虐之刑者故舉此二人以爲亂始民興胥漸冺冺棼棼罔中于信以覆詛盟人無所訴則訴於鬼神德衰政亂則鬼神制世民相與反覆詛盟而已虐威庶戮方告無辜于上上帝監民罔有馨香德刑無德刑之香也發聞惟腥皇帝哀矜庶戮之不辜報虐以威遏絶苗民無世在下皇帝堯也分北三苗遷其君於三危乃命重黎絶地天通民瀆於詛盟祭祀家爲巫史堯乃命重黎授時勸農而禁淫祀人神不復相亂故曰絶地天通重黎即羲和也罔有降格號之亡也有神降于莘蓋此類也羣后之逮在下明明棐常鰥寡無蓋自諸侯以及其臣下皆脩明人事而輔常道故鰥寡無蔽塞之者皇帝清問下民鰥寡有辭于苗國無政天子欲聞民言豈易得其實哉故政清而後民可問也德威惟畏德明惟明非德之威所謂虐也非德之明所謂察也乃命三后恤功于民伯夷降典折民惟刑失禮則入刑禮刑一物也折折衷也禹平水土主名山川稷降播種農殖嘉穀三后成功惟殷于民殷富也士制百姓于刑之中以教祗德士臯陶也穆穆在上明明在下灼于四方罔不惟德之勤故乃明于刑之中率乂于民棐彝典獄非訖于威惟訖于富訖盡也威貴有勢者乘富貴之勢以爲姦不可以不盡法非盡于威則盡于富其餘貧賤者則容有所不盡也敬忌罔有擇言在身惟克天德自作元命配享在下脩其敬畏至於口無擇言此盛德之士也何以貴之於典獄曰獄賤事也而聖人盡心焉其德入人之深動天地感鬼神無大於獄者故盛德之士皆屑爲之臯陶逺矣莫得其詳如漢張釋之于定國唐徐有功民皆自以爲不寃其不信之信幾於聖與仁者豈非口無擇言身無擇行之人哉若斯人者將與天合德子孫其必有興者非自作元命配享在下而何漢楊賜辭廷尉之命曰三后成功惟殷于民臯陶不與焉蓋吝之也書蓋以爲惟克天德自作元命者何吝之有此俗儒妄論也或然之不可以不辨王曰嗟四方司政典獄非爾惟作天牧爲天牧民非爾而誰今爾何監非時伯夷播刑之迪其今爾何懲惟時苗民匪察于獄之麗麗于獄輒刑之不復察也罔擇吉人觀于五刑之中惟時庶威奪貨貴者以威亂政富者以貨奪法斷制五刑以亂無辜上帝不蠲降咎于苗苗民無辭于罰乃絶厥世言當以伯夷爲監苗民爲戒也王曰嗚呼念之哉伯父伯兄仲叔季弟幼子童孫皆聽朕言庶有格命諸侯羣臣自其父行至于兄弟子孫皆聽朕言庶以格天命今爾罔不由慰日勤爾罔或戒不勤獄非盡心力不得其實故無獄不以勤爲主由用也爾當用獄吏慰安之而日愈勤者不當用戒敕之而終不勤者天齊于民俾我一日非終惟終在人刑獄非所恃以爲治也天以是整齊亂民而已蓋使我爲一日之用非究竟要道也可恃以終者其惟得人乎爾尚敬逆天命以奉我一人雖畏勿畏雖休勿休休喜也典獄者不可以冇所畏喜惟敬五刑以成三德一人冇慶兆民賴之其寧惟永三德洪範三德也以刑成德王有慶民冇利則其安長久也王曰吁來有邦有土告爾祥刑祥善也在今爾安百姓何擇非人何敬非刑何度非及罪非已造爲人所累曰及秦漢之間謂之逮此最爲政者所當愼故特立此法謂之及因有大獄獄吏以多殺爲功以不遺支黨爲忠胥史皁𨽻以多逮廣繫爲利故古者大獄有萬人者國之安危運祚長短或寄於此故曰何度非及度其非同惡者則勿逮可也兩造具備師聽五辭訟者兩至則士聽其辭五辭簡孚正于五刑簡核也孚審慮也簡孚而無辭乃正五刑五刑不簡正于五罰罰贖也五罰不服正于五過過失則當宥也五過之疵惟官惟反惟内惟貨惟來其罪惟均其審克之刑之而不服則贖贖之而不服則宥無不可者但恐其有疵弊耳官者更爲請求也反者報也報德怨也内女謁也貨鬻獄也來親友徃來者爲言也法當同坐故曰其罪惟均克勝也勝其非也五刑之疑有赦五罰之疑有赦其審克之簡孚有衆惟貌有稽既簡且孚衆證之矣口服而貌不服此必有故不可以不稽也無簡不聽初無核實之狀則此獄不當聽也具嚴天威所以如此者畏天威也墨辟疑赦其罰百鍰閲實其罪刻其顙而涅之曰墨六兩曰鍰劓辟疑赦其罰惟倍閲實其罪截鼻爲劓倍之爲二百鍰剕辟疑赦其罰倍差閲實其罪刖足曰剕倍之又半之爲五百鍰宫辟疑赦其罰六百鍰閲實其罪宫淫刑也男子腐婦人閉大辟疑赦其罰千鍰閲實其罪大辟死刑也五刑疑則入罰不降相因古之制也所謂疑者其罪既閲實矣而於用法疑耳墨罰之屬千劓罰之屬千剕罰之屬五百宫罰之屬三百大辟之罰其屬二百墨劓剕宫辟皆眞刑也罰者罰應贖者也屬類也凡五刑五罰之罪皆分門而類別之也五刑之屬三千周禮五刑之屬二千五百而此三千孝經據而用之是孔子以夏刑爲正也上下比罪比例也以上下罪參驗而立例也無僭亂辭僭差也亂辭辭與情違者也勿用不行立法必用衆人所能者然後法行若責人以所不能則是以不可行者爲法也惟察惟法其審克之察我心也法國法也内合我心外合國法乃爲得之上刑適輕下服下刑適重上服世或謂大罪法重而情輕則服下刑此猶可也不失爲仁若小罪法輕情重而服上刑則不可古之用刑者有出於法内無入於法外與其殺不辜寧失不經故知此説之非也請設爲甲乙以解此二言甲初欲爲强盜既至其所則不强而竊當以竊法坐之此之謂上刑適輕下服乙初欲竊爾既至其所則强當以强法坐之此之謂下刑適重上服刑貴稱罪報其所犯之功不報其所犯之意也輕重諸罰有權一人同時而犯二罪一罪應剕一罪應劓劓剕不並論當以一重剕之而已然是人所犯劓罪應刑剕罪應贖則刑之歟抑贖之歟蓋當其劓罪而贖其餘何謂餘曰劓之罰二百鍰既刑之矣則又贖三百鍰以足剕罰五百鍰之數以此爲率如權石之推移以求輕重之詳故曰輕重諸罰有權刑罰世輕世重惟齊非齊有倫有要穆王復古而不是古變今而不非今厚之至也曰各隨世輕重而已民有犯罪於改法之前而論法於今日者可復齊於一乎舊法輕則從舊今法輕則從今任其不齊所以爲齊也倫者其例也要者其辭也辭例相參考必有以處之矣罰懲非死人極于病時有議新法之輕多罰而少刑恐不足以懲姦者故王言罰之所懲雖非殺之也而民出重贖已極于病言如是亦足矣非佞折獄惟良折獄罔非在中佞口給也良精也辯者服其口不服其心也察辭于差事之眞者不謀而同從其差者而詰之多得其情非從惟從囹圄之中何求而不得固有畏吏甚者寧死而不辯故囚之言惟吏是從者皆非其實不可用也哀敬折獄明啟刑書胥占咸庶中正律令當令獄囚及僚吏明見相與占考之庶幾共得其中正也其刑其罰其審克之獄成而孚輸而孚輪不成也囚無罪如傾瀉出之也孚審慮也成與不成皆當與衆審慮也其刑上備有并兩刑其上刑已有餘罪矣則并兩刑從一重論王曰嗚呼敬之哉官伯族姓呼其大官大族而戒之朕言多懼民命之存亡天意之喜怒國本之安危在焉不得不懼朕敬于刑有德惟刑今天相民作配在下明清于單辭民之亂罔不中聽獄之兩辭欲濟民于險難者當竭其中以聽兩辭也無或私家于獄之兩辭獄貨非寳惟府辜功報以庶尤永畏惟罰非天不中惟人在命天罰不極庶民罔有令政在于天下府聚也辜功猶言罪狀也古者論罪有功意功其迹狀也言獄貨非所以爲寳也但與汝典獄者聚罪狀耳我報汝以衆罪而所當長畏者天罰也非天不中惟汝罪在人命也天既罰汝不中之罪則民皆咎我我無復有善政在天下矣王曰嗚呼嗣孫今徃何監非德于民之中尚明聽之哉王耄矣諸侯多其孫矣自今當安所監非以此德爲民中乎哲人惟刑古之哲人無不以刑作德者無疆之辭屬于五極咸中有慶無窮之聞必由五刑咸得其中則有慶五極五常也受王嘉師監于兹祥刑嘉善也王所以能輕刑者以民善故也書傳卷十九
