body:
  text: 書傳卷十五宋蘇軾撰周書君奭第十八召公為保周公為師相成王為左右三公論道左右相任事周公召公以師保為左右相召公不悦周公作君奭舊說或謂召公疑周公陋哉斯言也方周公攝政管蔡流言周公晏然不自疑當時大臣亦莫之疑者何獨召公也今已復子明辟召公復何疑乎然則何為不悦也功成身退天之道也故伊尹既復政則告歸而周公不歸此召公所以不悦也然則周公何以不歸也察成王之德未可以舍而去也周公齊百官以從王而王之所用悉其私人受敎於王者此其德豈能離師輔而弗反也哉故召公之不悅為周公謀也人臣之常道也而周公之不歸為周謀也宗臣之深憂也召公豈獨欲周公之歸哉蓋亦欲因復辟之初而退老於厥邑特以周公未歸故不敢也何以知之此書非獨周公自言其當留亦多留召公語以此知召公欲去也周公若曰君奭弗弔天降喪于殷殷既墜厥命我有周既受我不敢知曰厥基永孚于休若天棐忱我亦不敢知曰其終出于不祥嗚呼君已曰時我我亦不敢寧于上帝命弗永遠念天威越我民罔尤違惟人周公昔甞告召公曰天其將使周室永孚于休歟抑將終出於不祥歟皆未可知也于時召公答曰是在我而已我若能祗上帝命不敢荒寧則天永孚于休若其以念我天威及使我民無所尤違則天將終出于不祥此皆在人而已今我不去正為此耳故舉其昔言以喻之在我後嗣子孫大弗克㳟上下遏佚前人光在家不知天命不易天難諶乃其墜命弗克經歴嗣前人㳟明德此皆罪成王之言在察也遏絶也佚失也經厯厯年長久言我察成王之德大未能事天地遏絶放失前人之光明蓋生於深宮之中不知天命不易我若去之其將弗永年矣周公蓋以丕視功載知其如此在今予小子旦非克有正迪惟前人光施于我沖子沖子之不正吾亦安能正之哉獨示之以前人光明之德使不習于下流其為正也大矣又曰天不可信我道惟寧王德延天不庸釋于文王受命天命不常我所以輔成王之道惟以延武王之德使天下不捨文王所受之命也公曰君奭我聞在昔成湯既受命時則有若伊尹格于皇天在太甲時則有若保衡即伊尹也在太戊時則有若伊陟臣扈格于上帝湯初克夏欲遷夏社作臣扈之篇湯享國十三年又七年而太甲立太甲享國三十二年又更四帝乃至太戊而臣扈猶在豈非夀百餘歲哉巫咸乂王家在祖乙時則有若巫賢賢亦巫咸之子孫在武丁時則有若甘盤殷有聖賢之君七此獨言五下文云殷禮陟配天豈配祀于天者止此五王而其臣皆配食於廟乎在武丁時不言傅説豈傅説不配食於配天之王乎其詳不可得而聞矣率惟兹有陳保乂有殷故殷禮陟配天多歴年所陳久也陟升遐也言此諸臣為政不久則不能保乂有殷且使其王升遐則配天致殷有天下多歴年所此周公所以久留之意也天惟純佑命則商實百姓王人罔不秉德明恤小臣屏侯甸矧咸奔走惟兹惟德稱用乂厥辟故一人有事于四方若卜筮罔不是孚此明主賢臣為政既久則天乃為純佑者是命商之百族大姓及王臣之微者實皆秉德明恤以至于小臣藩屏侯甸者皆得其人況於奔走執事之臣皆以此道此德舉用乂厥辟以上下同德故有事于四方則民信之若蓍龜然此又周公久留之意也公曰君奭天夀平格保乂有殷有殷嗣天滅威天夀此中宗高宗祖甲和平至道之王使保乂有殷此三王皆能繼天滅威滅威者除害也今汝永念則有固命厥亂明我新造邦汝若憂思深長則天命乃可堅固汝其念有以濟明我邦者公曰君奭在昔上帝割申勸寧王之德其集大命于厥躬寧王武王也天降割喪文王申勸武王之德而集天命也惟文王尚克脩和我有夏諸夏也亦惟有若虢叔王季子文王弟有若閎夭有若散宜生有若泰顛有若南宫括五人皆賢臣有道德者不及太公望者太公專治兵事功臣非周公所法也又曰無能往來兹迪彝敎文王蔑德降于國人此五人者文王疏附先後奔走禦侮之友也故曰文王若不能與此五人者往來使以常道敎文王則無德以降于國人也亦惟純佑秉德迪知天威乃惟時昭文王迪見冐聞于上帝惟時受有殷命哉迪見者以道顯也冐聞者以德被天下聞也武王惟兹四人虢叔亡矣尚迪有祿後暨武王誕將天威咸劉厥敵惟兹四人昭武王惟冐丕單稱德凡周德之所被及者其民盡稱誦武王也今在予小子旦若游大川予往暨汝奭其濟小子同未在位誕無我責游大川者必濟而後已令予與汝奭同濟小子其可以中流而止乎收罔朂不及耉造德不降我則鳴鳥不聞矧曰其有能格周人以鸑鷟鳴於􅄮山為文王受命之符故其詩曰鳯皇鳴矣于彼高岡我與汝奭皆文王舊臣同聞鳴鳥者也我與汝同聞見受命之符而今又同輔孺子其可以不俟王業之大成而言去乎我當收蓄成王不勉不及之心又當留汝奭耉老成人以自助汝若不降意小留則是天不欲我終王業定天命也天如不欲我終王業定天命則當時必不使我與汝同聞鳴鳥矣況能格于皇天乎公曰嗚呼君肆其監于兹我受命無疆惟休亦大惟艱告君乃猷裕我謀廣我意不以後人迷公曰前人敷乃心乃悉命汝作汝民極曰汝明朂偶王在亶乘兹大命惟文王德丕承無疆之恤周公與召公同受武王顧命輔成王故周公曰前人敷其心腹以命汝位三公以為民極且曰汝當明朂孺子如耕之有偶也在於相信如車之有馭也并力一心以載天命念文考之舊德以丕承無疆之憂武王之言如此而可以求去乎公曰君告汝朕允告汝以我誠心保奭其汝克敬以予監于殷喪大否殷之喪其否塞大亂至於如此可不懼乎肆念我天威予不允惟若兹誥予惟曰襄我二人襄成也予本不欲如此告也予惟曰王業之成在我與汝二人而已汝有合哉言曰在時二人天休滋至惟時二人弗戡汝聞我言而心有合也曰信如我言在我二人而已然今天方保周王室日昌大在我二人受此福乎德勝福則安福勝德則危今天休滋至恐二人德不能勝也由此知召公之不悅蓋以滿溢為憂也其汝克敬德明我俊民在讓後人于丕時周公言汝奭以滿溢為憂乎則當求俊民而顯明之他日讓此後人惟昌大之時而去未晚也嗚呼篤棐時二人我式克至于今日休以我二人厚輔之故周室乃有今日之休我咸成文王功于不怠丕冐海隅出日罔不率俾我以今日之休為未足也惟至於日月所照莫不祗服乃已也公曰君予不惠若兹多誥惠猶言願也予惟用閔于天越民予惟哀天命之不終及民之無辜也公曰嗚呼君惟乃知民德亦罔不能厥初惟其終祗若兹往敬用治蔡仲之命第十九蔡叔既沒王命蔡仲踐諸侯位作蔡仲之命蔡叔死于囚不得稱沒仲為卿士無囚父用子之理蓋釋之矣仲踐蔡叔之舊國以鮮為始封之君則周既赦其罪矣故得稱沒惟周公位冡宰正百工羣叔流言乃致辟管叔于商囚蔡叔于郭鄰郭虢也周禮六遂五家為鄰以車七乘降霍叔于庶人三年不齒周公不以流言殺骨肉若管叔不挾武庚以叛亦不誅也蔡叔囚而不誅至子乃封霍叔降而不囚三年復封之霍此周公治親之道也蔡仲克庸祗德周公以為卿士叔卒乃命諸王邦之蔡蔡叔未卒仲無君國之理蒯瞶在而輒立衛是以亂孔子將為政於衛必以正名為先則周公封蔡仲必在叔卒之後也王若曰小子胡惟爾率德改行克慎厥猷肆予命爾侯于東土往即乃封敬哉爾尚蓋前人之愆惟忠惟孝爾乃邁迹自身邁德自已使人可以循迹而法汝也克勤無怠以垂憲乃後率乃祖文王之彝訓無若爾考之違王命皇天無親惟德是輔民心無常惟惠之懷為善不同同歸于治為惡不同同歸于亂爾其戒哉慎厥初惟厥終終以不困不惟厥終終以困窮懋乃攸績睦乃四鄰以蕃王室以和兄弟康濟小民率自中無作聰明亂舊章中情也治國濟民皆以情不以偽也中不足則必彊諸外故作聰明而實聰明者未嘗亂舊章也詳乃視聽罔以側言改厥度以一偏之言而改其常度非其本心也生於視聴之不審爾故患在欲速不在緩緩則視聽審而事無不中矣則予一人汝嘉王曰嗚呼小子胡汝往哉無荒棄朕命成王東伐淮夷遂踐奄作成王政踐滅也成王既踐奄將遷其君於蒲姑周公告召公作將蒲姑晏子謂齊景公古之居此者有蒲姑氏樂安縣北有蒲姑城二篇亡多方第二十成王歸自奄在宗周誥庶邦作多方自大誥康誥酒誥梓材召洛誥多士多方八篇雖所誥不一然大略以殷人不心服周而作也予讀泰誓牧誓武成常怪周取殷之易及讀此八篇又怪周安殷之難也多方所告不止殷人乃及四方之士是紛紛焉不心服者非獨殷人也予乃今知湯已下七王之德深矣方紂之虐人如在膏火中歸周如流不暇念先王之德及天下粗定人自膏火中出即念殷先七王如父母雖以武王周公之聖相繼撫之而莫能禁也夫以西漢道德比之殷猶珷玞之與羙玉也然王莽公孫述隗囂之流終不能使人忘漢光武之成功若建瓴然使周無周公則殷之復興也必矣此周公之所以畏而不敢去也惟五月丁亥王來自奄至于宗周周公曰王若曰猷告爾四國多方惟爾殷侯尹民周公以王命告諸侯及凡尹民者我惟大降爾命爾罔不知大降爾命謂誅三監黜殷時也洪惟圖天之命弗永寅念于祀圗天之命猶曰徼福于天小人之求福者必以祭祀念汝殷人大惟徼福于天而不念敬祀是求非望也惟帝降格于夏有夏誕厥逸不肯慼言于民帝非不降格于夏而夏乃大厥逸無憂民之言雖無憂民之心而有其言民猶不怒天猶赦之猶賢於初無言者棄民之深也乃大淫昏不克終日勸于帝之迪桀未嘗肯以一日之力勉行順天之道乃爾攸聞厥圗帝之命不克開于民之麗麗著也奠民之居王政之本民不土著雖堯舜不能使無亂桀之所以徼福于天者皆非其道未嘗開衣食之源以定民居也乃大降罰崇亂有夏因甲于内亂甲始也亂自内起不克靈承于旅罔丕惟進之恭洪舒于民古者謂大祭祀曰旅言不能承祀天地鬼神又不知進德之恭而大慢于民也亦惟有夏之民叨懫日欽劓割夏色叨貪也懫忿也尊用此人使劓割夏邑天惟時求民主乃大降顯休命于成湯刑殄有夏惟天不畀純不與桀者亦大矣乃惟以爾多方之義民不克永于多享義民正人也桀所害者皆正人天以此故不可使桀永年而多享也惟夏之恭多士大不克明保享于民桀之所尊用者皆不能知保享于民之道也乃胥惟虐于民至于百為大不克開開明也乃惟成湯克以爾多方簡代夏作民主簡至也慎厥麗乃勸厥民刑用勸以至于帝乙罔不明德慎罰亦克用勸要囚殄戮多罪亦克用勸開釋無辜亦克用勸自湯以來皆謹土著之政民既奠居則刑罰可以勸而況於賞乎今至于爾辟弗克以爾多方享天之命嗚呼王若曰誥告爾多方非天庸釋有夏非天庸釋有殷乃惟爾辟以爾多方大淫圖天之命屑有辭屑輕也紂責命于天輕出怨天之辭乃惟有夏圖厥政不集于享天降時喪有邦間之夏政不享于天則其諸侯間而取之亦如今殷之為周取也乃惟爾商後王逸厥逸圖厥政不蠲烝天惟降時喪蠲潔也烝升也其升聞于天者不潔也惟聖罔念作狂惟狂克念作聖世未甞有自狂作聖自聖作狂之人而有自聖作狂自狂作聖之道在念不念之間耳天惟五年須暇之子孫誕作民主罔可念聽須待也暇間也武王服喪三年還師二年天佑殷之子孫以此五年暇以待之夫聖狂之間如反覆手而況五年之久足以悔禍復天命矣紂惟曰我民主也其若我何其言無可念聽者天惟求爾多方大動以威開厥顧天惟爾多方罔堪顧之惟我周王靈承于旅克堪用德惟典神天天惟式敎我用休簡畀殷命尹爾多方今我曷敢多誥我惟大降爾四國民命爾曷不忱裕之于爾多方爾曷不夾介乂我周王享天之命夾輔也介助也今爾尚宅爾宅畋爾田爾曷不惠王熙天之命爾乃迪屢不静爾心未愛道爾而數不静者以爾心未仁也爾乃不大宅天命爾乃屑播天命輕棄天命也爾乃自作不典圖忱于正我惟時其敎告之我惟時其戰要囚之我欲汝信于正故敎告之不改則戰恐要囚之至于再至于三乃有不用我降爾命我乃其大罰殛之非我有周秉德不康寧乃惟爾自速辜王曰嗚呼猷告爾有方多士暨殷多士今爾奔走臣我監五祀汝奔走事我我監視汝所為五年於此矣越惟有胥伯大小多正爾罔不克臬伯長也汝自有相君相長者至於小大衆正之人皆汝所能作止也自作不和爾惟和哉爾室不睦爾惟和哉爾邑克明爾惟克勤乃事家不和則邑不明雖勤於事無益也爾尚不忌于凶德亦則以穆穆在乃位服凶人莫如和敬克閱于乃邑謀介簡邑人以自介副爾乃自時洛邑尚永力畋爾田天惟畀矜爾我有周惟其大介賚爾介助也迪簡在王庭尚爾事有服在大僚王曰嗚呼多士爾不克勸忱我命爾亦則惟不克享凡民惟曰不享爾不我享民亦不爾敬矣爾乃惟逸惟頗大遠王命迪簡之命也則惟爾多方探天之威我則致天之罰離逖爾土將遠徙之王曰我不惟多誥我惟祗告爾命又曰時惟爾初不克敬于和則無我怨今既戒汝以和敬汝不能用則他日又舉今言以告汝無怨也書傳卷十五
