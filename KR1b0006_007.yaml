body:
  text: 書傳卷七宋蘇軾撰商書湯誓第一伊尹相湯伐桀古之君臣有如二君而不相疑者湯之於伊尹劉𤣥德之於諸葛孔明是也湯言聿求元聖與之戮力而伊尹曰惟尹躬暨湯咸有一德其君臣相期如此故孔子曰伊尹相湯伐桀太甲不明而廢之思庸而復之君臣相安此聖人之事也𤣥德孔明雖非聖人然其君臣相友之契亦庶幾於此矣𤣥德之將死也囑孔明曰禪可輔輔之不可君自取之非伊尹之流而可以屬此乎孔明專蜀事二君雍容進退初不自疑人亦莫之疑者使常人處之不為竇武何進則為曹操司馬仲逹矣世多疑伊尹之事至謂太甲為殺伊尹者皆以常情度聖賢也升自陑遂與桀戰於鳴條之野作湯誓孔安國以謂桀都安邑陑在河曲之南安邑之西湯自亳往當由東行故以升自陑為出不意又言武王觀兵孟津以卜諸侯之心而退以示弱其言湯武皆陋甚古今地名道路有改易不可知者安知陑鳴條之必在安邑西耶升陑以戰記事之實猶泰誓師渡孟津而已或曰升髙而戰非地利以人和而已夫恃人和而行師於不利之地亦非人情故皆不取王曰格爾衆庶悉聽朕言非台小子敢行稱亂有夏多罪天命殛之今爾有衆汝曰我后不恤我衆舍我穡事而割正夏豫惟聞汝衆言夏氏有罪豫畏上帝不敢不正今汝其曰夏罪其如台夏王率遏衆力率割夏邑有衆率怠弗協曰時日曷喪豫及汝皆亡夏德若兹今朕必往桀之惡不能及商民商民安於無事而畏伐桀之勞故曰我后不恤我衆舍我穡事而割正夏夏氏之罪其能若我何故湯告之曰夏王遏絶衆力以割夏邑其民皆曰何時何日當喪吾欲與之皆亡其亟若此不可以不救爾尚輔豫一人致天之罰豫其大賚汝爾無不信朕不食言爾不從誓言豫則孥戮汝罔有攸赦湯既勝夏欲遷其社不可作夏社疑至臣扈春秋傳曰共工氏有子曰句龍為后土后土為社烈山氏之子曰柱為稷自夏以上祀之周棄亦為稷自商以來祀之是湯以棄易柱而無以易句龍者故曰欲遷其社不可夏師敗績湯遂從之遂伐三朡俘厥寶玉誼伯仲伯作典寶三朡今定陶四篇亡仲虺之誥第二湯歸自夏至于大坰大坰地名史記作泰卷陶仲虺作誥春秋傳曰薛之皇祖奚仲居薛以為夏車正仲虺居薛以為湯左相成湯放桀于南巢廬江六縣東有居巢城書有巢伯來朝春秋楚人圍巢桀奔于此湯不殺也惟有慙德曰豫恐來世以台為口實後世放殺其君者必以湯武藉口其為病也大矣仲虺乃作誥曰嗚呼惟天生民有欲無主乃亂惟天生聰明時乂有夏昏德民墜塗炭天乃錫王勇智凡聖人之德仁義孝弟忠信禮樂之類皆可以學至惟勇也智也必天豫而後能非天豫而欲以學求之則智勇皆凶德也漢髙祖識三傑於衆人之中知周勃陳平於一世之後此天所豫智也光武平生畏怯見大敵勇此天所豫勇也豈可學哉若漢武帝唐德宗之流則古之學勇智者也足以敝其國殘其民而已矣故天不豫是德則君子不敢言智勇短於智勇而厚於仁不害其為令德之主也周公亦曰今天其命哲命吉凶命厯年哲者知人之謂也知人與不知人乃與吉凶厯年同出於天命蓋教成王不强其所無也表正萬邦纘禹舊服兹率厥典奉若天命纘繼也服五服也夏王有罪矯誣上天以布命于下帝用不臧式商受命用爽厥師簡賢附勢實繁有徒肇我邦于有夏若苖之有莠若粟之有秕小大戰戰罔不懼于非辜矧豫之德言足聽聞矯詐也臧善也式用也爽明肇啓也簡慢也帝既不善桀故用湯為受命之君彰明其衆於天下而桀之黨惡之流欲并我以啓其國若欲去莠秕然故小大戰戰無罪而懼況我以德見忌乎蓋言我不放桀則桀必滅我也惟王不邇聲色不殖貨利德懋懋官功懋懋賞用人惟己如自己出改過不吝克寬克仁彰信兆民乃葛伯仇餉初征自葛東征西夷怨南征北狄怨曰奚獨後豫攸徂之民室家相慶曰徯豫后后來其蘇民之戴商厥惟舊哉用兵如施針石則病者惟恐其來之後也佑賢輔德顯忠遂良兼弱攻昧取亂侮亡推亡固存邦乃其昌善者自遂惡者自亡湯豈有心哉應物而已德日新萬邦惟懷志自滿九族乃離王懋昭大德建中于民以義制事以禮制心未嘗作事也事以義起未嘗有心也心以禮作垂裕後昆裕餘也豫聞曰能自得師者王謂人莫己若者亡好問則裕裕廣也自用則小嗚呼慎厥終惟其始殖有禮覆昏㬥欽崇天道永保天命湯之慙德仁人君子莫大之病也仲虺恐其憂愧不已以害維新之政故思有以廣其意者首言桀得罪於天天命不可辭次言桀之必害己終言湯之勳德足以受天下者乃因極陳為君艱難安危禍福可畏之道以明今者受夏非以利己乃為無窮之恤以慰湯而解其慙仲虺之忠愛可謂至矣然而湯之所慙來世口實之病仲虺終不敢謂無也夫君臣之分放弒之名雖其臣子有不能文況萬世之後乎湯誥第三湯既黜夏命復歸于亳作湯誥亳在梁國榖熟縣王歸自克夏至于亳誕告萬方誕大也王曰嗟爾萬方有衆明聽豫一人誥惟皇上帝降衷于下民若有恆性克綏厥猷惟后衷誠也若順也仁義之性人所咸有故言天降也順其有常之性其無常者喜怒哀樂之變非性也能安此道乃君也夏王滅德作威以敷虐于爾萬方百姓爾萬方百姓罹其凶害弗忍茶毒竝告無辜于上下神祗天道福善禍淫降災于夏以彰厥罪肆台小子將天命明威不敢赦敢用𤣥牡敢昭告于上天神后請罪有夏聿求元聖與之戮力以與爾有衆請命請罪者為桀謝罪請命者為民祈福上天孚佑下民罪人黜服天命弗僭賁若草木兆民允殖僭不信也言天命有信視民所與則殖之所不與則蹶之若草木然民所殖則生不殖則死賁飾也其理明甚炳然如丹青也俾豫一人輯寧爾邦家兹朕未知獲戾于上下栗栗危懼若將隕于深淵此亦慙德之言也凡我造邦無從匪彝無即慆淫彝常也慆慢也戒諸侯之言各守爾典以承天休爾有善朕弗敢蔽罪當朕躬弗敢自赦惟簡在上帝之心言上帝當簡察其善惡其爾萬方有罪在豫一人豫一人有罪無以爾萬方嗚呼尚克時忱乃亦有終庶幾能信此也咎單作明居一篇亡伊訓第四成湯既沒太甲元年伊尹作伊訓肆命徂后史記湯之子太丁未立而卒湯崩太丁之弟外丙立二年崩外丙之弟仲壬立四年崩伊尹乃立太丁之子太甲太史公按世本湯之後二帝七年而後至太甲其迹明甚不可不信而孔安國獨據經臆度以為成湯沒而太甲立且於是歲改元學者因謂太史公為妄初無二帝而太史公妄增之豈有此理哉經云湯既沒大甲元年者非謂湯之崩在太甲元年也伊尹稱湯以訓故孔子敘書亦以湯為首殷道親親兄死弟及若湯崩舍外丙而立太丁之子則殷道非親親矣而可乎以此知史記之不妄也安國謂湯崩之歲而太甲改元不待明年者亦因經文以臆也經云惟元祀十有二月伊尹祠于先王奉嗣王祗見厥祖者蓋太甲立之明年正月也正月而謂之十二月何也殷之正月則夏之十二月也殷雖以建丑為正猶以夏正數月亦猶周公作豳詩於成王之世而云七月流火九月授衣皆夏正也史記秦始皇三十一年十二月更名臘曰嘉平夫臘必建丑之月也秦以十月為正則臘當在三月而云十二月以是知古者雖改正朔然猶以夏正數月也崩年改元亂世之事不容伊尹在而有之不可以不辨惟元祀十有二月乙丑伊尹祠于先王奉嗣王祗見厥祖侯甸羣后咸在百官總已以聽冡宰湯崩雖久矣而仲壬之服未除故冡宰為政也伊尹乃明言烈祖之成德以訓于王曰嗚呼古冇夏先后方懋厥德罔有天災山川鬼神亦莫不寧暨鳥獸魚龞咸若于其子孫弗率皇天降災假手于我有命我有天命之君湯也造攻自鳴條朕哉自亳造哉皆始也始攻自鳴條始建號自亳惟我商王布昭聖武代虐以寬兆民允懷今王嗣厥德罔不在初立愛惟親立敬惟長始于家邦終于四海嗚呼先王肇修人紀戒其恃天命不修人事從諫弗咈先民時若居上克明為下克忠言君明臣忠也與人不求備檢身若不及以至于有萬邦茲惟艱哉敷求哲人俾輔于爾後嗣制官刑警于有位曰敢有恆舞于宮酣歌于室時謂巫風詩云無冬無夏值其鷺羽此巫風也敢有殉于貨色恆于遊畋從流上而忘反謂之遊時謂淫風敢有侮聖言逆忠直逺耆德比頑童時謂亂風惟兹三風十愆卿士有一于身家必喪邦君有一于身國必亡臣下不匡其刑墨匡正也謂諫也具訓于䝉士蒙童也士自童幼即以此訓之也嗚呼嗣王祗厥身念哉聖謨洋洋嘉言孔彰惟上帝不常作善降之百祥作不善降之百殃爾惟德罔小萬邦惟慶爾惟不德罔大墜厥宗爾若作德雖小善足以慶萬邦若其不德不待大惡而亡肆命徂后二篇亡大甲上第五太甲既立不明伊尹放諸桐三年復歸于亳思庸伊尹作太甲三篇思用伊尹之言也湯放桀伊尹放太甲古未有是皆聖人不得已之變也故湯以慙德為法受惡曰此我之所以甚病也亂臣賊子庶乎其少衰矣湯不放桀伊尹不放太甲不獨病一時而已將使後世無道之君謂天下無奈我何此其病與口實之慙均耳聖人以為寧慙已以救天下後世故不得已而為之以為不得已之變則可以為道固當爾則不可使太甲不思庸伊尹卒故之而更立主則其慙有大於湯者矣惟嗣王不惠于阿衡惠順也阿倚也衡平也言天下之所倚平也阿衡伊尹之號猶曰師尚父云爾師其官也尚父其號也伊尹作書曰先王顧諟天之明命顧眷也以言許人曰諟言湯為天命之眷許也以承上下神祗社稷宗廟罔不祗肅天監厥德用集大命撫綏萬方惟尹躬克左右厥辟宅師伊尹助其君居集天下之衆也肆嗣王丕承基緒惟尹躬先見于西邑夏丕大也夏都在亳西自周有終自由也忠信為周由忠信之道則有終也相亦惟終其後嗣王罔克有終相亦罔終言君臣一體禍福同也嗣王戒哉祗爾厥辟辟君也敬其為君之道辟不辟沗厥祖王惟庸罔念聞沗辱也以不善為常聞伊尹之訓若不聞然伊尹乃言曰先王昧爽丕顯坐以待旦方天昧明之間先王已大明其心思道以待旦旁求俊彥啓迪後人彥美士也以賢者遺子孫開道之無越厥命以自覆越墜失也慎乃儉德惟懷永圖以約失之者鮮矣未有泰侈而能久者也若虞機張往省括于度則釋虞虞人也機張所以射鳥獸者省察也括隱括也度機之準望也釋捨也詩曰舍矢如破準望有毫釐之差則所中有尋丈之失矣言人君所為得失微而禍福大亦如此也欽厥止止居也孔子曰居敬而行簡率乃祖攸行惟朕以懌萬世有辭辭所以名言於天下後世者也王未克變伊尹曰兹乃不義習與性成性無不善者今王習為不義則性淪於習巾皆成於惡也豫弗狎于弗順營于桐宮密邇先王其訓無俾世迷狎近也王之不義以近羣小故也故獨使居於桐宮密邇先王之陵墓以思哀而生善心此先王之訓也迷讀如懷寶迷邦之迷我不訓正太甲則是懷道以迷天下也王徂桐宮居憂克終允德太甲中第六惟三祀十有二月朔此亦三年正月也伊尹以冕服奉嗣王歸于亳始吉服也作書曰民非后罔克胥匡以生胥匡相正也后非民罔以辟四方言民去之則吾無與為君者皇天眷佑有商俾嗣王克終厥德實萬世無疆之休王拜手稽首曰豫小子不明于德自底不類不類猶失常也欲敗度縱敗禮以速戾于厥躬天作孽猶可違自作孽不可逭孽妖也違逭皆避也妖祥之來有可以避者此天作也若妖由人興則無可避之理既往背師保之訓弗克于厥初尚賴匡救之德圖惟厥終伊尹拜手稽首曰修厥身允德協于下惟明后允德信有德也下之協從從其非僞者蓋欲天下中心悅而誠服苟非其德出於其固有之誠心未有能至者先王子惠困窮民服厥命罔有不悅竝其有邦厥鄰乃曰徯我后后來無罰上失其道民散久矣凡麗于罰皆君使之湯來則我自無罪矣王懋乃德視乃厥祖無時豫怠奉先思孝接下思恭視逺惟明聽德惟聰視不及逺非明聽不擇善非聰朕承王之休無斁斁厭也太甲下第七伊尹申誥于王申重也曰鳴呼惟天無親克敬惟親民罔常懷懷于有仁鬼神無常享享于克誠天位艱哉德惟治否德亂與治同道罔不興與亂同事罔不亡堯舜讓而帝之噲讓而絶湯武行仁義而王宋襄公行仁而亡與治同道罔不興與亂同事罔不亡也必同道而後興道同者事未必同也周厲王弭謗秦始皇禁偶語周景王鑄大錢王莾作泉貨紂積巨橋之粟隋煬帝洛口諸倉其事同其道無不同者故與亂同事則亡矣終始慎厥與惟明明后慎所與之人也君子難合而易離能與君子固難矣能終始之尤難先王惟時懋敬厥德克配上帝湯惟能如是勉敬厥德故能配天天無言無作而四時行百物生王亦如是老子曰王乃天天乃道今王嗣有令緒尚監兹哉若升髙必自下若陟遐必自邇邇者逺之始下者髙之本升髙而不自下陟遐而不自邇慕道而求速逹皆自欺而已無輕民事惟難無安厥位惟危輕之則難安之則危慎終于始慮終必自其始慎之有言逆于汝心必求諸道有言遜于汝志必求諸非道嗚呼弗慮胡獲弗為胡成一人元良萬邦以貞伊尹憂太甲之深故所戒者非一有言合于道則逆汝心合于非道則順汝志如此則是患不可勝慮事不可勝為矣故歎曰嗚呼弗慮胡獲弗為胡成亦治其元良而已此所謂要道也元始也良其良心也人君能治其始有之良心則萬邦不令而自正前言皆籧篨矣君罔以辨言亂舊政臣罔以寵利居成功邦其永孚于休天下之亂必始於君臣攜離君以辨言亂舊政則大臣懼臣以寵利居成功則人主疑亂之始也咸有一德第八伊尹作咸有一德伊尹既復政厥辟將告歸乃陳戒于德曰嗚呼天難諶諶信也命靡常常厥德保厥位厥德靡常九冇以亡九有九州也夏王弗克庸德慢神虐民皇天弗保監于萬方啓迪有命眷求一德俾作神主惟尹躬暨湯咸有一德克享天心受天明命以有九有之師爰革夏正非天私我有商惟天佑于一德非商求于下民惟民歸于一德德惟一動罔不吉德二三動罔不凶惟吉凶不僭在人惟天降災祥在德今嗣王新服厥命惟新厥德終始惟一時乃日新一者不變也如其善而一也不亦善乎如其不善而一也不幾桀乎曰非此之謂也中有主之謂一中有主則物至而應物至而應則日新矣中無主則物為宰凡喜怒哀樂皆物也而誰使新之故伊尹曰終始惟一時乃日新豫嘗有言聖人如天時殺時生君子如水因物賦形天不違仁水不失平惟一故新惟新故一一故不流新故無斁此伏羲以來所傳要道也伊尹恥其君不如堯舜故以是訓之如衆人之言新則不能一而一非新也伊尹曰一所以新也是謂萬物竝育而不相害道竝行而不相悖任官惟賢才左右惟其人臣為上為德為下為民士之所求者爵祿而爵祿我有也挾是心以輕士此最人主之大患故告之曰臣之所以為民上者非為爵祿也為德也德非位不行其所以為我下者非為爵祿也為民屈也知此則知敬其臣知敬其臣而後天位安其難其慎惟和惟一和如晏平仲之所謂和也德無常師主善為師善無常主協于克一中無主者雖為善皆僞也俾萬姓咸曰大哉王言名之必可言言之必可行是謂大又曰一哉王心如天地之有信可恃以安也克綏先王之祿永底蒸民之生嗚呼七世之廟可以觀德萬夫之長可以觀政非德無以遺後非政無以齊衆后非民罔使民非后罔事無自廣以狹人匹夫匹婦不獲自盡民主罔與成厥功沃丁既葬伊尹于亳咎單遂訓伊尹事作沃丁咎單訓伊尹事猶曹參述行蕭何之政也咎單作明居司空之職也舜宅百揆亦司空之事也禹作司空以此考之自堯舜至商蓋嘗以司空為政也歟沃丁太甲子自克夏至沃丁五十有二年伊尹亦上壽矣伊陟相太戊伊陟伊尹子太戊帝太庚之子亳有祥桑穀共生于朝桑穀合生于朝七日而拱妖也伊陟贊于巫咸作咸乂四篇書曰在太戊時巫咸乂王家太戊贊于伊陟作伊陟原命仲丁遷于囂作仲丁仲丁大戊子自亳遷囂囂在陳留浚儀縣或曰今河南敖倉河亶甲居相作河亶甲河亶甲仲丁弟相在河北祖乙圯于耿作祖乙祖乙河亶甲子耿在河東皮氏縣耿鄉圯毁也都邑為水所毁凡十篇亡書傳卷七
