body:
  text: 書傳卷丄宋蘇軾撰周書洪範第六武王勝殷殺受立武庚以箕子歸作洪範洪範大法也武王殺受立武庚非所以問洪範者而孔子於此言之明武王之得箕子蓋師而不臣也箕子之言曰殷其淪喪我罔為臣僕殷亡則箕子無復仕之道以此表正萬世為君臣之法如伯夷叔齊之志也箕子之道德賢於微子而況武庚乎武王將立殷後必以箕子為首微子次之而卒立武庚者必二子辭焉武庚死而立微子則是箕子固辭而不可立也太史公曰武王封箕子朝鮮而不臣也非五服之外賓客之國則箕子不可得而侯也然則曷為為武王陳洪範也天以是道畀禹而𫝊至于箕子不可使自我而絶也以武王而不𫝊則天下無復可𫝊者矣故為箕子之道者𫝊道則可仕則不可此孔子叙書之意也惟十有三祀王訪于箕子商曰祀周曰年在周而稱祀亦箕子不事周之意王乃言曰嗚呼箕子惟天隂騭下民相協厥居我不知其彝倫攸叙騭升彝常也倫理也天人有相通之道若顯然而通之以交於天地鬼神之間則家為巫史矣故堯命重黎絶地天通惟逹者為能默然而心通也謂之隂騭君子而不通天道則無以助民而合其居矣故武王以天人常類之次訪箕子箕子乃言曰乃言曰難之也王虛心而後問箕子辭讓而後對也我聞在昔鯀陻洪水汨陳其五行帝乃震怒不畀洪範九疇彝倫攸斁鯀則殛死禹乃嗣興天乃錫禹洪範九疇彝倫攸叙汨亂也九疇如草木之區别也斁厭也執一而不知變鮮不厭者孔子曰克伐怨欲不行焉可為難矣好勝之謂克治民而求勝民者必亡治病而求勝病者必殺人堯謂鯀方命圯族楚詞云鯀婞直以亡身知其剛愎好勝者也五行土勝水鯀知此而已不通其變犬物之方壯不逹其怒而投之以其所畏其爭必大豈獨水哉以其殛死知帝之震怒也舊說河出圖洛出書河圖為八卦洛書為九疇其𫝊也尚矣學者或疑而不敢言以豫觀之圖書之文必粗有八卦九疇之象數以發伏羲與禹之知如春秋之以麟作也豈可謂無也哉初一曰五行無所不用五行故不言用次二曰敬用五事次三曰農用八政農厚也次四曰協用五紀次五曰建用皇極次六曰乂用三德次七曰明用稽疑次八曰念用庶徵次九曰嚮用五福威用六極嚮趨也用福極使人知所趨避也一五行一曰水二曰火三曰木四曰金五曰土此五行生數也生成之數解見易𫝊水曰潤下火曰炎上木曰曲直金曰從革上爰稼穡皆其德也水不潤下則不能生物故水以潤下為德火不炎上則不能熟物故火以炎上為德木曰曲直謂其能從繩墨也木不曲直則不能棟宇故木以曲直為德金曰從革謂其能就鎔範也金不變化則不能成器故金以從革為德土無所不用不可以一德名而其德盛於稼穡不曰曰而曰爰爰於也曰者所以名之也無成名無專氣無定位蓋曰於此稼穡而非所以名之也潤下作鹹炎上作苦曲直作酸從革作辛稼穡作甘五行之所作不可勝言也可言者聲色臭味而已人之用是四者惟味為急故舉味以見其餘也二五事一曰貌二曰言三曰視四曰聽五曰思貌曰恭言曰從視曰明聽曰聰思曰睿恭作肅從作乂明作哲聰作謀睿作聖人生而有耳目口鼻視聽言思之具中有知而外有容與生俱生者也今五事先貌而次言然後有視聽已而乃有思何也人之生也五事皆具而未能用也自其始孩而貌知恭見其父母匍匐而就之擎跽而禮之是貌恭者先成也稍長而知言語以達其意故言從者次之於是始有識别而目乃知物之美惡耳乃知事之然否於是而致其思無所不至矣故視明聽聰思睿者又次之睿者達也窮理之謂也貌恭而人畏之謂之肅言從而民服之謂之乂視明而不為色所眩謂之哲聽聰而不為言所移謂之謀致思自窮理盡性以至於命謂之聖此天理之自然由匹夫而為聖人之具也聖人以為此五者之事可以交天人之際治隂陽之變山川之有草木如人之有容色威儀也故貌為木而可以治雨金之聲如人之有言也故言為金而可以治暘火之外景如人之有目也故視為火而可以治燠水之內景如人之有耳也故聽為水而可以治寒土行於四時金木水火得之而後成如人心之無所不在也故思為土而可以治風此洪範言天人之大略也或曰五事之叙與五行之叙異蓋從其相勝者是殆不然聖人叙五事專以人事之理為先後如向所云者其合於五勝適會其然耳從而為之說則過矣三八政一曰食二曰貨三曰祀四曰司空五曰司徒六曰司寇七曰賔八曰師食為首貨次之祀次之食貨所以養生而祀所以事死也生死之理得則司空定其居居定而後可教既教而後可誅故司空司徒司寇次之所以治民者至矣然後治諸侯治諸侯莫若禮所以賔之者備矣而猶不服則兵可用故賔而後師四五紀一曰歲歲星所次也二曰月月所躔也三曰日日所在也四曰星辰星二十八宿辰十二次也星辰者歲月日之所行也此四者所以授民時也五曰厯數以厯授民時則并彼四者為一矣豈復與彼四者列而為五哉豫以是知厯者授民時者也數者如陽九百六之類聖人以是前知吉凶者也書曰天之厯數在爾躬五皇極大而無際謂之皇莊子曰無門無旁四達之皇皇至而無餘謂之極子思子曰喜怒哀樂之未發謂之中道有進此者乎故曰極亦曰中孔子曰過猶不及學者因是以謂中者過與不及之間之謂也陋哉斯言也聵者之言不粗則微何也耳之官廢則粗微之制不在我也聰者之言無粗微豈復擇粗微之間而後言乎中則極極則中中極一物也學者知此則幾矣皇建其有極大立是道以為民極斂時五福用敷錫厥庶民惟時厥庶民我有是道五福自至可以錫庶民矣于汝極我有是道則民皆取中于我錫汝保極我有是道則民皆保我以安我以五福錫民民以保安錫我凡厥庶民無有淫朋人無有比德惟皇作極凡厥庶民有猷有為有守汝則念之不協于極不罹于咎皇則受之而康而色曰豫攸好德汝則錫之福時人斯其惟皇之極無虐㷀獨而畏高明人之有能有為使羞其行而邦其昌凡厥正人既富方榖汝弗能使有好于而家時人斯其辜于其無好德汝雖錫之福其作汝用咎皇極之道大矣無所不受無所不可苟非淫朋比德自棄於邪者皆可受而成就之與作極也有猷者有謀慮者也有為者有材力者也有守者有節守者也皆可與作極者也汝則念之勿忘也雖不協于極而未麗於惡者汝則受之勿棄也有自言者曰我所好者德也雖真僞未可知汝則錫之福則人知為善之利斯大作極矣虐㷀獨而畏高明則人慕冨貴厭貧賤利不在於為善矣人之有能有為皆得自進而邦乃昌雖正人亦有見而後仁既富而後為善者汝知其不邪斯可進矣不必待其有善而後祿也汝見正人而不能進使與汝國家相好則此正人亦或去而為惡也于其無好德者所謂淫朋比德自棄於邪者也斯人而錫之福則汝亦有咎矣大哉皇極之道非大人其孰能行之嗚呼此固硜硜者之所大笑也歟不協于極而受之自言好德而信之必有欺我而敗事者矣然得者必多失者必少唐武氏之無道也獨於進人無所留難非徒人得薦士亦許自舉其材其後開元賢臣致刑措者皆武氏所收也德宗好察而多忌士無賢愚皆不得進國空無人以致奉天之禍故陸贄有言武后以易得人而陛下以精失士至哉斯言也昔常袞為相艱於進人賢愚同滯及崔祐甫代之未朞年除吏八百多其親舊其曰非親舊莫由知之若祐甫與贄真可與論皇極者也無偏無陂遵王之義無有作好遵王之道無有作惡遵王之路無偏無黨王道蕩蕩無黨無偏王道平平無反無側王道正直會其有極歸其有極偏陂反側而作好惡此最害皇極者皇極無可作可作非皇極也去其害皇極而已曰皇極之敷言是彝是訓于帝其訓天之錫禹九疇不能如是諄諄也蓋粗有象數而已禹箕子推而廣之至皇極尤詳曰此非皆帝之言也皇極之敷言也帝以數象告而我敷廣其言為彝訓亦與帝言無異故曰于帝其訓凡厥庶民極之敷言是訓是行以近天子之光曰天子作民父母以為天下王皇極非獨天子事也使庶人而能訓行此敷言者其功烈豈可勝言哉亦足以附益天子之光明且能使其民愛其君如父母也六三德一曰正直二曰剛克三曰柔克平康正直彊弗友剛克燮友柔克不剛不柔曰正直孔子曰以直報怨平安無事用正直而已燮和也過彊不順者則以剛勝之人治之和順者則以柔順之人養之所謂剛亦不吐柔亦不茹也沈濳剛克高明柔克沈濳地也坤至柔而動也剛是以剛勝也高明天也天為剛德猶不干時是以柔勝也坤六二直方大乾上九亢龍有悔臣當執剛以正君君當體柔以納臣也惟辟作福惟辟作威惟辟玉食臣無有作福作威玉食臣之有作福作威玉食其害于而家凶于而國人用側頗僻民用僭忒聖人之憂世深矣其言世為天下則既陳天地君臣剛柔之道矣則憂後世因是以亂君臣之分故復深戒之七稽疑擇建立卜筮人將與卿士皆謀及之其可不擇而立乎乃命卜筮卜筮必命此人不使不立者占也曰雨其兆如雨曰霽如雨止曰䝉如蒙霧曰驛兆絡驛不相屬曰克兆相錯入也曰貞曰悔春秋傳曰秦伯伐晉卜徒父筮之遇蠱曰蠱之貞風也其悔山也是內卦為貞外卦為悔也卦之不變者占卦而不占爻故用貞悔占者變者則止以所變之爻占之其謂之貞悔者古語如此莫知其訓也凡七卜五占用二衍忒衍推也忒過也謂變而適他卦者也卜用其五占也於二曰貞曰悔此其不變者耳又當推其變者皆占之立時人作卜筮三人占則從二人之言既立此人為卜筮矣則當信而從之其占不同則當從衆汝則有大疑謀及乃心謀及卿士謀及庶人聖人無私之至視其心與卿士庶人如一皆謀及之周禮有外朝致民之法然上酌民言聽輿人之誦皆謀及之道也謀及卜筮汝則從龜從筮從卿士從庶民從是之謂大同身其康彊子孫其逢吉汝則從龜從筮從卿士逆庶民逆吉卿士從龜從筮從汝則逆庶民逆吉庶民從龜從筮從汝則逆卿士逆吉汝則從龜從筮逆卿士逆庶民逆作內吉作外凶龜筮共違于人用靜吉用作凶內祭祀昏冠之類外出師征伐之類八庶徵曰雨曰暘曰燠曰寒曰風曰時貌木也其徵為雨言金也其徵為暘視火也其徵為燠聽水也其徵為寒思土也其徵為風聖人何以知之以四時知之也四時之氣木為春春多雨故雨為貌徵金為秋秋多旱故暘為言徴火為夏夏多燠故燠為視徵水為冬冬多寒故寒為聽徵土為四季而風行於四時故風為思徵箕子既叙此五徵矣則又有曰時者明此五徵以四時五行推知之也五者來備各以其叙庶草蕃廡一極備凶一極無凶備者皆有而不過也極備者過多也極無者過少也此五者有一如此則皆凶也曰休徵曰肅時雨若曰乂時暘若曰哲時燠若曰謀時寒若曰聖時風若曰咎徵曰狂恆雨若貌不肅則狂曰僭恆暘若言不從則僭僭不信也曰豫恆燠若視不哲則豫豫淫樂於色也曰急恆寒若聽不聰則曰急急過察也曰䝉恆風若思不睿則蒙蒙暗也曰王省惟歲自此以下皆五紀之文也簡編脫誤是以在此其文當在五曰厯數之後莊子曰除日無歲王省百官而不兼有司之事如歲之總日月也卿士惟月師尹惟日卿士亦不侵師尹之職也歲月日時無易百榖用成乂用明俊民用章家用平康日月歲時既易百穀用不成乂用昏不明俊民用微家用不寧歲月日時相奪則百穀不成君臣相侵則治不明俊民微而家不寧庶民惟星星有好風星有好雨日月之行則有冬有夏月之從星則以風雨箕好風畢好雨月在箕則多風在畢則多雨言歲之寒燠由日月其風雨由星以明卿士之能為國休戚庶民之能為君禍福也九五福一曰壽二曰富三曰康寧無疾病四曰攸好德作德心逸日休其為福也大矣五曰考終命六極極窮也一曰凶短折不得其死曰凶二曰疾多疾病三曰憂人有常戚戚者亦命也四曰貧五曰惡醜陋也六曰弱尫劣也福之反則極也極之對則福也五與六豈其盡之皇極之建則多福不建則多極皆其大略也必曰何以致之則過矣武王既勝殷邦諸侯班宗彝作分器宗彝宗廟彝尊也以為諸侯分器一篇亡書傳卷十
