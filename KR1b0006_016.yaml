body:
  text: 書傳卷十六宋蘇軾撰周書立政第二十一周公作立政周公若曰拜手稽首告嗣天子王矣用咸戒於王曰王左右常伯常任準人綴衣虎賁周公曰嗚呼休兹知恤鮮哉周公率羣臣進戒於王贊曰羣臣皆再拜稽首告天子今王矣不可以幼沖自待則進戒曰王左右有牧民之長曰常伯有任事之公卿曰常任有守法之有司曰準人此三事之外則有掌服器者曰綴衣執射御者曰虎賁此褻御也周公則戒之曰非獨三事者當擇人此褻御者亦當擇人也能知憂此者美哉鮮矣古之人迪惟有夏乃有室大競籲俊尊上帝夏后氏之世王室所以大强者以求賢為事天之實也迪知忱恂于九德之行乃敢告教厥后曰拜手稽首后矣曰宅乃事宅乃牧宅乃準兹惟后矣事則向所謂常任也牧則向所謂常伯也準則向所謂準人也一篇之中所論宅俊者參差不齊然大要不出是三者其餘則皆小臣百執事也古今學者解三宅三俊多不同惟專以經訓經庶得其正書曰迪知忱恂於九德之行是九德為三俊也臯陶之九德則箕子三德之詳者也并三為一則九德為三俊明矣書曰宅乃事宅乃牧宅乃準是事也牧也準也為三宅所以宅三俊也書曰流宥五刑五流有宅五宅三居又曰兹乃三宅無義民此三宅所以宅五流也人之有疾也食而不藥不可藥而不食亦不可三宅三俊如藥食之交相養而不知食之養藥耶藥之養食耶所以宅三俊及所以宅五流者皆曰三宅如此而後經之言可通也謀面用丕訓德則乃宅人兹乃三宅無義民謀面謀其耳目所及者言自近及逺皆大訓我德則可以宅三俊之人既宅三俊然後可以宅五流凡民之無義而有罪者桀德惟乃弗作往任是惟暴德罔後書曰肆往姦宄是古者謂流為往也桀之所往者無罪之人所任者皆小人殘民者也所往所任皆出於暴德是以無後亦越成湯陟丕釐上帝之耿命乃用三有宅克即宅曰三有俊克即俊嚴惟丕式克用三宅三俊其在商邑用協于厥邑其在四方用丕式見德耿光也成湯既以升聞大治上帝之命則以三宅去凶人凶人各即其宅然後宅俊其所謂俊者皆真有德者也故曰三有俊克即俊殷人去凶而後用賢夏后氏用賢而後去凶各從當時之宜要之二者相資而成也禮曰夏后氏先祿而後威先賞而後罰殷人先罰而後賞蓋緣立政之文而立此言不知聖人之賞罰應物而作無所先後也湯惟嚴敬用宅俊故能內協商邑外以顯德於四方也嗚呼其在受德暋惟羞刑暴德之人同于厥邦乃惟庶習逸德之人同于厥政帝欽罰之乃伻我有夏式商受命奄甸萬姓甸治也帝欽我而伐紂使我有諸夏法湯受命而治萬姓也亦越文王武王克知三有宅心灼見三有俊心以敬事上帝立民長伯君子小人各知其本心去凶進賢各得其實立政任人準夫牧作三事任人常任也準夫準人也牧常伯也此三事皆大臣也虎賁綴衣趣馬小尹自此以下皆小臣或其逺外者趣馬掌馬也小尹小官之長也左右攜僕執持器物者百司庶府府庫藏吏也大都小伯大都之伯在牧人中矣此其小伯也藝人執技以事上者表臣百司表外也有兩百司此其外者也太史尹伯庶常吉士太史下大夫掌六典之二尹伯庶常吉士皆當時小官司徒司馬司空亞旅六卿獨數其三不及冢宰宗伯司寇者周公以師兼冢宰周公謂蘇忿生為蘇公是蘇公以公兼司寇也而宗伯則召公兼之歟亞其二也旅其士也卿在常任中矣此言其亞旅而已夷微盧蒸三亳阪尹蠻夷之民微盧之衆及三亳阪險之地皆有尹正湯始都亳其後屢遷所遷之地皆有亳名故曰亳或曰蒙為北亳穀熟為南亳偃師為西亳歷數此者欲得其人也文王惟克厥宅心能知君子小人之心乃克立兹常事司牧人以克俊有德常任常伯必以德選不言準人者容以才進也文王罔攸兼于庶言庶獄庶愼惟有司之牧夫是訓用違庶獄庶愼文王罔敢知于兹文王不識不知順帝之則其所知者三宅三俊去凶用賢之事而已至于庶言有司所下教令也庶獄獄訟也庶愼國之禁戒儲備也文王皆不敢下侵有司之事惟使有司牧夫訓治用命及違命者而已亦越武王率惟敉功不敢替厥義德率惟謀從容德以並受此丕丕基武王但撫存文王之功不改其義德而從其冇容之德也嗚呼孺子王矣繼自今我其立政立事準人牧夫我其克灼知厥若丕乃俾亂其心如其言是謂若相我受民助我所受民和我庶獄庶愼時則勿有間之既灼知其心而後用既用則勿以流言讒間之自一話一言我則末惟成德之彥以乂我受民道隱於小成言隱於榮華一話一言聞斯行之則不勝其弊以其不勝弊而舉棄之則所喪亦多矣必受而繹之末惟成德之彥則不可以小道小言眩也故一話一言終必付之而後可嗚呼豫旦已受人之徽言咸告孺子王矣我受美言於人不敢自有而獻之於王也繼自今文子文孫其勿誤于庶獄庶愼惟正是乂之心有邪正事有是非正心而求其理未有不得也自古商人亦越我周文王立政立事牧夫準人則克宅之克由繹之兹乃俾乂人有臨事而失其常不如所期者故已宅則復繹之者紬繹其所已行之事也國則罔有立政用憸人不訓于德是罔顯在厥世繼自今立政其勿以憸人其惟吉士用勱相我國家勱勉也何謂憸人賈誼賦曰鳯凰翔于千仞兮覽德輝而下之見世德之憸微兮遙增擊而去之是之謂憸人今文子文孫孺子王矣其勿誤于庶獄惟有司之牧夫夫周公尤以獄為憂故此篇之終特以囑司寇蘇公也其克詰爾戎兵以陟禹之迹方行天下至于海表罔有不服罔有不服則兵初不用也然不可以不用而不以時詰治之以覲文王之耿光以揚武王之大烈嗚呼繼自今後王立政其惟克用常人人之才德長於此者天下之所共推而不可易也是之謂常人如廷尉用張釋之于定國吏部尚書用山濤度支用劉晏此非常人乎周公若曰太史司寇蘇公式敬爾由獄以長我王國兹式有愼以列用中罰春秋傳曰昔武王克商使諸侯撫封蘇忿生以溫為司寇此言其能敬用獄以長王國是為三公也列者前後相比猶今之言例也以舊事為比而用其輕重之中者也呼太史而告之者欲書之於史以為後世法也周官第二十二成王既黜殷命滅淮夷還歸在豐作周官殷未黜淮夷未滅則成王有所不睱惟周王撫萬邦巡侯甸四征弗庭綏厥兆民六服羣辟罔不承德歸于宗周董正治官書曰侯甸男邦采衛此周五服之名也禹貢五服通畿內周五服在王畿千里之外并畿內為六服董督也治官治事之官也王曰若昔大猷制治于未亂保邦于未危曰唐虞稽古建官惟百內有百揆四嶽外有州牧侯伯庶政惟和萬國咸寧夏商官倍亦克用乂唐虞官百而天下治夏商曷為倍之德衰而政卑也堯舜官天下無患失之憂故任人而不任法人得自盡也故法簡官少而事省夏商家天下惟恐失之不敢以付人人與法相持而行故法煩官多而事冗後世德愈衰政愈卑人愈不信而一付之法吏不敢任事相倚以苟免故法愈亂官愈多而事不舉人主知此則治一作幾矣明王立政不惟其官惟其人明王觀唐虞夏商之政而知為國不在官多而在得人故官不必備也今豫小子祗勤于德夙夜不逮仰惟前代時若訓迪厥官立太師太傅太保兹惟三公論道經邦燮理隂陽師傅保皆論道國以道為經以政事緯之與刑無相奪倫而隂陽和官不必備惟其人少師少傅少保曰三孤二公𢎞化寅亮天地弼豫一人孤特也此雖三公之二而非其屬官故曰孤以重之冢宰掌邦治統百官均四海政教禮刑無所不掌謂之邦治而百官總已以聽焉故冢宰為天官必三公兼之餘卿或兼或特命司徒掌邦教敷五典擾兆民司徒之職如地之生物富而能教之故為地官擾馴也宗伯掌邦禮治神人和上下司馬掌邦政統六師平邦國王者以禮樂治天下政所從出本於禮而成於政和如天之春萬物生焉而盛於夏故宗伯為春官司馬為夏官司寇掌邦禁詰姦慝刑暴亂如秋之肅殺萬物故司寇為秋官司空掌邦土居四民時地利民各有居室如冬之蓋藏故司空為冬官六卿分職各率其屬以倡九牧九州之牧也阜成兆民六年五服一朝一朝畢朝也朝以逺近為疏數六年而遍五服畢朝也又六年王乃時巡考制度于四嶽諸侯各朝于方嶽大明黜陟夏商以來人主奉養日侈供衛日廣亦不能數巡守故以五載為十二年也王曰嗚呼凡我有官君子欽乃攸司愼乃出令令出惟行弗惟反令出不善知而改之猶賢於不反也然數出數改則民不復信上雖有善令不行矣故教以善令非教其遂非也以公滅私民其允懷學古入官議事以制政乃不迷春秋傳曰鄭子産鑄刑書晉叔向譏之曰昔先王議事以制不為刑辟其言蓋取諸此也先王人法並任而任人為多故律設大法而已其輕重之詳則付之人臨事而議以制其出入故刑簡而政清自唐以前治罪科條止於今律令而已人之所犯日變無窮而律令有限以有限治無窮不聞其有所闕豈非人法兼行吏猶得臨事而議乎今律令之外科條數萬而不足於用有司請立新法者日益而不已嗚呼任法之弊一至於此哉其爾典常作之師無以利口亂厥官小人不利於用常法常以利口亂政蓄疑敗謀人主聞讒言不即辨而藏之中曰蓄疑敗謀害政無大於此者怠忽荒政不學牆面蒞事惟煩戒爾卿士功崇惟志未有志卑而功崇者業廣惟勤惟克果斷乃罔後艱偷於初必艱於終位不期驕祿不期侈恭儉惟德無載爾僞孟子曰恭儉豈可以聲音笑貌為哉作德心逸日休作僞心勞日拙居寵思危罔不惟畏弗畏入畏推賢讓能庶官乃和不和政龎士無賢不肖入朝見嫉自有君臣以來病之矣惟讓為能和是以貴之舉能其官惟爾之能稱匪其人惟爾不任王曰嗚呼三事三公也暨大夫敬爾有官亂爾有政以佑乃辟永康兆民萬邦惟無斁成王既伐東夷肅愼來賀東夷淮夷也在周之東肅愼東北逺夷也王俾榮伯作賄肅愼之命國語曰文王諏於蔡原訪於辛尹重之以周召畢榮豈此榮伯也與周公在豐將殁欲葬成周公薨成王葬于畢告周公作亳姑畢有文武墓葬公于畢示不敢臣也亳姑蒲姑也周公告召公作將蒲姑至此并告已遷歟二篇亡君陳第二十三周公既殁命君陳分正東郊成周作君陳君陳命於周公之後畢公之前必周之老臣也鄭𤣥以為周公子非也畢公成王之父師弼亮四世豈以周公之子先之周公遷殷頑民于洛不必遷舊人以宅新民也洛人在內殷人在郊理必然也分正者畢命所謂旌别淑慝表厥宅里殊厥井疆俾克畏慕也王若曰君陳惟爾令德孝恭惟孝友于兄弟克施有政命汝尹兹東郊敬哉昔周公師保萬民民懷其德往愼乃司兹率厥常懋昭周公之訓惟民其乂我聞曰至治馨香感于神明黍稷非馨明德惟馨物之精華發越于外者為聲色臭味是妙物也故足以移人亦足以感鬼神聖人以至治明德比于馨香有以也夫荀悅有言君子以情用小人以形用榮辱者賞罰之精華故禮教榮辱以加君子化其情也桎梏鞭朴以加小人化其形也君子不犯辱况於刑乎小人不忌刑况於辱乎若教化之廢推中人而墜於小人之域教化之行引小人而納於君子之塗此之謂也爾尚式時周公之猷訓惟日孜孜無敢逸豫凡人未見聖若不克見既見聖亦不克由聖爾其戒哉爾惟風下民惟草豈獨聖也凡有求而未得也無所容其愛既得則愛衰此人之情也為人君者不能顯諸仁藏諸用凡所以治民之具畢用而常陳則民狎而玩之矣故教之惟風下民惟草德復有妙於風者乎圖厥政莫或不艱有廢有興出入自爾師虞庶言同則繹有所興廢出納皆咨于衆以度之衆言同則繹之孔子曰巽語之言能無悅乎繹之為貴爾有嘉謀嘉猷則入告爾后于內爾乃順之于外曰斯謀斯猷惟我后之德嗚呼臣人咸若時惟良顯哉臣謀之而君能行此真君之德也豈待其順之于外云爾也哉成王之言此者非貪臣之功實欲歸功於臣以來衆言也王曰君陳爾惟𢎞周公丕訓無依勢作威無倚法以削寬而有制從容以和殷民在辟豫曰辟爾惟勿辟豫曰宥爾惟勿宥惟厥中有弗若于汝政弗化于汝訓辟以止辟乃辟辟而不能止辟者勿辟也狃于姦宄敗常亂俗三細不宥狃習也常者國之舊法俗者民之所安而敗亂之害政之尤故此三者所犯雖小亦不可宥也爾無忿疾于頑無求備于一夫必有忍其乃有濟有容德乃大有殘忍之忍有容忍之忍春秋傳曰州吁阻兵而安忍此殘忍之忍孔子曰小不忍則亂大謀此容忍之忍也古今語皆然不可亂也成王指言三細不宥則其餘皆當宥之曰必有忍其乃有濟者正孔子所戒小不忍則亂大謀者也而近世學者乃謂當斷不可以不忍忍所以為義是成王教君陳果於刑殺以殘忍為義也夫不忍人之心人之本心也故古者以不忍勸人以容忍勸人也則有之矣未有以殘忍勸人者也不仁之禍至六經而止今乃析言誣經以助發之豫不可以不論簡厥修亦簡其或不修進厥良以率其或不良惟民生厚因物有遷違上所命從厥攸好爾克敬典在德時乃罔不變允升于大猷惟豫一人膺受多福其爾之休終有辭于永世書傳卷十六
