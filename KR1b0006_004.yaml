front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1b0006_WYG_004-1a, image: WYG0054/WYG0054-0510a.png}
body:
  text: 書傳卷四宋蘇軾撰虞書益稷第五帝曰來禹汝亦昌言禹拜曰都帝豫何言豫思日孜孜汝亦昌言者因臯陶之言以訪禹也臯陶曰豫未有知者猶曰吾不知其他也思日夜贊襄而已贊進也襄上也讀如懷山襄陵之襄臯陶之意曰吾不知其他也思日夜進益而已知進而不知退知上而不知下也易曰天行健君子以自強不息行健者如登高進而不知止雖超太山可也禹亦因臯陶之言而進之曰豫何言何言者亦猶臯陶之未有知也又曰豫思日孜孜思日孜孜者亦猶臯陶之思日贊贊襄哉也其言皆相因之辭豫是以知曰之當為日也伏生以益稷合於臯陶謨有以也夫臯陶曰吁如何禹曰洪水滔天浩浩懷山襄陵下民昏墊昏瞀也墊陷也豫乘四載隨山刋木暨益奏庶鮮食水行乘舟陸行乘車泥行乘輴山行乘樏秦漢以來師傳如此且孔氏之舊也故安國知之非諸儒之臆説也四載之解雜出於尸子慎子而最可信者太史公也亦如六宗之説自秦漢以來尚矣豈可以私意曲學鐫鑿附會為之哉而或者以為鯀治水九載兗州作十有三載乃同禹之代鯀蓋四載而成功也世或喜其説然詳味本文豫乘四載隨山刋木則是駕此四物以行於山林川澤之間非以四因九通為十三載之辭也按書之文鯀九載績用弗成在堯未得舜之前而殛鯀在舜登庸厯試之後鯀殛而後禹興則禹治水之年不得與鯀之九載相接兗州之功安得通四與九為十三乎禹之言曰娶于塗山辛壬癸甲是娶在治水之中又曰啓呱呱而泣豫弗子惟荒度土功是啓生在水患未平之前也禹服鯀三年之喪自免喪而至于娶而至于子自有子至于止禹而泣亦久矣安得在四載之中乎反覆考之皆與書文乖異書所云作十有三載乃同者指兗州之事非謂天下共作十三載也近世學者喜異而巧於鑿故詳辨之以解世之惑豫決九州距四海九州之名川也濬畎澮距川畎遂溝洫澮皆通水之道達于川者也暨稷播奏庶艱食鮮食懋遷有無化居蒸民乃粒萬邦作乂播種也奏進也鮮食肉食也禹之在山林也與益同之益朕虞也其鮮食鳥獸也其在川澤也與棄同之棄后稷也其鮮食魚鱉也艱食者草木根實之類凡施力艱難而得者也艱食鮮食民粗無飢矣乃勉之遷易其有無以變化其所居積而農事作矣臯陶曰俞師汝昌言禹所謂孜孜者其言至約而近也故臯陶吁而問之禹乃極言孜孜之功效其所建立成就巍巍如此故臯陶曰俞師汝昌言失以一言而濟天下利萬世可不師乎禹曰都帝慎乃在位帝曰俞禹曰安汝止惟幾惟康其弼直惟動丕應徯志以昭受上帝天其申命用休帝曰吁臣哉鄰哉鄰哉臣哉禹曰俞止居也安汝居者自處於至靜也防患於微曰幾幾則思慮周無心於物曰康康則視聼審思慮周而視聼審則輔汝者莫不盡其直也反而求之無意於防患則思慮淺有心於求物則視聼亂思慮淺而視聼亂則輔汝者皆諂而已士之志於用者衆矣待汝而作故曰徯志汝既能安居幾康而觀利害之實是惟無動動則凡徯志者皆應矣夫豈獨人應之天必與之鄰近臣也帝以其言切而道大故歎曰我獨成此非臣誰與共之助我者四鄰之臣而助四鄰者凡在朝之臣也故曰臣哉鄰哉鄰哉臣哉帝曰臣作朕股肱耳目豫欲左右有民汝翼左右助也助我所有之民也輔翼之也豫欲宣力四方汝為朝諸侯服四夷凡富國強兵之事也豫欲觀古人之象日月星辰山龍華蟲作會宗彝藻火粉米黼黻絺繡以五采彰施于五色作服汝明日日也月月也星五緯之星也辰心伐北辰三辰也山山也龍龍也華蟲雉也日也月也星辰也山也龍也華蟲也此六章者畫之於宗廟之彝樽故曰作會宗彝也藻水草也火火也粉粉也米米也黼斧也黻兩已也藻也火也粉也米也黼也黻也此六章者繡之於絺以為裳絺葛之精者也故曰絺繡以五采彰施于五色作服者通言十二章也上六章繪而為衣下六章繡而為裳故曰作服也自孔安國鄭玄王肅之流各傳十二章紛然不齊豫獨為此解與諸儒異者以虞書之文為正也豫欲聞六律五聲八音在治忽以出納五言汝聽在察也忽不治也聲音與政通故可以察治否也五言者詩也以諷詠之言寄之於五聲蓋以聲言也故謂之五言豫違汝弼汝無面從退有後言欽四鄰帝感禹言有臣鄰之歎故條四事以責其臣而又戒之曰欽四鄰庶頑讒説若不在時侯以明之撻以記之書用識哉欲並生哉工以納言時而揚之格則承之庸之否則威之論語曰有恥且格格改過也春秋傳曰奉承齊犧古者謂奉牲幣而薦之曰承承薦也衆頑讒説之人不率是教者舜皆有以待之夫化惡莫若進善故擇其可進者以射侯之禮舉之其不率教之甚者則撻之其小者則書其罪以記之欲其並居而知恥也此士之有罪而未可終棄者故使樂工采其謳謡諷諫之言而揚之以觀其心其改過者則薦之且用之其不悛者則威之夏楚之寄之之類是也禹曰俞哉春秋傳太子欲殺渾良夫公曰諾哉諾哉云者口諾而心不然也禹之所以然者曰俞而已俞哉云者亦有味其言矣舜舉四事以責其臣立射侯書撻等法以待庶頑皆治理也而禹獨有味於斯言也者蓋其心有所不可於此以為身修而天下自服也帝光天之下至于海隅蒼生萬邦黎獻衆賢也共惟帝臣惟帝時舉敷納以言明試以功車服以庸誰敢不讓敢不敬應帝不時敷同日奏罔功無若丹朱傲惟慢遊是好傲虐是作罔晝夜額額頑狠之狀罔水行舟朋淫于家用殄厥世豫創若時娶于塗山辛壬癸甲創懲也懲丹朱之惡辛日娶于塗山甲日復往治水啓呱呱而泣豫弗子惟荒度土功啓禹子也禹治水過門不入聞啓泣而不暇子也惟大度土工而已弼成五服至于五千五服侯甸綏要荒也服五百里四方相距為方五千里州十有二師師二千五百人一州用三萬人九州二十七萬人外薄四海咸建五長五國立賢者一人為方伯謂之五長各迪有功苗頑弗即工帝其念哉禹見帝憂讒邪之甚故推廣其意曰帝之德光被天下至于海濵草木而況此衆賢乎考其言明其功誰敢不從帝不能如是布宣其德以同天下使苗民逆命日進而終無功者豈其修已有未至也哉故戒之曰無若丹朱傲而歷數其惡曰我惟以丹朱為戒故能平治水土弼成五服今天下定矣而苗猶不即工者帝不可以不求諸己也故曰帝其念哉此禹得之於益班師而歸諫舜之詞也而説者乃謂禹勸舜當念三苗之罪而誅之夫所謂念哉者豈誅有罪之言乎帝曰迪朕德時乃功惟敘臯陶方祗厥敘方施象刑惟明夔曰戛擊鳴球搏拊琴瑟以詠祖考來格虞賔在位羣后德讓此堂上樂也戛擊柷敔也鳴球玉罄也搏拊以韋為之實之以粳所以節樂虞賔丹朱也二王後故稱賔下管鼗鼓合止柷敔笙鏞以間鳥獸蹌蹌簫韶九成鳯凰來儀此堂下樂也鏞大鍾也夔作樂而鳥獸舞鳯凰儀信乎曰何獨夔也樂工所以不能致氣召物如古者以不得中聲故爾樂不得中聲者器不當律也器不當律則與擲植鼓盆無異何名為樂乎使律能當律則致氣召物雖常人能之蓋見於古今之傳多矣而況於夔乎夫能當一律則衆律皆得衆律皆得則樂之變動猶鬼神也是以降天神格人鬼來鳥獸皆無足疑者不如此何以使孔子忘味三月乎丹朱之惡幾於桀紂罔水行舟朋淫于家非紂而何今乃與羣后濟濟相讓此其難化蓋甚於鳥獸也夔曰於豫擊石拊石百獸率舞庶尹允諧舜聞禹諫則曰道我德者皆汝功也今苗民逆命臯陶方祗厥敘而行法焉故夔又進而諫曰鬼神猶可以樂格鳥獸猶可以樂致也而況於人乎此所謂一執藝事以諫者也帝庸作歌曰勑天之命惟時惟幾乃歌曰股肱喜哉元首起哉百工熙哉臯陶拜手稽首揚言曰念哉率作興事慎乃憲欽哉屢省乃成欽哉乃賡載歌曰元首明哉股肱良哉庶事康哉又歌曰元首叢脞哉叢脞細碎也股肱惰哉萬事墮哉帝拜曰俞往欽哉帝至此納禹之諫乃作歌曰天命不可常也待禍福之至而慮之則晚矣當以時慮其微者蓋始從禹之諫而取益之言有畏滿思謙之意也臯陶揚言曰念哉申禹之諫也曰凡所興作慎用刑廣禹之意也雖成功猶內自省終益之戒也帝之歌曰股肱喜則元首起而百工熙臯陶反之曰良康惰壞皆元首之致也嗚呼唐虞之際於斯為盛而學者不論惜哉書傳卷四
