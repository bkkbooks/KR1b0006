body:
  text: 書傳卷六宋蘇軾撰夏書甘誓第二啓與有扈戰于甘之野作甘誓史記有扈禹之後其國扶風雩縣是也國語曰夏有觀扈周有管蔡以比管蔡兄弟之國也甘扈之南郊也大戰于甘乃召六卿天子六師其將皆命卿王曰嗟六事之人豫誓告汝有扈氏威侮五行怠棄三正王者各以五行之德王易服色及正朔孔子曰行夏之時自舜以前必有以建子建丑為正者有扈氏不用夏之服色正朔是叛也故曰威侮五行怠棄三正天用勦絶其命今豫惟恭行天之罰左不攻豫左汝不恭命右不攻于右汝不恭命左車左也主射右車右執戈矛攻治也御非其馬之正汝不恭命春秋傳曰楚許伯御樂伯攝叔為右以致晉師樂伯曰吾聞致師者左射以菆攝叔曰吾聞致師者右入壘折馘執俘而還是古者三人同一車而御在中也車六馬兩服兩驂兩騑各任其事御之正也王良曰吾為之範我馳驅終日而不獲一為之詭遇一朝而獲十此所謂御非其馬之正也用命賞于祖不用命戮于社孔子曰當七廟五廟無虛主師行載遷之主以行無遷廟則以幣曰主命故師行有祖廟也武王伐紂師度孟津有宗廟有將舟將舟社主在焉故師行有社也戮人必於社故哀公問社宰我對以戰栗豫則孥戮汝戮及其子曰孥堯舜之世罰弗及嗣武王數紂之罪曰罪人以族孥戮非聖人之事也言孥戮者惟啓與湯知德衰矣然亦言之而已未聞真孥戮人也五子之歌第三太康失邦太康啓子也昆弟五人皆啓子須于洛汭作五子之歌須待也太康尸位尸主也以逸豫滅厥德黎民咸二二攜二也乃盤遊無度盤樂也畋于有洛之表洛表水南也夏都河北而畋于洛南言其去國之逺也十旬弗反有窮后羿因民弗忍距于河有窮國名羿其君也春秋傳曰后羿自鉏遷于窮石忍堪也厥弟五人御其母以從徯于洛之汭母徯焉而不歸以著太康之不孝也五子咸怨述大禹之戒以作歌其一曰皇祖有訓民可近不可下民惟邦本本固邦寧豫視天下愚夫愚婦一能勝豫一人三失皇祖禹也民可近者言民可親近而不可踈也不可下者言民可敬而不可賤若自賢而愚人以愚視天下則一夫可以勝我矣一人三失者失民則失天失天則失國也怨豈在明不見是圖怨不在大當及其未明而圖之豫臨兆民十萬曰億十億曰兆凛乎若朽索之馭六馬為人上者奈何不敬馭民若朽索之馭馬不已過乎曰天下皆有所恃民恃有司以安其身有司恃天子之法以安其位惟天子無所恃恃民心而已民心攜則天子為獨夫謂之朽索不亦宜乎其二曰訓有之內作色荒外作禽荒甘酒嗜音峻宇雕牆有一于此未或不亡其三曰惟彼陶唐有此冀方陶唐堯也堯都平陽舜都蒲坂禹都安邑皆在冀州今失厥道亂其紀綱乃底滅亡大曰綱小曰紀舜禹皆守堯之綱紀其四曰明明我祖萬邦之君有典有則貽厥子孫關石和鈞王府則有荒墜厥緒覆宗絶祀關通也和平也緒餘也古者有五權百二十斤曰石三十斤曰鈞舉其二則餘可知矣太史公曰禹以聲為律以身為度左準繩右規矩知度量權衡凡法度之器至禹明具故曰我祖有典法以遺子孫凡法度之器具在王府而吾不能守以亡也其五曰嗚呼曷歸豫懷之悲萬姓仇豫豫將疇依鬱陶乎豫心顔厚有忸怩弗慎厥德雖悔可追鬱陶憤悶也顔厚色愧也有讀曰又忸怩心慙也胤征第四羲和湎淫廢時亂日胤往征之作胤征羲和掌天地四時之官堯時為四人今此有國邑而以沈湎得罪則一人而已不知其何自為一也按史記及春秋傳晉魏絳吳伍員言帝太康帝仲康帝相帝少康四世事甚詳蓋羿既逐太康太康崩其弟仲康立而羿為政仲康崩其子相立相為羿所逐羿為家衆所殺寒浞代之浞因羿室生澆及豷使澆伐滅二斟且殺相相之后曰緍方娠而逃于有仍以生少康少康復逃于有虞虞思邑之於綸少康布德以收夏衆夏之遺臣靡收二斟之餘民以滅浞而立少康少康滅澆與豷然後祀夏配天不失舊物以此考之則太康失國之後至少康祀夏之前皆羿浞專政僭位之年如曹操之於漢司馬仲逹之於魏也胤征之事蓋出於羿非仲康之所能專明矣羲和湎淫之臣也而二於羿蓋忠於夏也如王淩諸葛誕之叛晉尉遲逈之叛隋故羿假仲康之命以命胤侯而往征之何以知其然也曰胤侯數羲和之罪至於殺無赦然其實狀止於酣酒不知日食而已此一法吏所辦耳何至於六師取之乎夫酒荒廢職之人豈復有渠魁脅從之事是強國得衆者也孔子敘書其篇曰羲和湎淫廢時亂日者言其罪止於此也曰胤往征之者見征伐號令之出於胤非仲康之命也此春秋之法曰然則孔子何取於此篇而不刪去乎曰書固有非聖人之所取而猶存者也孟子曰盡信書不如無書吾於武成取二三䇿而已紂之衆既已倒戈然猶縱兵以殺至於血流漂杵聖人何取焉豫於書見聖人所不取而猶存者二胤征之挾天子令諸侯與康王之誥釋斬衰而服袞冕也春秋晉侯召王而謂之巡狩孔子書之於策曰天王狩于河陽若無簡牘之記則後世以天王為真狩也胤征之事孔氏必有師傳之説也久逺而亡之耳惟仲康肇位四海胤侯命掌六師胤國名羲和廢厥職酒荒于厥邑胤后承王命徂征告于衆曰嗟豫有衆聖有謨訓明徴定保先王克謹天戒臣人克有常憲百官修輔厥后惟明明徴猶書所謂庶徴也保猶詩所謂天保也羲和之罪止於日食不知故首引天事以誓之每歲孟春遒人以木鐸徇于路孟春觀治象之法徇以木鐸此周禮小宰之事而在夏則遒人之職也遒之言聚也木鐸金口木舌也昔者有文事則徇以木鐸有武事則徇以金鐸官師相規工執藝事以諫工各執其事諫如虞人之針也其或不恭邦有常刑惟時羲和顛覆厥德沈亂于酒畔官離次官局所在曰次俶擾天紀俶始也擾亂也遐棄厥司乃季秋月朔辰弗集于房瞽奏鼓嗇夫馳庶人走日月合朔於十二辰今季秋之朔而不合于房日食也古有伐鼓用幣救日之事春秋傳曰惟正陽之月則然餘否今季秋而行此禮蓋夏禮與周異漢有上林嗇夫嗇夫小臣庶人庶人之在官者羲和尸厥官罔聞知昏迷于天象以干先王之誅政典曰先時者殺無赦不及時者殺無赦先後時罪之薄者必殺無赦非虐政乎惟軍中法則或用之穰苴斬莊賈是也傳曰國容不入軍軍容不入國此政典夏之司馬法止用於軍中今無以加羲和之罪乃取軍法一切之政而為有司沈湎失職之罰蓋文致其罪非實事也今豫以爾有衆奉將天罰爾衆士同力王室尚弼豫欽承天子威命曹操司馬仲逹楊堅之流討二己者未嘗不以王室為辭也火炎崑岡玉石俱焚天吏逸德烈于猛火殲厥渠魁脅從罔治舊染汙俗咸與維新玉石俱焚言不擇善惡也天吏之勢猛於火故脅從染汙皆非其罪言此者以壞其黨與也嗚呼威克厥愛允濟愛克厥威允罔功其爾衆士懋戒哉先王之用威愛稱事當理而已不惟不使威勝愛若曰與其殺不辜寧失不經又曰不幸而過寧僭無濫是堯舜已來常務使愛勝威也今乃謂威勝愛則事濟愛勝威則無功是為堯舜不如申商也而可乎此后羿之黨臨敵誓師一切之言當與申商之言同棄不齒而近世儒者欲行猛政輒以此藉口豫不可以不辨自契至于成湯八遷湯始居亳從先王居作帝告釐沃自契至湯十四世凡八徙都契之世父帝嚳都亳湯自商丘遷焉故曰從先王居五篇皆商書也經亡而序存文無所託故附夏書之末湯征諸侯葛伯不祀湯始征之作湯征葛梁國寧陵葛鄉也征葛事見孟子伊尹去亳適夏既醜有夏復歸于亳古稱伊尹五就湯五就桀夫湯與桀敵國也伊尹往來其間皆聞其政而兩國不疑則伊尹聖人也其道大矣其信於天下深矣是以廢太甲復立之而太甲安焉非聖人而何入自北門乃遇汝鳩汝方作汝鳩汝方二臣名書傳卷六
